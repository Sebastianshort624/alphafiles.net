<script id="atc-sb">
var _SK="atc_clients_v2",_AK="atc_active";
function _gA(){try{return JSON.parse(localStorage.getItem(_SK))||{};}catch(e){return{};}}
function _sA(o){localStorage.setItem(_SK,JSON.stringify(o));}
function _aC(){return localStorage.getItem(_AK)||null;}
function _aD(){var s=_aC();return s?_gA()[s]||null:null;}
function _fC(n){return "$"+Math.round(n||0).toLocaleString();}
function _fD(ts){if(!ts)return"--";return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

// ── UNSAVED TRACKING ────────────────────────────────────────────────
window._dirty=false;
window._pendingNav=null;
function setDirty(v){window._dirty=v;var el=document.getElementById('pb-saved');if(el)el.className='pb-saved'+(v?' dirty':' saved'),el.textContent=v?'Unsaved':'Saved';}
window.addEventListener('beforeunload',function(e){if(window._dirty){e.preventDefault();e.returnValue='Unsaved changes.';}});
document.addEventListener('input',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')setDirty(true);},true);

// ── SESSION SELECTIONS ──────────────────────────────────────────────
window.atcSel={
  key:function(){return 'sel_'+(_aC()||'_none_');},
  get:function(){try{return JSON.parse(localStorage.getItem(this.key())||'{}');}catch(e){return{};}},
  set:function(k,v){var d=this.get();v===null?delete d[k]:d[k]=v;localStorage.setItem(this.key(),JSON.stringify(d));},
  clear:function(){localStorage.removeItem(this.key());}
};

// ── CLIENT STATUS ────────────────────────────────────────────────────
// status: 'attended' | 'quoted' | 'vero'
function _getStatus(){var d=_aD();return d?d._status||null:null;}
function _setStatus(status){
  var slug=_aC();if(!slug)return;
  var all=_gA();if(!all[slug])return;
  all[slug]._status=status;all[slug]._updated=Date.now();
  _sA(all);buildPortalBanner();buildStatusSelector();
}
window.setClientStatus=function(s){_setStatus(s);};

// ── PAGE COMPLETION TRACKING ─────────────────────────────────────────
function _getCompleted(){
  var slug=_aC();if(!slug)return {};
  try{return JSON.parse(localStorage.getItem('completed_'+slug)||'{}');}catch(e){return{};}
}
function _markPageCompleted(url){
  var slug=_aC();if(!slug)return;
  var comp=_getCompleted();
  comp[url]={ts:Date.now()};
  localStorage.setItem('completed_'+slug,JSON.stringify(comp));
}
function _getProgress(){
  var comp=_getCompleted();
  var total=_PG.filter(function(p){return typeof p.n==='number';}).length;
  var done=Object.keys(comp).length;
  return{done:done,total:total};
}

// ── PORTAL SYSTEM ────────────────────────────────────────────────────
var PORTAL_PAGES=[
  {id:'owner',label:'Owner Info',url:'/owner/'},
  {id:'current',label:'Current Situation',url:'/current/'},
  {id:'whyout',label:'Why Do You Want Out',url:'/whyout/'},
  {id:'leverage',label:'Leverage',url:'/leverage/'},
  {id:'credit',label:'Credit Protection',url:'/credit/'},
  {id:'wait',label:'If You Do Nothing',url:'/wait/'},
  {id:'group',label:'Finding Your Group',url:'/group/'},
  {id:'approval',label:'Group Filing Spot',url:'/approval/'},
  {id:'heirs',label:'Heirs & Estate',url:'/heirs/'},
  {id:'compensation',label:'Resort Compensation',url:'/compensation/'},
  {id:'comp-calculator',label:'Compensation Calculator',url:'/comp-calculator/'},
  {id:'proof',label:'Proof',url:'/proof/'},
  {id:'letter',label:'Mutual Release Letter',url:'/letter/'},
  {id:'guarantee',label:'Certificate of Guarantee',url:'/guarantee/'},
  {id:'exit-methods',label:'4 Ways to Exit',url:'/exit-methods/'},
  {id:'rights',label:'Consumer Rights',url:'/rights/'},
  {id:'cost',label:'True Cost',url:'/cost/'},
  {id:'quote',label:'Your Quote',url:'/quote/'},
  {id:'included',label:"What's Included",url:'/included/'},
  {id:'better',label:'What Makes Alpha Better',url:'/better/'}
];
function _portalKey(slug){return 'portal_'+slug;}
function _getPortal(slug){try{return JSON.parse(localStorage.getItem(_portalKey(slug))||'{}');}catch(e){return{};}}
function _savePortal(slug,data){localStorage.setItem(_portalKey(slug),JSON.stringify(data));}
function _portalDir(){try{return JSON.parse(localStorage.getItem('portal_dir')||'[]');}catch(e){return[];}}
function _addToDir(slug,name){var dir=_portalDir();if(!dir.find(function(x){return x.slug===slug;}))dir.push({slug:slug,name:name,created:Date.now()});localStorage.setItem('portal_dir',JSON.stringify(dir));}

window.openPushPopup=function(){
  var slug=_aC();if(!slug){toast('No active client','#dc2626');return;}
  var d=_aD();var portal=_getPortal(slug);
  var items=PORTAL_PAGES.map(function(p){
    var pushed=portal[p.id];
    var isQuote=p.id==='quote';
    return '<label class="push-item'+(pushed?' pushed':'')+'"><input type="checkbox" value="'+p.id+'"'+(pushed?' checked':'')+'>'
      +p.label+(isQuote?' 💰':'')+(pushed?'<span style="margin-left:auto;font-size:9px;opacity:.6">✓</span>':'')+'</label>';
  }).join('');
  document.getElementById('push-box-inner').innerHTML=
    '<div class="push-hdr"><div class="push-hdr-title">📤 Push to Client Portal</div><button class="push-x" onclick="closePushPopup()">✕</button></div>'
    +'<div class="push-body"><div style="font-size:12px;color:#6b7280;margin-bottom:10px">Select pages to publish for <strong>'+((d&&(d.firstName||'Client'))||'Client')+'</strong></div>'
    +'<div class="push-grid">'+items+'</div>'
    +'<div class="push-actions"><button class="push-btn-all" onclick="toggleAllPush(this)">Select All</button>'
    +'<button class="push-btn-go" onclick="doPush()">🚀 Push Selected</button></div></div>';

  <!-- Resort Panels — one per resort -->

  </div>

<style>
.r-tabbar{display:flex;gap:4px;padding:10px 14px 0;border-bottom:1px solid #e5e7eb;align-items:center;flex-wrap:wrap}
.r-tab{padding:7px 18px;font-size:13px;font-weight:700;border-radius:8px 8px 0 0;border:1.5px solid #e5e7eb;border-bottom:none;background:#f8fafc;color:#374151;cursor:pointer;transition:.1s}

.r-tab.inactive{background:#f3f3f3;color:#c0c0c0;border-color:#e0e0e0;border-style:dashed}

.r-owner-row{display:flex;gap:6px;align-items:center}
.r-owner-row input{flex:1;padding:7px 10px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:13px;font-family:Inter,sans-serif;color:#1B2A4A;outline:none}
.r-owner-row input:focus{border-color:#1B2A4A}
</style>

<script>
var _activeResort=0;

function _getResorts(){
  var d=ad();if(!d)return[{},{},{},{}];
  if(!d.resorts||!d.resorts.length){
    // Migrate existing single-resort data to R-1
    d.resorts=[{
      name:d.resort||'',state:d.resstate||'',city:d.rescity||'',
      owners:[((d.firstName||'')+' '+(d.lastName||'')).trim(),'','',''],
      maitFees:d.maitFees||0,mtfFreq:'annual',
      monthlyMortgage:d.monthlyMortgage||0,mtgType:d.mtgType||'paidfull',
      balanceAmount:d.balanceAmount||0,mtgTerm:d.mtgTerm||10,
      yearPurchased:d.yearPurchased||'',purchasePrice:d.purchasePrice||0,why:d.why||''
    },{},{},{}];
  }
  while(d.resorts.length<4)d.resorts.push({});
  return d.resorts;
}

function _saveResorts(resorts){
  var s=ac();if(!s)return;
  var all=ga();if(!all[s])return;
  all[s].resorts=resorts;
  // Also sync R-1 to top-level fields for backward compat
  var r1=resorts[0]||{};
  all[s].resort=r1.name||'';all[s].resstate=r1.state||'';all[s].rescity=r1.city||'';
  all[s].maitFees=r1.maitFees||0;all[s].monthlyMortgage=r1.monthlyMortgage||0;
  all[s].balanceAmount=r1.balanceAmount||0;all[s].mtgTerm=r1.mtgTerm||10;
  all[s].yearPurchased=r1.yearPurchased||'';all[s].purchasePrice=r1.purchasePrice||0;
  all[s]._updated=Date.now();
  localStorage.setItem(SK,JSON.stringify(all));
}

function _panelHTML(ri){
  var n=ri+1;
  return '<div class="r-panel'+(ri===0?' active':'')+'" id="rpanel-'+ri+'">'
    +'<div class="r-panel-hdr"><div class="r-panel-title">Resort '+n+'</div>'
    +(ri>0?'<button class="r-del-btn" onclick="removeResort('+ri+')">Remove</button>':'')
    +'</div>'
    // Resort name + state
    +'<div class="frow">'
    +'<div class="ff"><label>Resort Name</label><input id="r'+ri+'-name" class="hi" placeholder="e.g. Wyndham" oninput="_autoSaveResorts()"></div>'
    +'<div class="ff"><label>State</label><input id="r'+ri+'-state" placeholder="e.g. FL" oninput="_autoSaveResorts()"></div>'
    +'</div>'
    // City + Year + Price
    +'<div class="frow three">'
    +'<div class="ff"><label>City</label><input id="r'+ri+'-city" placeholder="City" oninput="_autoSaveResorts()"></div>'
    +'<div class="ff"><label>Year Purchased</label><input id="r'+ri+'-year" type="number" placeholder="e.g. 2019" oninput="_autoSaveResorts()"></div>'
    +'<div class="ff"><label>Purchase Price</label><input id="r'+ri+'-price" type="number" placeholder="e.g. 18000" oninput="_autoSaveResorts()"></div>'
    +'</div>'
    // Owners (up to 4)
    +'<div class="slbl" style="margin-top:10px">Owners</div>'
    +'<div class="r-owners">'
    +'<div class="r-owner-row"><span style="font-size:11px;color:#9ca3af;width:16px;flex-shrink:0">1</span><input id="r'+ri+'-o0" placeholder="Owner 1 full name" oninput="_autoSaveResorts()"></div>'
    +'<div class="r-owner-row"><span style="font-size:11px;color:#9ca3af;width:16px;flex-shrink:0">2</span><input id="r'+ri+'-o1" placeholder="Owner 2 (optional)" oninput="_autoSaveResorts()"></div>'
    +'<div class="r-owner-row"><span style="font-size:11px;color:#9ca3af;width:16px;flex-shrink:0">3</span><input id="r'+ri+'-o2" placeholder="Owner 3 (optional)" oninput="_autoSaveResorts()"></div>'
    +'<div class="r-owner-row"><span style="font-size:11px;color:#9ca3af;width:16px;flex-shrink:0">4</span><input id="r'+ri+'-o3" placeholder="Owner 4 (optional)" oninput="_autoSaveResorts()"></div>'
    +'</div>'
    // MTF
    +'<div class="slbl" style="margin-top:10px">💰 Fees & Mortgage</div>'
    +'<div class="frow">'
    +'<div class="ff"><label>Maintenance Fee (MTF) <label style="cursor:pointer;font-size:11px;color:#6b7280"><input type="checkbox" id="r'+ri+'-monthly" onchange="_autoSaveResorts()"> Paid Monthly</label>
    +'<input id="r'+ri+'-mtf" type="number" class="hi" placeholder="Enter amount" oninput="_autoSaveResorts()"></div>'
    +'<div class="ff readonly"><label id="r'+ri+'-mtflbl">Calculated</label><input id="r'+ri+'-mtfcalc" readonly placeholder="Auto"></div>'
    +'</div>'
    // Mortgage
    +'<div class="frow">'
    +'<div class="ff"><label>Monthly Mortgage</label><input id="r'+ri+'-mtg" type="number" class="hi" placeholder="0 if paid off" oninput="_autoSaveResorts()"></div>'
    +'<div class="ff"><label>Loan Term (years)</label><input id="r'+ri+'-term" type="number" placeholder="e.g. 10" oninput="_autoSaveResorts()"></div>'
    +'</div>'
    +'<div class="frow">'
    +'<div class="ff"><label>Balance Remaining</label><input id="r'+ri+'-bal" type="number" placeholder="e.g. 15000" oninput="_autoSaveResorts()"></div>'
    +'<div class="ff readonly"><label>Combined Monthly</label><input id="r'+ri+'-comb" readonly placeholder="Auto"></div>'
    +'</div>'
    +'</div>';
}

function _fillPanel(ri, resort){
  var r=resort||{};
  function sv(id,v){var el=document.getElementById(id);if(el)el.value=v||'';}
  sv('r'+ri+'-name',r.name);sv('r'+ri+'-state',r.state);sv('r'+ri+'-city',r.city);
  sv('r'+ri+'-year',r.yearPurchased);sv('r'+ri+'-price',r.purchasePrice);
  var owners=r.owners||[];
  for(var o=0;o<4;o++)sv('r'+ri+'-o'+o,owners[o]||'');
  sv('r'+ri+'-mtf',r.maitFees||'');
  sv('r'+ri+'-mtg',r.monthlyMortgage||'');
  sv('r'+ri+'-term',r.mtgTerm||'');
  sv('r'+ri+'-bal',r.balanceAmount||'');
  if(r.mtfFreq==='monthly'){var el=document.getElementById('r'+ri+'-monthly');if(el)el.checked=true;}
  _calcPanel(ri);
}

function _calcPanel(ri){
  var raw=parseFloat((document.getElementById('r'+ri+'-mtf')||{}).value)||0;
  var isMonthly=(document.getElementById('r'+ri+'-monthly')||{}).checked;
  var mtfYr=isMonthly?raw*12:raw;
  var mtfMo=mtfYr/12;
  var mtg=parseFloat((document.getElementById('r'+ri+'-mtg')||{}).value)||0;
  var lbl=document.getElementById('r'+ri+'-mtflbl');
  var calc=document.getElementById('r'+ri+'-mtfcalc');
  var comb=document.getElementById('r'+ri+'-comb');
  if(lbl)lbl.textContent=isMonthly?'Annual (calculated)':'Monthly (calculated)';
  if(calc)calc.value=raw>0?(isMonthly?'$'+Math.round(mtfYr).toLocaleString()+'/yr':'$'+mtfMo.toFixed(2)+'/mo'):'';
  if(comb)comb.value=(mtfMo+mtg)>0?'$'+((mtfMo+mtg).toFixed(2))+'/mo':'';
}

function _readResort(ri){
  function gv(id){return(document.getElementById(id)||{}).value||'';}
  var isMonthly=(document.getElementById('r'+ri+'-monthly')||{}).checked;
  var raw=parseFloat(gv('r'+ri+'-mtf'))||0;
  return{
    name:gv('r'+ri+'-name'),state:gv('r'+ri+'-state'),city:gv('r'+ri+'-city'),
    yearPurchased:gv('r'+ri+'-year'),purchasePrice:parseFloat(gv('r'+ri+'-price'))||0,
    owners:[gv('r'+ri+'-o0'),gv('r'+ri+'-o1'),gv('r'+ri+'-o2'),gv('r'+ri+'-o3')],
    maitFees:isMonthly?raw*12:raw,mtfFreq:isMonthly?'monthly':'annual',
    monthlyMortgage:parseFloat(gv('r'+ri+'-mtg'))||0,
    mtgTerm:parseInt(gv('r'+ri+'-term'))||10,
    balanceAmount:parseFloat(gv('r'+ri+'-bal'))||0
  };
}

function _autoSaveResorts(){
  var resorts=_getResorts();
  // Update all visible panels
  for(var i=0;i<4;i++){
    var panel=document.getElementById('rpanel-'+i);
    if(panel&&panel.style.display!=='none'&&panel.offsetParent!==null){
      resorts[i]=_readResort(i);
    }
    _calcPanel(i);
  }
  _saveResorts(resorts);
  updateBanner();
}

function switchResort(ri){
  _activeResort=ri;
  document.querySelectorAll('.r-panel').forEach(function(p,i){p.classList.toggle('active',i===ri);});
  document.querySelectorAll('.r-tab').forEach(function(t,i){
    var resorts=_getResorts();
    var hasData=resorts[i]&&resorts[i].name;
    t.classList.remove('active','inactive','has-data');
    if(i===ri){t.classList.add('active');}
    else if(hasData){t.classList.add('has-data');}
    else{t.classList.add('inactive');}
  });
}

function activateResort(ri){
  // If already has data, just switch to it
  var resorts=_getResorts();
  var tab=document.getElementById('rtab-'+ri);
  if(resorts[ri]&&resorts[ri].name){
    switchResort(ri);
    return;
  }
  // Activate empty tab for data entry
  if(tab){tab.classList.remove('inactive');tab.classList.add('active');}
  switchResort(ri);
}

function removeResort(ri){
  if(!confirm('Remove Resort '+(ri+1)+'? This will clear all data for this resort.'))return;
  var resorts=_getResorts();
  resorts[ri]={};
  _saveResorts(resorts);
  var tab=document.getElementById('rtab-'+ri);
  if(tab){tab.classList.remove('active','has-data');tab.classList.add('inactive');}
  _fillPanel(ri,{});
  switchResort(0);
}

// Initialize panels on page load
window._initResortPanels=window.initResortPanels=function initResortPanels(){
  var container=document.getElementById('resort-panels');
  if(!container)return;
  var html='';
  for(var i=0;i<4;i++)html+=_panelHTML(i);
  container.innerHTML=html;
  // Load data
  var resorts=_getResorts();
  for(var j=0;j<4;j++){
    _fillPanel(j,resorts[j]);
    var hasData=resorts[j]&&resorts[j].name;
    var tab=document.getElementById('rtab-'+j);
    if(tab&&j>0){
      tab.classList.remove('active','inactive','has-data');
      if(hasData){tab.classList.add('has-data');}
      else{tab.classList.add('inactive');}
    }
  }
};
document.addEventListener("DOMContentLoaded",function(){window._initResortPanels();});
</script>

<script>
var SK='atc_clients_v2',AK='atc_active';
function ga(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function sa(o){localStorage.setItem(SK,JSON.stringify(o));}
function ac(){return localStorage.getItem(AK)||null;}
function ad(){var s=ac();return s?ga()[s]||null:null;}
function fc(n){return '$'+Math.round(n||0).toLocaleString();}

var _mtgType='paidfull';

function togglePlus(id){
  var el=document.getElementById(id);if(!el)return;
  el.classList.toggle('open');
  var ic=document.getElementById('pt-'+id);
  if(ic)ic.textContent=el.classList.contains('open')?'−':'+';
}

function selectMtgType(type){
  _mtgType=type;
  ['paidfull','owes','behind'].forEach(function(t){
    var b=document.getElementById('mt-'+t);
    if(b)b.classList.remove('active','paidfull','owes','behind');
  });
  var btn=document.getElementById('mt-'+type);
  if(btn){btn.classList.add('active',type);}

  // Show/hide sections
  var mtgInfo=document.getElementById('mtg-info');
  var behindInfo=document.getElementById('behind-info');
  if(type==='paidfull'){
    if(mtgInfo)mtgInfo.classList.remove('open');
    if(behindInfo)behindInfo.classList.remove('open');
  } else if(type==='owes'){
    if(mtgInfo)mtgInfo.classList.add('open');
    if(behindInfo)behindInfo.classList.remove('open');
  } else {
    if(mtgInfo)mtgInfo.classList.add('open');
    if(behindInfo)behindInfo.classList.add('open');
  }
  calcTotals();
  autoSave();
}

function calcTotals(){
  var raw=parseFloat(document.getElementById('f-mtf').value)||0;
  var isMonthly=document.getElementById('mtf-monthly')&&document.getElementById('mtf-monthly').checked;
  var mtf=isMonthly?raw*12:raw; // always work in annual internally
  var mtfMo=mtf/12;
  var mtgMo=parseFloat(document.getElementById('f-mtg').value)||0;
  var mo=mtfMo+(_mtgType==='paidfull'?0:mtgMo);
  var mtgBehind=(parseInt(document.getElementById('f-mtgb').value)||0)*mtgMo;
  var mtfBehind=(parseInt(document.getElementById('f-mtfb').value)||0)*mtfMo;

  // Update display label and readonly field
  var lbl=document.getElementById('mtf-display-lbl');
  var moEl=document.getElementById('f-mtf-mo');
  if(isMonthly){
    if(lbl)lbl.textContent='Annual MTF (calculated)';
    if(moEl)moEl.value=mtf>0?fc(mtf)+'/yr':'';
  } else {
    if(lbl)lbl.textContent='Monthly MTF (calculated)';
    if(moEl)moEl.value=mtf>0?fc(mtfMo)+'/mo':'';
  }

  // 3-year with 8% MTF growth
  var annMtf=mtf, annMtg=(_mtgType==='paidfull'?0:mtgMo*12);
  var three=(annMtf+annMtg)+(annMtf*1.08+annMtg)+(annMtf*1.08*1.08+annMtg);

  document.getElementById('tot-mo').textContent=fc(mo);
  document.getElementById('tot-yr').textContent=fc(mo*12);
  document.getElementById('tot-arr').textContent=fc(mtgBehind+mtfBehind);
  document.getElementById('tot-3yr').textContent=fc(three);

  // Update banner
  var mtgM=parseFloat(d.monthlyMortgage)||0;var mtfA=parseFloat(d.maitFees)||0;
  document.getElementById('vb-mo').textContent=mtgM>0?fc(mtgM)+'/mo mtg':'No mtg';
  document.getElementById('vb-yr').textContent=mtfA>0?fc(mtfA/12)+'/mo MTF':'No MTF';
}

var _timer=null;
function autoSave(){
  updateBanner();
  clearTimeout(_timer);
  _timer=setTimeout(function(){
    var s=ac();if(!s)return;
    var all=ga();if(!all[s])return;
    var g=function(id){var el=document.getElementById(id);return el?(el.value||'').trim():'';};
    all[s]=Object.assign(all[s],{
      firstName:g('f-first'),lastName:g('f-last'),
      phone:g('f-phone'),email:g('f-email'),
      coFirst:g('f-cofirst'),coLast:g('f-colast'),
      coPhone:g('f-cophone'),coEmail:g('f-coemail'),
      address:g('f-address'),city:g('f-city'),state:g('f-state'),zip:g('f-zip'),
      phone2:g('f-phone2'),
      resort:g('f-resort'),resortState:g('f-resstate'),resortCity:g('f-rescity'),
      yearPurchased:g('f-year'),purchasePrice:g('f-purchase'),
      whyOut:g('f-why'),
      maitFees:g('f-mtf'),monthlyMortgage:(_mtgType==='paidfull'?'0':g('f-mtg')),
      balanceAmount:g('f-balance'),interestRate:g('f-rate'),
      mtgBehind:g('f-mtgb'),mtfBehind:g('f-mtfb'),
      mortgageType:_mtgType,
      notes:g('f-notes'),
      _updated:Date.now()
    });
    sa(all);
  },600);
}

function updateBanner(){
  var f=(document.getElementById('f-first').value||'').trim();
  var l=(document.getElementById('f-last').value||'').trim();
  var r=(document.getElementById('f-resort').value||'').trim();
  var p=(document.getElementById('f-phone').value||'').trim();
  var rs=(document.getElementById('f-resstate').value||'').trim();
  var rc=(document.getElementById('f-rescity').value||'').trim();
  var loc=(rc?rc+', ':'')+rs;
  if(f||l){document.getElementById('vb-name').textContent=(f+' '+l).trim();}
  if(p)document.getElementById('vb-phone').textContent=p;
  if(r)document.getElementById('vb-resort').textContent=r;
  if(loc.trim())document.getElementById('vb-loc').textContent=loc.trim();
  calcTotals();
}

function loadData(){
  var d=ad();if(!d)return;
  var map={
    'f-first':'firstName','f-last':'lastName','f-phone':'phone','f-email':'email',
    'f-cofirst':'coFirst','f-colast':'coLast','f-cophone':'coPhone','f-coemail':'coEmail',
    'f-address':'address','f-city':'city','f-state':'state','f-zip':'zip',
    'f-phone2':'phone2','f-resort':'resort','f-resstate':'resortState','f-rescity':'resortCity',
    'f-year':'yearPurchased','f-purchase':'purchasePrice','f-why':'whyOut',
    'f-mtf':'maitFees','f-mtg':'monthlyMortgage','f-balance':'balanceAmount',
    'f-rate':'interestRate','f-mtgb':'mtgBehind','f-mtfb':'mtfBehind','f-notes':'notes'
  };
  Object.keys(map).forEach(function(id){
    var el=document.getElementById(id);
    if(el&&d[map[id]]!==undefined&&d[map[id]]!=='')el.value=d[map[id]];
  });

  // Mortgage type
  if(d.mortgageType)selectMtgType(d.mortgageType);
  else if(d.monthlyMortgage&&parseFloat(d.monthlyMortgage)>0)selectMtgType('owes');
  else selectMtgType('paidfull');

  // Auto-open plus sections if data exists
  if(d.coFirst||d.coLast){document.getElementById('second-owner').classList.add('open');document.getElementById('pt-second-owner').textContent='−';}
  if(d.address||d.phone2){document.getElementById('contact-info').classList.add('open');document.getElementById('pt-contact-info').textContent='−';}
  if(d.resortCity||d.yearPurchased||d.purchasePrice||d.whyOut){document.getElementById('resort-details').classList.add('open');document.getElementById('pt-resort-details').textContent='−';}
  if(d.notes){document.getElementById('notes-section').classList.add('open');document.getElementById('pt-notes-section').textContent='−';}

  calcTotals();updateBanner();

  // Update banner quote/stage
  var stages=['Intro','Assessment','True Cost','Quote','Acknowledgment','Contract','Funding','Completed'];
  var stg=stages[typeof d.vitalsStage==='number'?d.vitalsStage:1]||'Assessment';
  document.getElementById('vb-quote').textContent=d.alphaFee?fc(parseFloat(d.alphaFee)):'No quote yet';
  document.getElementById('vb-stg').textContent=stg;
}

function ownerSubmit(){
  autoSave();
  var s=ac();if(!s)return;
  var all=ga();if(!all[s])return;
  var sp=all[s]._savedPages||[];
  if(sp.indexOf('/owner/')<0)sp.push('/owner/');
  all[s]._savedPages=sp;all[s]._updated=Date.now();sa(all);
  var d=all[s];
  var sum='<strong>'+(d.firstName||'')+(d.lastName?' '+d.lastName:'')+'</strong>'
    +(d.resort?' &nbsp;·&nbsp; '+d.resort:'')
    +(d.maitFees?'<br>MTF: '+fc(parseFloat(d.maitFees))+'/yr':'')
    +(d.monthlyMortgage&&parseFloat(d.monthlyMortgage)>0?' &nbsp;·&nbsp; Mtg: '+fc(parseFloat(d.monthlyMortgage))+'/mo':'');
