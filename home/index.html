// ── DATA ──────────────────────────────────────────────────────────────────
var SK='atc_clients_v2', AK='atc_active';
function getAll(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};}}
function saveAll(o){localStorage.setItem(SK,JSON.stringify(o));}
function active(){return localStorage.getItem(AK)||null;}
function setActive(slug){
  localStorage.setItem(AK,slug);
  var all=getAll();
  if(all[slug]){all[slug]._visits=(all[slug]._visits||0)+1;all[slug]._updated=Date.now();saveAll(all);}

function activeData(){var s=active();return s?getAll()[s]||null:null;}

function fmtD(ts){if(!ts)return '—';return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function makeSlug(f,l){return ((f||'x')[0]+'.'+(l||'client')).toLowerCase().replace(/[^a-z0-9.]/g,'');}

  {n:'4a',ic:'✅', lb:'Money-Back Approval', ds:'Criteria & risk assessment', url:'/approval/'},
  {n:'4b',ic:'👨‍👩‍👧', lb:'Heirs & Estate Liability', ds:'Perpetuity & inheritance', url:'/heirs/'},
  {n:'4c',ic:'💵', lb:'Resort Compensation', ds:'What owners may recover', url:'/compensation/'},
  {n:'4d',ic:'💳', lb:'To Pay or Not to Pay', ds:'Credit & payment explained', url:'/credit/'},
  {n:'4e',ic:'✉️', lb:'Mutual Release Letter', ds:'What a release means', url:'/letter/'},
  {n:5, ic:'🛡', lb:'Certificate of Guarantee', ds:'100% money-back guarantee', url:'/guarantee/'},
  {n:6, ic:'⭐', lb:'Our Track Record', ds:'BBB A+, 41 years, 5-star reviews', url:'/history/'},
  {n:7, ic:'⚖️', lb:'Consumer Rights', ds:'Violations, statutes & fines', url:'/rights/'},
  {n:8, ic:'💰', lb:'True Cost', ds:'30-year projection', url:'/cost/'},
  {n:9, ic:'📄', lb:'Your Quote', ds:'Fee, term & financing', url:'/quote/'},
  {n:10,ic:'⏰', lb:'30 & 90 Day Follow-Up', ds:'Next contact dates', url:'/followup/'},
  {n:11,ic:'🏆', lb:'What Makes Alpha Better', ds:'Group filings & guarantees', url:'/better/'},
  {n:12,ic:'📦', lb:"What's Included", ds:'Services & results', url:'/included/'},
  {n:13,ic:'📋', lb:'Recap', ds:'After you sign', url:'/recap/'},

  {n:15,ic:'📝', lb:'Alpha Contract', ds:'Open enrollment agreement', url:'/contract/'},

];

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSB(){
  var d=activeData(), slug=active(), all=getAll();
  var cHTML='';
  if(d){
    var mo=(parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12);
    cHTML='<div class="sb-client">'
      +'<div class="sb-stage">'+(d.alphaFee?'Quoted':'Assessment')+'</div>'
      +'<div class="sb-name">'+(d.firstName||'')+' '+(d.lastName||'')+'</div>'
      +'<div class="sb-resort">'+(d.resort||'No resort')+'</div>'
      +'<div class="sb-stats">'
        +'<div class="sb-stat"><div class="sl">Monthly</div><div class="sv">'+fmtC(mo)+'</div></div>'
        +'<div class="sb-stat"><div class="sl">Yearly</div><div class="sv">'+fmtC(mo*12)+'</div></div>'
        +'<div class="sb-stat"><div class="sl">MTF/yr</div><div class="sv">'+fmtC(parseFloat(d.maitFees)||0)+'</div></div>'
        +'<div class="sb-stat"><div class="sl">Visits</div><div class="sv">'+(d._visits||1)+'</div></div>'
      +'</div>'
      +(d.alphaFee?'<div class="sb-quote">📄 '+fmtC(d.alphaFee)+' · '+(d.selectedTerm||'—')+' mo</div>':'')
      +'<div class="sb-meta">Last: '+fmtD(d._updated)+'</div>'
    +'</div>';
  } else {
    cHTML='<div class="sb-no-client">⚠️ No client selected</div>';
  }

  var opts=Object.keys(all).map(function(k){
    var c=all[k];
    return '<option value="'+k+'"'+(k===slug?' selected':'')+'>'
      +(c.firstName||'')+(c.lastName?' '+c.lastName:'')+(c.resort?' — '+c.resort:'')+'</option>';
  }).join('');

  var nav=PG.map(function(p){
    var saved=d&&d._savedPages&&d._savedPages.indexOf(p.url)>-1;
    var href=p.url;
    return '<a href="'+href+'" class="sb-link" data-url="'+p.url+'">'
      +'<span class="sb-num">'+p.n+'</span>'
      +'<span style="flex:1">'+p.ic+' '+p.lb+'</span>'
      +(saved?'<span style="color:#1a7a3c;font-size:10px;flex-shrink:0">✓</span>':'')
    +'</a>';
  }).join('');

  var calV=d?('<input type="datetime-local" class="sb-cal-in" id="sb-ta" value="'+(d._todayAppt||'')+'" onchange="saveAppt('t',this.value)">'
    +'<div class="sb-cal-lbl" style="margin-top:6px">📅 Follow-Up</div>'
    +'<input type="datetime-local" class="sb-cal-in" id="sb-fa" value="'+(d._fuAppt||'')+'" onchange="saveAppt('f',this.value)">'
    +'<button class="sb-b" style="margin-top:4px;font-size:10px;width:100%" onclick="addCal()">+ Google Calendar</button>')
    :'<div style="font-size:11px;color:rgba(255,255,255,.3);padding:4px">Select a client first</div>';

  document.getElementById('sb').innerHTML=
    '<div class="sb-logo"><img src="https://alphatimeshareconsultants.com/wp-content/uploads/2026/04/Alpha-TimeShare-Consultants-logo.png" alt="ATC"></div>'
    +cHTML
    +'<div class="sb-sel"><select class="sb-select" onchange="switchC(this.value)"><option value="">— Select client —</option>'+opts+'</select>'
    +'<div class="sb-brow"><button class="sb-b" onclick="openNC()">+ New</button><button class="sb-b out" onclick="saveClear()">Save &amp; Clear</button></div></div>'
    +'<nav class="sb-nav">'+nav+'</nav>'
    +'<div class="sb-cal"><div class="sb-cal-lbl">📅 Today</div>'+calV+'</div>'
    +'<div class="sb-rpts"><div class="sb-cal-lbl">📋 Reports</div>'
    +'<button class="sb-rpt" onclick="rpt('vero')">📋 Vero</button>'
    +'<button class="sb-rpt" onclick="rpt('crm')">📋 CRM Note</button>'
    +'<button class="sb-rpt" onclick="rpt('sms')">💬 SMS</button>'
    +'<button class="sb-rpt" onclick="rpt('full')">📄 Full Summary</button>'

function switchC(slug){if(!slug)return;setActive(slug);toast('Loaded');setTimeout(function(){location.reload();},500);}
function openNC(){document.getElementById('nc-ov').classList.add('on');setTimeout(function(){document.getElementById('nc-f').focus();},100);}
function closeNC(){document.getElementById('nc-ov').classList.remove('on');}
function createC(){
  var f=document.getElementById('nc-f').value.trim();
  var l=document.getElementById('nc-l').value.trim();
  var r=document.getElementById('nc-r').value.trim();
  if(!f&&!l){alert('Please enter a name.');return;}
  var slug=makeSlug(f,l);
  var all=getAll();
  all[slug]=Object.assign(all[slug]||{_created:Date.now()},{firstName:f,lastName:l,resort:r,_visits:1,_updated:Date.now()});
  saveAll(all);setActive(slug);closeNC();
  toast('Created: '+f+' '+l);
  setTimeout(function(){location.href='/owner/';},700);
}
function saveClear(){
  var d=activeData();if(!d){alert('No active client.');return;}
  var saved=d._savedPages||[];
  var list=PG.map(function(p){
    var ok=saved.indexOf(p.url)>-1;
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:13px">'
      +'<span style="color:'+(ok?'#1a7a3c':'#d1d5db')+';font-size:14px">'+(ok?'✓':'○')+'</span>'+p.ic+' '+p.lb+'</div>';
  }).join('');
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center';
  ov.innerHTML='<div style="background:#fff;border-radius:12px;padding:24px;max-width:420px;width:100%;margin:20px;max-height:80vh;overflow-y:auto">'
    +'<div style="font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:8px">✓ '+(d.firstName||'')+' '+(d.lastName||'')+' — Saved</div>'
    +'<div style="background:#EAF0F8;border-left:3px solid #1B2A4A;padding:10px 12px;border-radius:4px;font-size:13px;margin-bottom:12px;color:#1B2A4A">'+(d.resort||'No resort')+'</div>'
    +list
    +'<div style="display:flex;gap:8px;margin-top:14px">'
    +'<button onclick="this.closest('div[style]').remove()" style="flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:6px;border:1.5px solid #1B2A4A;background:#fff;cursor:pointer">Cancel</button>'
    +'<button onclick="doClear()" style="flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:6px;border:none;background:#C8960C;color:#fff;cursor:pointer">Clear &amp; New</button>'
    +'</div></div>';
  document.body.appendChild(ov);
}
function doClear(){localStorage.removeItem(AK);toast('Cleared');setTimeout(function(){location.href='/home/';},700);}
function saveAppt(t,v){var s=active();if(!s)return;var all=getAll();if(!all[s])return;if(t==='t')all[s]._todayAppt=v;else all[s]._fuAppt=v;saveAll(all);}
function addCal(){
  var d=activeData();var fu=d&&d._fuAppt;if(!fu){alert('Set a follow-up date first.');return;}
  var dt=new Date(fu);var fmt=function(x){return x.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';};
  var end=new Date(dt.getTime()+3600000);
  var name=(d.firstName||'Client')+' — ATC Follow-Up';
  window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(name)+'&dates='+fmt(dt)+'/'+fmt(end),'_blank');
}
function rpt(type){
  var d=activeData();if(!d){toast('No active client','#c0392b');return;}
  var name=((d.firstName||'')+' '+(d.lastName||'')).trim();
  var mo=fmtC((parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12));
  var txt='';
  if(type==='vero')txt='Name: '+name+'
Resort: '+(d.resort||'—')+'
Phone: '+(d.phone||'—')+'
2nd: '+(d.phone2||'—')+'
Email: '+(d.email||'—')+'
Address: '+(d.address||'—');
  else if(type==='crm')txt='=== CALL NOTES '+new Date().toLocaleDateString()+' ===
Client: '+name+'
Resort: '+(d.resort||'—')+'
Phone: '+(d.phone||'—')+'
Monthly: '+mo+'
MTF: '+fmtC(d.maitFees)+'/yr
Mortgage: '+fmtC(d.monthlyMortgage)+'/mo
Quote: '+(d.alphaFee?fmtC(d.alphaFee):'—')+'
Term: '+(d.selectedTerm||'—')+' mo
Motivation: '+(d.motivation||'—')+'/10
Follow-Up: '+(d._fuAppt||'—')+'
Notes: '+(d.notes||'—');
  else if(type==='sms')txt='Hi '+(d.firstName||'there')+', this is Sebastian at Alpha Timeshare Consultants. Following up on your '+(d.resort||'timeshare')+' ownership. Good time to connect? (877) 848-3948 Ext. 134';
  else txt='ALPHA TIMESHARE CONSULTANTS
'+new Date().toLocaleDateString()+'

Client: '+name+'
Resort: '+(d.resort||'—')+'
Phone: '+(d.phone||'—')+'
Email: '+(d.email||'—')+'
Monthly: '+mo+'
MTF: '+fmtC(d.maitFees)+'/yr
Mortgage: '+fmtC(d.monthlyMortgage)+'/mo
Quote: '+(d.alphaFee?fmtC(d.alphaFee):'—')+' / '+(d.selectedTerm||'—')+' mo
Follow-Up: '+(d._fuAppt||'—')+'
Notes: '+(d.notes||'—');
  try{navigator.clipboard.writeText(txt).then(function(){toast('✓ Copied');});}
  catch(e){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✓ Copied');}
}
function toast(msg,color){var t=document.getElementById('tst');t.style.background=color||'#1a7a3c';t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}

// ── ICON GRID ─────────────────────────────────────────────────────────────
function buildGrid(){
  var d=activeData();
  var saved=d?(d._savedPages||[]):[];
  var html='';
  PG.forEach(function(p){
    var isSaved=saved.indexOf(p.url)>-1;
    html+='<a href="'+p.url+'" class="icon-card'+(isSaved?' saved':'')+'">'
      +'<span class="ic-num">'+p.n+'</span>'
      +(isSaved?'<span class="ic-check">✓</span>':'')
      +'<span class="ic-icon">'+p.ic+'</span>'
      +'<div class="ic-label">'+p.lb+'</div>'
      +'<div class="ic-desc">'+p.ds+'</div>'
    +'</a>';
  });
  document.getElementById('grid').innerHTML=html;
}

buildSB();
buildGrid();
</script>

  else txt='ALPHA TIMESHARE CONSULTANTS\n'+new Date().toLocaleDateString()+'\n\nClient: '+name+'\nResort: '+(d.resort||'—')+'\nPhone: '+(d.phone||'—')+'\nEmail: '+(d.email||'—')+'\nMonthly: '+mo+'\nMTF: '+fc(d.maitFees)+'/yr\nMortgage: '+fc(d.monthlyMortgage)+'/mo\nQuote: '+(d.alphaFee?fc(d.alphaFee):'—')+' / '+(d.selectedTerm||'—')+' mo\nFollow-Up: '+(d._fuAppt||'—')+'\nNotes: '+(d.notes||'—');
  try{navigator.clipboard.writeText(txt).then(function(){toast('✓ Copied');});}
  catch(e){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✓ Copied');}
};

function toast(msg,color){
  var t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='display:none;position:fixed;bottom:24px;left:240px;background:#1a7a3c;color:#fff;padding:10px 18px;font-size:13px;font-weight:600;border-radius:8px;z-index:700;box-shadow:0 4px 16px rgba(0,0,0,.2)';document.body.appendChild(t);}
  t.style.background=color||'#1a7a3c';t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},2500);
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',buildNav);}
else{buildNav();}
})();
</script>


<script id="vitals-banner-js">
(function(){
  function initVitalsBanner(){
    var SK='atc_clients_v2',AK='atc_active';
    function ga(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
    function fc(n){return '$'+Math.round(n||0).toLocaleString();}
    var s=localStorage.getItem(AK);
    if(!s)return;
    var d=ga()[s];if(!d)return;
    var mo=(parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12);
    var stages=['Intro','Assessment','True Cost','Quote','Acknowledgment','Contract','Funding','Completed'];
    var stage=stages[typeof d.vitalsStage==='number'?d.vitalsStage:1]||'Assessment';
    function set(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}
    set('vb-name',((d.firstName||'')+(d.lastName?' '+d.lastName:'')).trim()||'—');
    set('vb-phone',d.phone||'—');
    set('vb-resort',d.resort||'—');
    set('vb-location',d.location||'—');
    set('vb-mo',mo>0?fc(mo)+'/mo':'—');
    set('vb-yr',mo>0?fc(mo*12)+'/yr':'—');
    set('vb-quote',d.alphaFee?fc(parseFloat(d.alphaFee)):'No quote yet');
    set('vb-stage',stage);
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initVitalsBanner);}
  else{initVitalsBanner();}
})();
</script>
