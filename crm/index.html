<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CRM</title>
<style>
body { font-family: Arial; margin: 20px; }
input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
button { padding: 10px; margin-top: 10px; cursor: pointer; }
.card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
</style>
</head>

<body>

<h1>CRM Dashboard</h1>

<input id="clientId" placeholder="Client ID (e.g. 7706336318)">
<textarea id="notes" placeholder="Client Notes"></textarea>

<button onclick="saveClient()">Save Client</button>
<button onclick="loadClient()">Load Client</button>

<h2>Saved Clients</h2>
<div id="list"></div>

<script>
// 🧠 SAVE CLIENT (local browser storage)
function saveClient() {
    const id = document.getElementById("clientId").value;
    const notes = document.getElementById("notes").value;

    if (!id) return alert("Enter Client ID");

    const data = {
        id,
        notes,
        updated: new Date().toISOString()
    };

    localStorage.setItem("client_" + id, JSON.stringify(data));
    renderList();
    alert("Saved locally");
}

// 📥 LOAD CLIENT
function loadClient() {
    const id = document.getElementById("clientId").value;
    const data = JSON.parse(localStorage.getItem("client_" + id));

    if (!data) return alert("Client not found");

    document.getElementById("notes").value = data.notes;
}

// 📋 SHOW ALL CLIENTS
function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    for (let key in localStorage) {
        if (key.startsWith("client_")) {
            const data = JSON.parse(localStorage.getItem(key));

            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <b>ID:</b> ${data.id}<br>
                <b>Notes:</b> ${data.notes}<br>
                <small>${data.updated}</small>
            `;
            list.appendChild(div);
        }
    }
}

renderList();
</script>

</body>
</html>
