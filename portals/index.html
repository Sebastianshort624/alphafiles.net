<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Client Portal — Alpha Timeshare Consultants</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--gold:#C8960C;--border:#e5e7eb;--bg:#f0f4f8;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);min-height:100vh}
.topbar{background:var(--navy);height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tl{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:900;color:#fff}
.tl span{color:var(--gold)}
.back-btn{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:none}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px}
.client-hdr{background:linear-gradient(135deg,var(--navy),#243a6e);border-radius:12px;padding:24px;margin-bottom:16px;color:#fff}
.ch-eye{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(200,150,12,.8);margin-bottom:6px}
.ch-name{font-family:"Barlow Condensed",sans-serif;font-size:36px;font-weight:900;margin-bottom:3px}
.ch-resort{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:16px}
.ch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ch-stat{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;text-align:center}
.ch-val{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--gold)}
.ch-lbl{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* RECAP */
.recap-card{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.recap-hdr{background:var(--navy);padding:12px 18px;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.recap-item{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151}
.recap-item:last-child{border:none}
.recap-check{color:var(--green);font-size:16px;flex-shrink:0}
/* CONTACT */
.contact-card{background:var(--navy);border-radius:10px;padding:20px 24px;margin-bottom:14px;display:flex;align-items:center;gap:20px}
.contact-avatar{width:56px;height:56px;border-radius:50%;background:rgba(200,150,12,.2);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.contact-name{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:2px}
.contact-title{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:8px}
.contact-btns{display:flex;gap:8px;flex-wrap:wrap}
.contact-btn{background:rgba(200,150,12,.15);border:1px solid rgba(200,150,12,.35);color:var(--gold);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;text-decoration:none}
/* PAGE CARDS */
.page-card{background:#fff;border:1.5px solid var(--border);border-left:4px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;text-decoration:none;color:inherit}
.page-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);transform:translateY(-1px)}
.pc-icon{font-size:22px;flex-shrink:0}
.pc-name{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.pc-meta{font-size:11px;color:#9ca3af;margin-top:2px}
.pc-arrow{margin-left:auto;font-size:20px;color:var(--gold);flex-shrink:0}
/* PAGE CONTENT */
.slbl{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid #fef3c7;padding-bottom:5px;margin-bottom:14px}
.sc{background:#fff;border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:12px}
.ctbl{width:100%;border-collapse:collapse}
.ctbl th{background:var(--navy);color:#fff;padding:9px 12px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ctbl th:first-child{text-align:left}
.ctbl td{padding:9px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:600;color:var(--navy)}
.ctbl td:first-child{text-align:left;font-family:Inter,sans-serif;font-size:12px;font-weight:700;color:#374151}
.ctbl tr:last-child td{border:none}
.pay-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px}
.footer{text-align:center;padding:24px;font-size:11px;color:#9ca3af;border-top:1px solid var(--border);margin-top:16px}
@media(max-width:500px){.ch-stats{grid-template-columns:1fr 1fr}.contact-card{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">⚡ <span>Alpha Timeshare Consultants</span></div>
  <a id="back-btn" class="back-btn" href="#">← My Portal</a>
</div>
<div class="wrap" id="root"><div style="text-align:center;padding:60px;color:#9ca3af">Loading your portal…</div></div>

<script>
function fc(n){return n?"$"+Math.round(n).toLocaleString():"—";}
function fcd(n){return n?"$"+parseFloat(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function moPmt(p,mo){var r=0.20/12;return p>0?p*r*Math.pow(1+r,mo)/(Math.pow(1+r,mo)-1):0;}
function cumMtf(y,yr){var t=0;for(var i=1;i<=y;i++)t+=yr*Math.pow(1.08,i-1);return t;}
function cumMtg(y,mo,yrs){return mo*Math.min(y,yrs)*12;}

// Try to decode from hash first (shared link from any device), then localStorage
function loadData(){
  var hash=window.location.hash.slice(1);
  if(hash&&hash.length>10){
    try{return JSON.parse(decodeURIComponent(escape(atob(hash))));}catch(e){}
  }
  // Fallback: try slug param + localStorage
  var params=new URLSearchParams(window.location.search);
  var slug=params.get("s")||"";
  if(!slug)return null;
  var snap={};try{snap=JSON.parse(localStorage.getItem("portal_snap_"+slug)||"{}");}catch(e){}
  var portal={};try{portal=JSON.parse(localStorage.getItem("portal_"+slug)||"{}");}catch(e){}
  if(!Object.keys(portal).length)return null;
  return{snap:snap,portal:portal,slug:slug,agent:{name:"Sebastian Short",ext:"134",company:"Alpha Timeshare Consultants",phone:"(800) 000-0000"}};
}

var PAGE_ICONS={owner:"🏠",current:"📊",whyout:"❓",leverage:"💪",credit:"💳",wait:"⚠️",group:"🔍",approval:"✅",heirs:"👨‍👩‍👧",compensation:"💵",proof:"🔗",letter:"✉️",guarantee:"🛡️","exit-methods":"🚪",history:"⭐",rights:"⚖️",cost:"💰",quote:"📄",savings:"💵",free:"🎉",better:"🏆",included:"📦",recap:"📋",contract:"📝",checklist:"✅","timeshare-free":"🎉"};

var PAGE_DESC={
  current:"Your current costs reviewed",leverage:"Why the resort negotiates",credit:"Credit protection plan",
  wait:"What happens if nothing changes",heirs:"Estate and heir liability",group:"Why group filings work",
  approval:"Your spot in the group",compensation:"Possible resort compensation",
  rights:"Your consumer rights",cost:"True cost of ownership",quote:"Your service fee proposal",
  savings:"What you save with Alpha",guarantee:"Your written guarantee",
  "exit-methods":"Your 4 options explained",better:"Why Alpha is different",
  included:"What's included in your case",contract:"Your agreement explained"
};

var RENDERERS={
  cost:function(snap){
    var yr=parseFloat(snap.maitFees)||0,mo=yr/12,mtgMo=parseFloat(snap.monthlyMortgage)||0,yrs=parseInt(snap.mtgTerm)||10;
    if(!mo&&!mtgMo)return"<p style='color:#9ca3af'>No financial data.</p>";
    var TF=[{l:"1 Year",y:1},{l:"3 Years",y:3},{l:"5 Years",y:5},{l:"10 Years",y:10},{l:"20 Years",y:20}];
    var rows=TF.map(function(tf){var c=cumMtg(tf.y,mtgMo,yrs)+cumMtf(tf.y,yr);var g=c;return"<tr><td>"+tf.l+"</td><td style='color:#15803d;font-weight:700'>"+fcd(g)+"</td><td style='color:#9ca3af'>"+fcd(cumMtg(tf.y,mtgMo,yrs)+yr*tf.y)+"</td></tr>";}).join("");
    return"<div class='sc'><div class='slbl'>Cost With 8% Annual Growth Rate</div><table class='ctbl'><thead><tr><th style='text-align:left'>Timeframe</th><th style='color:#86efac'>With 8% Growth</th><th>Total Paid</th></tr></thead><tbody>"+rows+"</tbody></table></div>";
  },
  quote:function(snap){
    var fee=parseFloat(snap.alphaFee)||0;
    if(!fee)return"<div class='sc'><p style='color:#9ca3af'>Quote not yet available. Contact your representative.</p></div>";
    var yr=parseFloat(snap.maitFees)||0,mtgMo=parseFloat(snap.monthlyMortgage)||0,yrs=parseInt(snap.mtgTerm)||10;
    var mo60=moPmt(fee,60),pif=fee*0.97,save=(cumMtg(5,mtgMo,yrs)+cumMtf(5,yr))-fee;
    return"<div class='sc'><div class='slbl'>Alpha Service Fee</div>"
      +"<div class='pay-opt' style='border-color:#15803d;background:#f0fdf4'><div><div style='font-weight:700;font-size:14px;color:var(--navy)'>💰 Pay in Full</div><div style='font-size:11px;color:#9ca3af'>3% discount applied — best value</div></div><div style='font-family:Cormorant Garamond,serif;font-size:24px;font-weight:700;color:#15803d'>"+fcd(pif)+"</div></div>"
      +"<div class='pay-opt'><div><div style='font-weight:700;font-size:14px;color:var(--navy)'>Monthly Plan</div><div style='font-size:11px;color:#9ca3af'>60 months · $0 down · starts month 2</div></div><div style='font-family:Cormorant Garamond,serif;font-size:24px;font-weight:700;color:var(--navy)'>"+fcd(mo60)+"/mo</div></div>"
      +(save>0?"<div style='background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 14px;margin-top:4px;display:flex;justify-content:space-between;align-items:center'><span style='font-size:13px;color:#374151'>You save vs. 5 years of payments</span><span style='font-family:Cormorant Garamond,serif;font-size:20px;font-weight:700;color:#15803d'>+"+fc(save)+"</span></div>":"")
      +"</div>";
  },
  guarantee:function(){
    return"<div class='sc' style='background:#f0fdf4;border-color:#86efac;text-align:center'>"
      +"<div style='font-size:36px;margin-bottom:8px'>🛡️</div>"
      +"<div style='font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:900;color:#15803d;margin-bottom:8px'>Written Money-Back Guarantee</div>"
      +"<div style='font-size:13px;color:#166534;line-height:1.7'>If Alpha Timeshare Consultants does not obtain a Favorable Outcome within <strong>36 months</strong>, you receive a <strong>full refund</strong> of your service fee. In writing. In your contract.</div>"
      +"<div style='margin-top:12px;padding-top:12px;border-top:1px solid #86efac;font-size:12px;color:#9ca3af'>A Favorable Outcome does not include compensation.</div>"
      +"</div>";
  },
  rights:function(){
    var rows=[["Full Cost Disclosure","TILA §128","30-year cost not disclosed","Up to $75,000"],["Rescission Rights","State Law","Cancellation window misrepresented","Up to $60,000"],["Resale Market","FTC Act §5","No secondary market not disclosed","Up to $50,000"],["Annual Fee Growth","TILA §128","8% increase rate not disclosed","Up to $55,000"]];
    return"<div class='sc'><table class='ctbl'><thead><tr><th style='text-align:left'>Right</th><th style='text-align:left'>Statute</th><th style='text-align:left'>Issue</th><th>Possible Penalty</th></tr></thead><tbody>"
      +rows.map(function(r){return"<tr><td>"+r[0]+"</td><td style='font-size:11px;color:#6b7280'>"+r[1]+"</td><td style='font-size:12px'>"+r[2]+"</td><td style='color:#dc2626;font-weight:700'>"+r[3]+"</td></tr>";}).join("")
      +"</tbody></table></div>";
  }
};

function renderGeneric(label){
  return"<div class='sc'><p style='font-size:13px;color:#374151;line-height:1.7'>Your representative will walk you through this section. Contact Sebastian Short at the information below with any questions.</p></div>";
}

function clientHeader(snap,portal,agent){
  var nm=snap?((snap.firstName||"")+(snap.lastName?" "+snap.lastName:"")).trim():"Client";
  var resort=snap?snap.resort||"":"";
  var mo=snap?(parseFloat(snap.maitFees)||0)/12+(parseFloat(snap.monthlyMortgage)||0):0;
  var fee=snap?parseFloat(snap.alphaFee)||0:0;
  var cnt=Object.keys(portal).length;
  return"<div class='client-hdr'><div class='ch-eye'>Your Personal Case File</div><div class='ch-name'>"+nm+"</div><div class='ch-resort'>"+resort+"</div>"
    +"<div class='ch-stats'><div class='ch-stat'><div class='ch-val'>"+(mo>0?fcd(mo):"-")+"</div><div class='ch-lbl'>Monthly Cost</div></div>"
    +"<div class='ch-stat'><div class='ch-val'>"+cnt+"</div><div class='ch-lbl'>Pages Published</div></div>"
    +"<div class='ch-stat'><div class='ch-val'>"+(fee>0?"$"+Math.round(fee).toLocaleString():"TBD")+"</div><div class='ch-lbl'>Alpha Fee</div></div></div></div>";
}

function contactSection(agent){
  var a=agent||{name:"Sebastian Short",ext:"134",company:"Alpha Timeshare Consultants"};
  return"<div class='contact-card'><div class='contact-avatar'>👤</div><div><div class='contact-name'>"+a.name+"</div><div class='contact-title'>"+a.company+(a.ext?" · Ext. "+a.ext:"")+"</div><div class='contact-btns'>"
    +(a.phone?"<a href='tel:"+a.phone+"' class='contact-btn'>📞 Call</a>":"")
    +(a.email?"<a href='mailto:"+a.email+"' class='contact-btn'>✉️ Email</a>":"")
    +"<span class='contact-btn'>💬 Text</span></div></div></div>";
}

function recapSection(portal,completed){
  var pages=Object.keys(portal).sort(function(a,b){return(portal[a].pushed||0)-(portal[b].pushed||0);});
  if(!pages.length)return"";
  return"<div class='recap-card'><div class='recap-hdr'>✅ What We Covered Together</div>"
    +pages.map(function(pid){
      var p=portal[pid];
      var desc=PAGE_DESC[pid]||p.label;
      return"<div class='recap-item'><div class='recap-check'>✓</div><div><div style='font-weight:600'>"+p.label+"</div><div style='font-size:12px;color:#9ca3af;margin-top:1px'>"+desc+"</div></div></div>";
    }).join("")+"</div>";
}

function showDirectory(data){
  var snap=data.snap,portal=data.portal,agent=data.agent;
  var pages=Object.keys(portal).sort(function(a,b){return(portal[a].pushed||0)-(portal[b].pushed||0);});
  var nm=snap?((snap.firstName||"")+(snap.lastName?" "+snap.lastName:"")).trim():"Client";
  document.title=nm+" — Alpha Portal";

  var cards=pages.map(function(pid){
    var p=portal[pid];
    var icon=PAGE_ICONS[pid]||"📄";
    var date=p.pushed?new Date(p.pushed).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"-";
    // Encode page view URL
    var pagePayload=Object.assign({},data,{page:pid});
    var pageHash=btoa(unescape(encodeURIComponent(JSON.stringify(pagePayload))));
    return"<a class='page-card' href='/portals/#"+pageHash+"'>"
      +"<div class='pc-icon'>"+icon+"</div>"
      +"<div><div class='pc-name'>"+p.label+"</div><div class='pc-meta'>"+date+"</div></div>"
      +"<div class='pc-arrow'>›</div></a>";
  }).join("");

  document.getElementById("root").innerHTML=
    clientHeader(snap,portal,agent)
    +contactSection(agent)
    +recapSection(portal,{})
    +"<div style='font-family:Barlow Condensed,sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:16px 0 10px'>Your Published Pages</div>"
    +cards
    +"<div class='footer'><strong>Alpha Timeshare Consultants</strong><br>Confidential — prepared for "+nm+" only</div>";
}

function showPage(data){
  var snap=data.snap,portal=data.portal,agent=data.agent,pid=data.page;
  var p=portal[pid];if(!p){showDirectory(data);return;}
  document.title=p.label+" — Alpha Portal";
  var backBtn=document.getElementById("back-btn");
  if(backBtn){backBtn.style.display="block";backBtn.href="javascript:history.back()";}
  var renderer=RENDERERS[pid];
  var body=renderer?renderer(snap):renderGeneric(p.label);
  var date=p.pushed?new Date(p.pushed).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):"";
  document.getElementById("root").innerHTML=
    clientHeader(snap,portal,agent)
    +"<div class='slbl' style='margin-top:4px'>"+(PAGE_ICONS[pid]||"📄")+" "+p.label+"</div>"
    +body
    +"<div style='font-size:10px;color:#9ca3af;text-align:right;margin-bottom:12px'>Published "+date+(p.pushedBy?" by "+p.pushedBy:"")+"</div>"
    +"<a href='javascript:history.back()' style='display:inline-flex;align-items:center;gap:6px;color:var(--navy);font-size:13px;font-weight:700;text-decoration:none;padding:10px 18px;background:#fff;border:1.5px solid var(--border);border-radius:8px'>← Back to My Portal</a>"
    +"<div class='footer'><strong>Alpha Timeshare Consultants</strong><br>Confidential — prepared for "+((snap.firstName||"")+" "+(snap.lastName||"")).trim()+" only</div>";
}

// MAIN
var data=loadData();
if(!data){
  document.getElementById("root").innerHTML=
    "<div style='text-align:center;padding:60px 20px'><div style='font-size:36px;margin-bottom:16px'>🔒</div><h2 style='font-family:Barlow Condensed,sans-serif;font-size:24px;color:var(--navy);margin-bottom:8px'>Portal Not Available</h2><p style='font-size:13px;color:#6b7280;line-height:1.7'>This link may have expired or the portal hasn't been published yet.<br>Contact your Alpha Timeshare Consultants representative for an updated link.</p></div>";
} else if(data.page){
  showPage(data);
} else {
  showDirectory(data);
}
</script>
</body>
</html>
