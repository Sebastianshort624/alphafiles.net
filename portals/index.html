<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Client Portals — Alpha Files</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--gold:#C8960C;--border:#e5e7eb;--bg:#f8fafc;--text:#1a1a2e;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tl{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px}
.tl span{color:var(--gold)}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px}
.ph{background:linear-gradient(135deg,var(--navy),#243a6e);color:#fff;border-radius:10px;padding:20px 22px;margin-bottom:20px}
.ph-eye{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(200,150,12,.8);margin-bottom:5px}
.ph-title{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:900;margin-bottom:3px}
.ph-sub{font-size:13px;color:rgba(255,255,255,.6)}
/* Directory */
.portal-card{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;text-decoration:none;color:var(--text);border-left:4px solid var(--gold)}
.portal-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);transform:translateY(-1px)}
.pc-avatar{width:42px;height:42px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:900;flex-shrink:0}
.pc-name{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;color:var(--navy);margin-bottom:2px}
.pc-meta{font-size:11px;color:#6b7280}
.pc-badge{margin-left:auto;text-align:right;flex-shrink:0}
.pc-count{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--gold)}
.pc-clabel{font-size:10px;color:#9ca3af}
/* Client portal view */
.client-hdr{background:linear-gradient(135deg,var(--navy),#243a6e);border-radius:12px;padding:24px;margin-bottom:20px;color:#fff}
.ch-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(200,150,12,.8);margin-bottom:6px}
.ch-name{font-family:"Barlow Condensed",sans-serif;font-size:32px;font-weight:900;margin-bottom:4px}
.ch-resort{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:16px}
.ch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ch-stat{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;text-align:center}
.ch-stat-val{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--gold)}
.ch-stat-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.page-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:500px){.page-grid{grid-template-columns:1fr}}
.page-card{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;text-decoration:none;color:var(--text);display:block;transition:.15s;border-left:4px solid var(--gold)}
.page-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);transform:translateY(-1px)}
.pg-title{font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:800;color:var(--navy);margin-bottom:3px}
.pg-meta{font-size:10px;color:#9ca3af}
.sec{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid #fef3c7;padding-bottom:5px;margin-bottom:14px;margin-top:20px}
.empty-state{text-align:center;padding:40px;color:#9ca3af}
.footer{text-align:center;padding:20px;font-size:11px;color:#9ca3af;border-top:1px solid var(--border);margin-top:20px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:12px;font-weight:600;text-decoration:none;padding:5px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;margin-left:auto}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">⚡ <span>Alpha Files</span></div>
  <span id="topbar-back"></span>
</div>

<div class="wrap">
  <div id="page-content"></div>
</div>

<script>
var SK='atc_clients_v2';
function ga(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function getPortal(slug){try{return JSON.parse(localStorage.getItem('portal_'+slug)||'{}');}catch(e){return{};}}
function fc(n){return n&&n>0?'$'+Math.round(n).toLocaleString():'—';}

// Check if viewing a specific client (?s=slug)
var params=new URLSearchParams(window.location.search);
var clientSlug=params.get('s')||params.get('client')||'';

if(clientSlug){
  showClient(clientSlug);
} else {
  showDirectory();
}

function showClient(slug){
  document.getElementById('topbar-back').innerHTML='<a href="/portals/" class="back-link">← All Portals</a>';
  document.title='Client Portal — Alpha Files';

  var all=ga();
  var client=all[slug]||{};
  var portal=getPortal(slug);
  var pages=Object.keys(portal).sort(function(a,b){return(portal[a].pushed||0)-(portal[b].pushed||0);});
  var nm=((client.firstName||'')+(client.lastName?' '+client.lastName:'')).trim()||slug;
  var mo=(parseFloat(client.monthlyMortgage)||0)+((parseFloat(client.maitFees)||0)/12);

  document.getElementById('page-content').innerHTML=
    '<div class="client-hdr">'
      +'<div class="ch-label">Your Personal Portal</div>'
      +'<div class="ch-name">'+nm+'</div>'
      +'<div class="ch-resort">'+(client.resort||'Alpha Timeshare Consultants')+'</div>'
      +'<div class="ch-stats">'
        +'<div class="ch-stat"><div class="ch-stat-val">'+fc(mo)+'</div><div class="ch-stat-label">Monthly Cost</div></div>'
        +'<div class="ch-stat"><div class="ch-stat-val">'+pages.length+'</div><div class="ch-stat-label">Pages Published</div></div>'
        +'<div class="ch-stat"><div class="ch-stat-val">'+(client.alphaFee?fc(client.alphaFee):'TBD')+'</div><div class="ch-stat-label">Alpha Fee</div></div>'
      +'</div>'
    +'</div>'
    +(pages.length
      ?'<div class="sec">Your Published Pages</div><div class="page-grid">'
        +pages.map(function(pid){
          var p=portal[pid];
          var date=p.pushed?new Date(p.pushed).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
          return '<a class="page-card" href="https://alphafiles.net'+p.url+'" target="_blank">'
            +'<div class="pg-title">'+p.label+'</div>'
            +'<div class="pg-meta">Published '+date+(p.pushedBy?' · '+p.pushedBy:'')+'</div>'
            +'</a>';
        }).join('')+'</div>'
      :'<div class="empty-state"><div style="font-size:32px;margin-bottom:10px">📭</div><div style="font-size:14px;font-weight:700;color:#374151;margin-bottom:6px">No pages published yet</div><div style="font-size:12px">Your advisor will publish pages here as your case progresses.</div></div>')
    +'<div class="footer"><div>Alpha Timeshare Consultants · Client Portal</div><div style="margin-top:4px">Questions? Call Sebastian · Ext. 134</div></div>';
}

function showDirectory(){
  document.title='Client Portals — Alpha Files';
  var all=ga();
  var dir=[];
  try{dir=JSON.parse(localStorage.getItem('portal_dir')||'[]');}catch(e){}

  // Also discover from localStorage
  Object.keys(all).forEach(function(slug){
    var p=getPortal(slug);
    if(Object.keys(p).length>0&&!dir.find(function(x){return x.slug===slug;})){
      var c=all[slug];
      dir.push({slug:slug,name:((c.firstName||'')+(c.lastName?' '+c.lastName:'')).trim()||slug,created:c._created||Date.now()});
    }
  });
  localStorage.setItem('portal_dir',JSON.stringify(dir));
  dir.sort(function(a,b){return(b.created||0)-(a.created||0);});

  var html='<div class="ph"><div class="ph-eye">Alpha Timeshare Consultants</div><div class="ph-title">🌐 Client Portals</div><div class="ph-sub">'+dir.length+' client'+(dir.length!==1?'s':'')+' with published portals</div></div>';

  if(!dir.length){
    html+='<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">🌐</div><div style="font-size:14px;font-weight:700;color:#374151;margin-bottom:6px">No portals yet</div><div style="font-size:12px">Push pages to a client to create their portal automatically.</div></div>';
  } else {
    html+=dir.map(function(entry){
      var portal=getPortal(entry.slug);
      var count=Object.keys(portal).length;
      var client=all[entry.slug]||{};
      var nm=entry.name||'Unknown';
      var initials=nm.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();
      var lastPush=count?Object.values(portal).reduce(function(a,b){return(b.pushed||0)>(a.pushed||0)?b:a;},{pushed:0}):null;
      var lastDate=lastPush&&lastPush.pushed?new Date(lastPush.pushed).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
      return '<a href="/portals/?s='+entry.slug+'" class="portal-card">'
        +'<div class="pc-avatar">'+initials+'</div>'
        +'<div style="flex:1"><div class="pc-name">'+nm+'</div><div class="pc-meta">'+(client.resort||'')+(client.resort?' · ':'')+'Last push: '+lastDate+'</div></div>'
        +'<div class="pc-badge"><div class="pc-count">'+count+'</div><div class="pc-clabel">pages live</div></div>'
        +'</a>';
    }).join('');
  }
  document.getElementById('page-content').innerHTML=html;
}
</script>
</body>
</html>
