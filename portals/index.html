<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Your Alpha Case File</title>

<style>
:root{--navy:#1B2A4A;--gold:#C8960C;--border:#e5e7eb;--bg:#f0f4f8;--green:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.tb-logo{font-size:19px;font-weight:600;color:#fff;letter-spacing:.3px}
.tb-logo span{color:var(--gold)}
.tb-back{margin-left:auto;display:none;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 12px;text-decoration:none}
.tb-back:hover{color:#fff}

.wrap{max-width:680px;margin:0 auto;padding:24px 16px 48px}

/* WELCOME */
.welcome{margin-bottom:6px}
.welcome-eye{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
.welcome-name{font-size:16px;font-weight:600;color:var(--navy);line-height:1.1;margin-bottom:2px}
.welcome-sub{font-size:13px;color:#6b7280}

/* DASHBOARD */
.dashboard{background:var(--navy);border-radius:14px;padding:22px;margin:18px 0 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.db-wide{grid-column:span 2}
.db-tile{background:rgba(255,255,255,.07);border-radius:10px;padding:14px}
.db-tile.gold-border{border:1px solid rgba(200,150,12,.4)}
.db-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4);margin-bottom:5px}
.db-val{font-size:18px;font-weight:600;color:#fff;line-height:1}
.db-val.gold{color:var(--gold)}
.db-val.sm{font-size:18px}
.db-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}
.status-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(52,199,89,.15);border:1px solid rgba(52,199,89,.3);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;color:#34c759;margin-top:6px}
.nextstep-tile{background:rgba(200,150,12,.1);border:1px solid rgba(200,150,12,.25);border-radius:10px;padding:14px}
.ns-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(200,150,12,.7);margin-bottom:6px}
.ns-text{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6}

/* DIVIDER */
.sec-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:#9ca3af;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* REVIEWED CHECKLIST */
.reviewed-list{display:flex;flex-direction:column;gap:0;background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.rv-item{display:flex;gap:14px;padding:14px 18px;border-bottom:1px solid #f3f4f6;align-items:flex-start}
.rv-item:last-child{border:none}
.rv-check{width:22px;height:22px;border-radius:50%;background:#f0fdf4;border:1.5px solid #86efac;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rv-check svg{width:11px;height:11px;stroke:#16a34a;stroke-width:2.5;fill:none}
.rv-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:3px}
.rv-desc{font-size:12px;color:#6b7280;line-height:1.6}

/* QUOTE SUMMARY */
.quote-block{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.qb-hdr{background:var(--navy);padding:14px 20px;font-size:15px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.qb-rows{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #f3f4f6}
.qb-cell{padding:14px 20px;border-right:1px solid #f3f4f6}
.qb-cell:nth-child(2n){border-right:none}
.qb-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:4px}
.qb-val{font-size:17px;font-weight:600;color:var(--navy)}
.qb-val.red{color:var(--gold)}
.qb-full{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:#f8fafc}
.qb-full-lbl{font-size:13px;color:#374151;font-weight:600}
.qb-full-val{font-size:15px;font-weight:600;color:#dc2626}

/* NEXT STEP CTA */
.cta-block{background:linear-gradient(135deg,#1B2A4A,#243a6e);border-radius:12px;padding:22px 24px;margin-bottom:20px;text-align:center}
.cta-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px}
.cta-sub{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:16px}
.cta-btn{display:inline-block;background:var(--gold);color:#fff;font-weight:600;font-size:14px;padding:12px 28px;border-radius:8px;text-decoration:none;border:none;cursor:pointer}

/* PAGE LINKS */
.page-links{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.pl-item{display:flex;align-items:center;gap:12px;padding:11px 16px;background:#fff;border:1px solid var(--border);border-radius:9px;cursor:pointer;text-decoration:none;color:inherit;transition:.12s}
.pl-item:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.pl-icon{font-size:18px;flex-shrink:0}
.pl-label{font-size:14px;font-weight:600;color:var(--navy);flex:1}
.pl-arrow{color:#d1d5db;font-size:18px}

/* CONTACT */
.contact-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;gap:16px;align-items:center}
.cc-ava{width:52px;height:52px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid var(--gold)}
.cc-name{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:1px}
.cc-title{font-size:12px;color:#9ca3af;margin-bottom:8px}
.cc-btns{display:flex;gap:6px;flex-wrap:wrap}
.cc-btn{background:#f3f4f6;color:var(--navy);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;text-decoration:none}
.cc-hours{font-size:11px;color:#9ca3af;margin-top:6px}

.footer{text-align:center;padding-top:24px;font-size:11px;color:#d1d5db}

/* PAGE VIEW */
.sc{background:#fff;border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:12px}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:var(--gold);border-bottom:1px solid #fef3c7;padding-bottom:5px;margin-bottom:14px}
.ctbl{width:100%;border-collapse:collapse}
.ctbl th{background:var(--navy);color:#fff;padding:9px 12px;text-align:right;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.ctbl th:first-child{text-align:left}
.ctbl td{padding:9px 12px;border-bottom:1px solid #f3f4f6;text-align:right;font-size:16px;font-weight:600;color:var(--navy)}
.ctbl td:first-child{text-align:left;font-family:Inter,sans-serif;font-size:12px;font-weight:600;color:#374151}
.ctbl tr:last-child td{border:none}
.pay-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px}

@media(max-width:480px){
  .dashboard{grid-template-columns:1fr}
  .db-wide{grid-column:span 1}
  .qb-rows{grid-template-columns:1fr}
  .qb-cell{border-right:none}
  .contact-card{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-logo">⚡ <span>Alpha</span> Timeshare Consultants</div>
  <a id="tb-back" class="tb-back" href="#">← My Case File</a>
</div>

<div class="wrap" id="root">
  <div style="text-align:center;padding:60px;color:#9ca3af">Loading your case file…</div>
</div>

<script>
function fc(n,d){var v=Math.round(parseFloat(n)||0);return v?"$"+v.toLocaleString():"—";}
function fcd(n){return n?"$"+parseFloat(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function moPmt(p,mo){var r=.20/12;return p>0?p*r*Math.pow(1+r,mo)/(Math.pow(1+r,mo)-1):0;}
function cumMtf(y,yr){var t=0;for(var i=1;i<=y;i++)t+=yr*Math.pow(1.08,i-1);return t;}

var PAGE_ICONS={owner:"🏠",current:"📊",whyout:"❓",leverage:"💪",credit:"💳",wait:"⚠️",heirs:"👨‍👩‍👧",group:"🔍",approval:"✅",compensation:"💵",proof:"🔗",letter:"✉️",guarantee:"🛡️","exit-methods":"🚪",history:"⭐",rights:"⚖️",cost:"💰",quote:"📄",savings:"💵",free:"🎉",better:"🏆",included:"📦",recap:"📋",contract:"📝",checklist:"✅","timeshare-free":"🎉"};

var PAGE_REVIEWED={
  current:{title:"Your Current Ownership Costs",desc:"We reviewed your mortgage, maintenance fees, and the true total cost of ownership."},
  credit:{title:"Credit Protection",desc:"We discussed how credit reporting works and how Alpha helps protect your position throughout the process."},
  wait:{title:"What Happens If You Do Nothing",desc:"We reviewed how the obligation continues and why waiting often limits your options."},
  group:{title:"How Group Filings Work",desc:"You learned how qualified owners from the same resort create more leverage than individual cases."},
  approval:{title:"Your Group Qualification",desc:"We explained why every owner is reviewed before joining a filing and how strong groups produce better results."},
  heirs:{title:"Estate & Heir Liability",desc:"We reviewed how a deeded timeshare becomes part of your estate and what that means for your family."},
  letter:{title:"Mutual Release Process",desc:"We reviewed how negotiated settlements permanently end ownership obligations."},
  guarantee:{title:"Written Guarantee",desc:"You reviewed Alpha's written guarantee and how it applies to your agreement."},
  cost:{title:"True Cost of Ownership",desc:"We reviewed the long-term financial impact of maintaining this ownership."},
  quote:{title:"Your Personalized Quote",desc:"You received pricing based on your ownership and specific situation."},
  rights:{title:"Your Consumer Rights",desc:"We reviewed the statutes that govern timeshare sales and how they apply to your purchase."},
  included:{title:"What's Included",desc:"You reviewed every service included with your enrollment."},
  better:{title:"Why Clients Choose Alpha",desc:"We explained how our process differs from other exit companies and individual legal representation."},
  "exit-methods":{title:"Your 4 Exit Options",desc:"We walked through every available path and the tradeoffs of each one."},
  leverage:{title:"Why the Resort Negotiates",desc:"We explained what creates documented pressure that motivates resorts to respond."},
  compensation:{title:"Possible Resort Compensation",desc:"We discussed when compensation applies and what that process looks like."},
  history:{title:"Our Track Record",desc:"You reviewed Alpha's history and case outcomes across the industry."},
  savings:{title:"What You Save with Alpha",desc:"We compared the cost of staying in vs. resolving now."}
};

function loadData(){
  var hash=window.location.hash.slice(1);
  if(hash&&hash.length>20){try{return JSON.parse(decodeURIComponent(escape(atob(hash))));}catch(e){}}
  var p=new URLSearchParams(window.location.search),slug=p.get("s")||"";
  if(!slug)return null;
  var snap={};try{snap=JSON.parse(localStorage.getItem("portal_snap_"+slug)||"{}");}catch(e){}
  var portal={};try{portal=JSON.parse(localStorage.getItem("portal_"+slug)||"{}");}catch(e){}
  if(!Object.keys(portal).length)return null;
  return{snap:snap,portal:portal,slug:slug,agent:{name:"Sebastian Short",title:"Account Specialist",ext:"134",company:"Alpha Timeshare Consultants",biz:"18778483948",bizDisplay:"1 (877) 848-3948",office:"16892333259",officeDisplay:"1 (689) 233-3259",email:"Sebastian@AlphaTimeshareConsultants.com"}};
}

function checkIcon(){return'<svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';}

function showDirectory(data){
  var s=data.snap||{},portal=data.portal||{},agent=data.agent||{};
  var nm=((s.firstName||"")+(s.lastName?" "+s.lastName:"")).trim()||"Valued Client";
  var yr=parseFloat(s.maitFees)||0,mtgMo=parseFloat(s.monthlyMortgage)||0;
  var annualCost=yr+(mtgMo*12);
  var moCost=(yr/12)+mtgMo;
  var fee=parseFloat(s.alphaFee)||0;
  var cnt=Object.keys(portal).length;
  // Estimate remaining: 20 years of ownership at 8% growth
  var rem20=cumMtf(20,yr)+(mtgMo*(parseInt(s.mtgTerm)||10)*12);
  document.title=nm+" — Alpha Case File";

  // Build reviewed items only for pages in portal
  var sortedPages=Object.keys(portal).sort(function(a,b){return(portal[a].pushed||0)-(portal[b].pushed||0);});
  var reviewedHtml=sortedPages.map(function(pid){
    var info=PAGE_REVIEWED[pid];if(!info)info={title:portal[pid].label,desc:"Reviewed during your consultation."};
    return'<div class="rv-item"><div class="rv-check">'+checkIcon()+'</div><div><div class="rv-title">'+info.title+'</div><div class="rv-desc">'+info.desc+'</div></div></div>';
  }).join("");

  // Page links
  var linkHtml=sortedPages.map(function(pid){
    var p=portal[pid];
    var pagePayload=JSON.parse(JSON.stringify(data));pagePayload.page=pid;
    var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(pagePayload))));
    return'<a class="pl-item" href="/portals/#'+encoded+'"><div class="pl-icon">'+(PAGE_ICONS[pid]||"📄")+'</div><div class="pl-label">'+p.label+'</div><div class="pl-arrow">›</div></a>';
  }).join("");

  // Contact
  var a=agent;
  var contactHtml='<div class="contact-card"><div class="cc-ava">👤</div><div style="flex:1"><div class="cc-name">'+(a.name||"Your Consultant")+'</div><div class="cc-title">'+(a.company||"Alpha Timeshare Consultants")+(a.ext?" · Ext. "+a.ext:"")+'</div><div class="cc-btns">'
    +'<a href="tel:'+(a.biz||a.phone||'')+'" class="cc-btn">📞 Call</a>'
    +(a.biz?'<a href="sms:'+(a.biz)+'" class="cc-btn">💬 Text</a>':'')
    +(a.email?'<a href="mailto:'+(a.email)+'" class="cc-btn">✉️ Email</a>':'')
    +'</div>'
    +'<div class="cc-hours">'+(a.bizDisplay?'Bus: '+a.bizDisplay+(a.ext?' Ext '+a.ext:''):'')+(a.officeDisplay?' · Office: '+a.officeDisplay:'')+'</div>'
    +(a.email?'<div class="cc-hours">'+(a.email)+'</div>':'')
    +'</div></div>';

  document.getElementById("root").innerHTML=
    // Welcome
    '<div class="welcome"><div class="welcome-eye">Your Alpha Case File</div><div class="welcome-name">Welcome, '+nm+'</div><div class="welcome-sub">Your Alpha Case Summary</div></div>'

    // Dashboard
    +'<div class="dashboard">'
    +'<div class="db-tile"><div class="db-lbl">Resort</div><div class="db-val sm">'+(s.resort||"—")+'</div>'+(s.location?'<div class="db-sub">'+s.location+'</div>':'')+'</div>'
    +'<div class="db-tile"><div class="db-lbl">Current Annual Cost</div><div class="db-val gold">'+fc(annualCost)+'</div><div class="db-sub">'+(moCost>0?fcd(moCost)+"/mo":"")+'</div></div>'
    +'<div class="db-tile"'+(fee>0?' style="border:1px solid rgba(200,150,12,.4)"':'')+'><div class="db-lbl">Alpha Service Fee</div><div class="db-val '+(fee>0?'gold':'sm')+'">'+(fee>0?fc(fee):'Pending')+'</div></div>'
    +'<div class="db-tile"><div class="db-lbl">Pages Reviewed</div><div class="db-val">'+cnt+'</div><div class="status-pill">✓ Assessment Complete</div></div>'
    +'</div>'
    // Financial Summary — right under dashboard
    +(annualCost>0?'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:14px">'
    +'<div style="background:#1B2A4A;padding:10px 16px;font-size:11px;font-weight:600;color:#C8960C;text-transform:uppercase;letter-spacing:1px">Financial Summary</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr">'
    +'<div style="padding:12px 16px;border-right:1px solid #f3f4f6;border-bottom:1px solid #f3f4f6"><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">Monthly Ownership Cost</div><div style="font-size:18px;font-weight:600;color:#1B2A4A">'+fcd(moCost)+'</div></div>'
    +'<div style="padding:12px 16px;border-bottom:1px solid #f3f4f6"><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">Annual Ownership Cost</div><div style="font-size:18px;font-weight:600;color:#1B2A4A">'+fc(annualCost)+'</div></div>'
    +'<div style="padding:12px 16px;grid-column:span 2"><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">Estimated Remaining Ownership Cost</div><div style="font-size:18px;font-weight:600;color:#dc2626">'+fc(rem20)+'</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">Based on 20 years at 8% annual MTF growth</div></div>'
    +'</div></div>':'')

    // Reviewed
    +(reviewedHtml?'<div class="sec-hdr">Here\'s What We Reviewed Together</div><div class="reviewed-list">'+reviewedHtml+'</div>':"")

    // Quote summary
    +(annualCost>0?'<div class="sec-hdr">Your Personalized Quote</div><div class="quote-block"><div class="qb-hdr">Financial Summary</div><div class="qb-rows"><div class="qb-cell"><div class="qb-lbl">Monthly Ownership Cost</div><div class="qb-val">'+fcd(moCost)+'</div></div><div class="qb-cell"><div class="qb-lbl">Annual Ownership Cost</div><div class="qb-val">'+fc(annualCost)+'</div></div>'+(fee>0?'<div class="qb-cell"><div class="qb-lbl">Alpha Fee</div><div class="qb-val">'+fc(fee)+'</div></div><div class="qb-cell"><div class="qb-lbl">Pay in Full (3% off)</div><div class="qb-val" style="color:#15803d">'+fc(fee*.97)+'</div></div>':'')+'</div>'+(rem20>0?'<div class="qb-full"><div class="qb-full-lbl">Estimated Remaining Ownership Cost</div><div class="qb-full-val">'+fc(rem20)+'</div></div>':'')+'</div>':"")

    // CTA
    +'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px 20px;margin-bottom:14px">'
    +'<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#C8960C;margin-bottom:12px">Our Exit Program Includes</div>'
    +'<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px">'
    +['Written Money-Back Guarantee upon Program Completion','Permanent Legal Termination of Your Timeshare','Elimination of Future Maintenance Obligations','Resolution of Delinquent Fees','Credit Protection & Repair Support','Proof of Performance Documentation','Consumer Protection & BBB Credibility']
    .map(function(s){return'<div style="display:flex;gap:8px;font-size:13px;color:#374151"><span style="color:#16a34a;flex-shrink:0">•</span>'+s+'</div>';}).join('')
    +'</div>'
    +'<div style="font-style:italic;font-size:13px;color:#6b7280;border-top:1px solid #f3f4f6;padding-top:10px">&ldquo;Would you rather be putting those payments toward the problem or toward the solution?&rdquo;</div>'
    +'</div>'
    +'<div class="sec-hdr">Your Portal</div>'

    // Page links
    +(linkHtml?'<div class="page-links">'+linkHtml+'</div>':"")

    // Contact
    +'<div class="sec-hdr">Need Help?</div>'
    +contactHtml

    +'<div class="footer">Prepared for '+nm+' by Alpha Timeshare Consultants · Confidential</div>';
}

// Simple page renderers
function renderPage(data,pid){
  var s=data.snap||{},portal=data.portal||{},agent=data.agent||{};
  var yr=parseFloat(s.maitFees)||0,mtgMo=parseFloat(s.monthlyMortgage)||0;
  var p=portal[pid]||{label:pid};
  document.title=p.label+" — Alpha Case File";
  var tb=document.getElementById("tb-back");if(tb){tb.style.display="flex";tb.href="javascript:history.back()";}

  var body="";
  if(pid==="cost"){
    var TF=[{l:"1 Year",y:1},{l:"3 Years",y:3},{l:"5 Years",y:5},{l:"10 Years",y:10},{l:"20 Years",y:20}];
    var rows=TF.map(function(tf){var g=cumMtf(tf.y,yr)+mtgMo*Math.min(tf.y,(parseInt(s.mtgTerm)||10))*12;return"<tr><td>"+tf.l+"</td><td style='color:#15803d;font-weight:600'>"+fcd(g)+"</td><td style='color:#9ca3af'>"+fcd(yr*tf.y+mtgMo*tf.y*12)+"</td></tr>";}).join("");
    body="<div class='sc'><div class='slbl'>Cost With 8% Annual Growth Rate</div><table class='ctbl'><thead><tr><th style='text-align:left'>Timeframe</th><th style='color:#86efac'>With 8% Growth</th><th>Flat Total</th></tr></thead><tbody>"+rows+"</tbody></table></div>";
  } else if(pid==="quote"){
    var fee=parseFloat(s.alphaFee)||0;
    if(!fee){body="<div class='sc'><p style='color:#9ca3af;font-size:13px'>Quote not yet available. Contact your representative.</p></div>";}
    else{var mo60=moPmt(fee,60);body="<div class='sc'><div class='slbl'>Your Service Fee</div><div class='pay-opt' style='border-color:#15803d;background:#f0fdf4;margin-bottom:8px'><div><div style='font-weight:600;color:var(--navy)'>💰 Pay in Full (3% off)</div><div style='font-size:11px;color:#9ca3af'>Best value</div></div><div style='font-size:18px;font-weight:600;color:#15803d'>"+fcd(fee*.97)+"</div></div><div class='pay-opt'><div><div style='font-weight:600;color:var(--navy)'>Monthly Plan</div><div style='font-size:11px;color:#9ca3af'>60 months · $0 down · starts month 2</div></div><div style='font-size:18px;font-weight:600;color:var(--navy)'>"+fcd(mo60)+"/mo</div></div></div>";}
  } else if(pid==="guarantee"){
