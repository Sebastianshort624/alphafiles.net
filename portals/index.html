<style>:root{--navy:#1B2A4A;--gold:#C8960C;--border:#e5e7eb;--bg:#f8fafc;--text:#1a1a2e;--red:#dc2626;--green:#16a34a}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}</style>

<style id="atc-sb-css">
body{display:flex!important;min-height:100vh!important}
.sidenav{width:210px!important;min-width:210px!important;background:#1B2A4A!important;position:fixed!important;top:0!important;left:0!important;height:100vh!important;z-index:200!important;display:flex!important;flex-direction:column!important;overflow-y:auto!important}
.sidenav::-webkit-scrollbar{width:3px}.sidenav::-webkit-scrollbar-thumb{background:rgba(200,150,12,.4);border-radius:2px}
.rightnav{width:195px!important;min-width:195px!important;background:#0f1d33!important;position:fixed!important;top:0!important;right:0!important;height:100vh!important;z-index:200!important;display:flex!important;flex-direction:column!important;overflow-y:auto!important}
.rightnav::-webkit-scrollbar{width:3px}.rightnav::-webkit-scrollbar-thumb{background:rgba(200,150,12,.3);border-radius:2px}
.main,.main-content,.app,.page-content{margin-left:210px!important;margin-right:195px!important;flex:1!important;padding:0 6px!important;padding-top:44px!important}
.wrap{max-width:100%!important;margin:0!important}
/* PORTAL BANNER */
.portal-banner{position:fixed;top:0;left:210px;right:195px;height:40px;background:linear-gradient(90deg,#1B2A4A,#243a6e);border-bottom:2px solid #C8960C;z-index:199;display:flex;align-items:center;gap:8px;padding:0 12px;font-size:11px;font-family:Inter,sans-serif}
.pb-client{font-weight:800;color:#fff;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pb-stage{background:rgba(200,150,12,.2);border:1px solid rgba(200,150,12,.4);color:#C8960C;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.pb-spacer{flex:1}
.pb-saved{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);transition:.3s}
.pb-saved.dirty{color:#ff9500}
.pb-saved.saved{color:#34c759}
.pb-email-wrap{display:flex;align-items:center;gap:4px;cursor:pointer;color:rgba(255,255,255,.6);font-size:10px;font-weight:600}
.pb-email-wrap input{cursor:pointer;accent-color:#C8960C}
.pb-btn{border:none;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;transition:.15s;white-space:nowrap}
.pb-push{background:#C8960C;color:#fff}.pb-push:hover{background:#a67a08}
.pb-save{background:#16a34a;color:#fff}.pb-save:hover{background:#15803d}
/* RIGHT NAV */
.rn-section{border-bottom:1px solid rgba(255,255,255,.07);padding:8px 0}
.rn-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);padding:4px 10px 2px}
.rn-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;text-decoration:none;color:rgba(255,255,255,.65);font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.12s;font-family:Inter,sans-serif}
.rn-btn:hover,.rn-btn.active{background:rgba(200,150,12,.15);color:#C8960C}
.rn-btn .rn-ic{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.rn-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:5px;color:#fff;font-size:11px;padding:5px 7px;font-family:Inter,sans-serif;outline:none;margin:0 0 4px}
.rn-2col{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px 8px}
.rn-lang-btn{padding:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:5px;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:Inter,sans-serif;transition:.12s}
.rn-lang-btn.active{background:#C8960C;border-color:#C8960C;color:#fff}
.rn-report-btn{display:block;width:calc(100% - 16px);margin:3px 8px;padding:6px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:rgba(255,255,255,.7);font-size:11px;font-weight:600;cursor:pointer;text-align:left;font-family:Inter,sans-serif;transition:.12s}
.rn-report-btn:hover{background:rgba(200,150,12,.2);color:#C8960C;border-color:rgba(200,150,12,.4)}
/* PUSH POPUP */
.push-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center}
.push-overlay.open{display:flex}
.push-box{background:#fff;border-radius:12px;width:440px;max-width:95vw;box-shadow:0 20px 50px rgba(0,0,0,.3);overflow:hidden}
.push-hdr{background:#1B2A4A;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.push-hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:.5px}
.push-x{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:14px}
.push-body{padding:14px 18px}
.push-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.push-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:#374151;transition:.12s}
.push-item:hover{border-color:#C8960C;background:#fff8e0}
.push-item input{accent-color:#C8960C;cursor:pointer}
.push-item.pushed{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.push-actions{display:flex;gap:8px;align-items:center}
.push-btn-all{background:none;border:1px solid #e5e7eb;border-radius:6px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;color:#374151}
.push-btn-go{background:#C8960C;color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;flex:1;transition:.15s}
.push-btn-go:hover{background:#a67a08}
/* NEW SESSION DIALOG */
.session-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9500;align-items:center;justify-content:center}
.session-overlay.open{display:flex}
.session-box{background:#fff;border-radius:14px;width:340px;max-width:95vw;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center}
.session-icon{font-size:36px;margin-bottom:12px}
.session-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;color:#1B2A4A;margin-bottom:8px}
.session-msg{font-size:13px;color:#6b7280;line-height:1.6;margin-bottom:20px}
.session-btns{display:flex;flex-direction:column;gap:7px}
.sbtn{border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;transition:.15s}
.sbtn.save{background:#16a34a;color:#fff}.sbtn.save:hover{background:#15803d}
.sbtn.nosave{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}.sbtn.nosave:hover{background:#e5e7eb}
.sbtn.cancel{background:none;color:#9ca3af;font-size:12px}.sbtn.cancel:hover{color:#374151}
/* UNSAVED DIALOG */
.unsaved-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9600;align-items:center;justify-content:center}
.unsaved-overlay.open{display:flex}
.unsaved-box{background:#fff;border-radius:14px;width:320px;max-width:95vw;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.unsaved-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#1B2A4A;margin-bottom:6px}
.unsaved-msg{font-size:12px;color:#6b7280;margin-bottom:16px;line-height:1.5}
.unsaved-btns{display:flex;flex-direction:column;gap:6px}
@media print{.sidenav,.rightnav,.portal-banner{display:none!important}.main,.main-content,.app,.page-content{margin-left:0!important;margin-right:0!important;padding-top:0!important}}

@media(max-width:600px){.sidenav{display:none!important}.main,.main-content,.app,.page-content{margin-left:0!important;padding-top:40px!important}.portal-banner{left:0}}

<script id="atc-sb">
var _SK="atc_clients_v2",_AK="atc_active";
function _gA(){try{return JSON.parse(localStorage.getItem(_SK))||{};}catch(e){return{};}}
function _sA(o){localStorage.setItem(_SK,JSON.stringify(o));}
function _aC(){return localStorage.getItem(_AK)||null;}
function _aD(){var s=_aC();return s?_gA()[s]||null:null;}
function _fC(n){return "$"+Math.round(n||0).toLocaleString();}
function _fD(ts){if(!ts)return"--";return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

// ── UNSAVED CHANGES TRACKING ─────────────────────────────────────────
window._dirty=false;
window._pendingNav=null;
function setDirty(v){
  window._dirty=v;
  var el=document.getElementById('pb-saved');
  if(el)el.className='pb-saved'+(v?' dirty':' saved'),el.textContent=v?'Unsaved changes':'Saved';
}
window.addEventListener('beforeunload',function(e){
  if(window._dirty){e.preventDefault();e.returnValue='You have unsaved changes.';}
});
// Track all inputs on page
document.addEventListener('input',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')setDirty(true);
},true);

// ── SESSION-BASED SELECTIONS ─────────────────────────────────────────
window.atcSel={
  key:function(){return 'sel_'+(_aC()||'_none_');},
  get:function(){try{return JSON.parse(localStorage.getItem(this.key())||'{}');}catch(e){return{};}},
  set:function(k,v){var d=this.get();v===null?delete d[k]:d[k]=v;localStorage.setItem(this.key(),JSON.stringify(d));},
  clear:function(){localStorage.removeItem(this.key());}
};

// ── PORTAL SYSTEM ─────────────────────────────────────────────────────
var PORTAL_PAGES=[
  {id:'owner',label:'Owner Info',url:'/owner/'},
  {id:'current',label:'Current Situation',url:'/current/'},
  {id:'whyout',label:'Why Do You Want Out',url:'/whyout/'},
  {id:'leverage',label:'Leverage',url:'/leverage/'},
  {id:'credit',label:'Credit Protection',url:'/credit/'},
  {id:'wait',label:'If You Do Nothing',url:'/wait/'},
  {id:'group',label:'Finding Your Group',url:'/group/'},
  {id:'approval',label:'Group Filing Spot',url:'/approval/'},
  {id:'heirs',label:'Heirs & Estate',url:'/heirs/'},
  {id:'compensation',label:'Resort Compensation',url:'/compensation/'},
  {id:'proof',label:'Proof',url:'/proof/'},
  {id:'letter',label:'Mutual Release Letter',url:'/letter/'},
  {id:'guarantee',label:'Certificate of Guarantee',url:'/guarantee/'},
  {id:'exit-methods',label:'4 Ways to Exit',url:'/exit-methods/'},
  {id:'history',label:'Our Track Record',url:'/history/'},
  {id:'rights',label:'Consumer Rights',url:'/rights/'},
  {id:'cost',label:'True Cost',url:'/cost/'},
  {id:'quote',label:'Your Quote',url:'/quote/'},
  {id:'included',label:"What's Included",url:'/included/'},
  {id:'better',label:'What Makes Alpha Better',url:'/better/'}
];
function _portalKey(slug){return 'portal_'+slug;}
function _getPortal(slug){try{return JSON.parse(localStorage.getItem(_portalKey(slug))||'{}');}catch(e){return{};}}
function _savePortal(slug,data){localStorage.setItem(_portalKey(slug),JSON.stringify(data));}
function _portalDir(){try{return JSON.parse(localStorage.getItem('portal_dir')||'[]');}catch(e){return[];}}
function _addToDir(slug,name){
  var dir=_portalDir();
  if(!dir.find(function(x){return x.slug===slug;}))dir.push({slug:slug,name:name,created:Date.now()});
  localStorage.setItem('portal_dir',JSON.stringify(dir));
}

window.openPushPopup=function(){
  var slug=_aC();if(!slug){toast('No active client','#dc2626');return;}
  var d=_aD();
  var portal=_getPortal(slug);
  var items=PORTAL_PAGES.map(function(p){
    var pushed=portal[p.id];
    return '<label class="push-item'+(pushed?' pushed':'')+'"><input type="checkbox" value="'+p.id+'"'+(pushed?' checked':'')+'>'+p.label+(pushed?'<span style="margin-left:auto;font-size:9px;opacity:.6">✓ pushed</span>':'')+'</label>';
  }).join('');
  document.getElementById('push-box-inner').innerHTML=
    '<div class="push-hdr"><div class="push-hdr-title">📤 Push to Client Portal</div><button class="push-x" onclick="closePushPopup()">✕</button></div>'
    +'<div class="push-body">'
    +'<div style="font-size:12px;color:#6b7280;margin-bottom:10px">Select pages to publish for <strong>'+((d&&(d.firstName||'Client'))||'Client')+'</strong></div>'
    +'<div class="push-grid">'+items+'</div>'
    +'<div class="push-actions"><button class="push-btn-all" onclick="toggleAllPush(this)">Select All</button><button class="push-btn-go" onclick="doPush()">🚀 Push Selected</button></div>'
    +'</div>';
  document.getElementById('push-overlay').classList.add('open');
};
window.closePushPopup=function(){document.getElementById('push-overlay').classList.remove('open');};
window.toggleAllPush=function(btn){
  var cbs=document.querySelectorAll('#push-box-inner input[type=checkbox]');
  var allChecked=Array.from(cbs).every(function(c){return c.checked;});
  cbs.forEach(function(c){c.checked=!allChecked;});
  btn.textContent=allChecked?'Select All':'Deselect All';
};
window.doPush=function(){
  var slug=_aC();if(!slug)return;
  var d=_aD();
  var cbs=document.querySelectorAll('#push-box-inner input[type=checkbox]:checked');
  if(!cbs.length){toast('Select at least one page','#dc2626');return;}
  var portal=_getPortal(slug);
  var emailEnabled=document.getElementById('pb-email')&&document.getElementById('pb-email').checked;
  var now=Date.now();
  var pushedPages=[];
  cbs.forEach(function(cb){
    var pid=cb.value;
    var pg=PORTAL_PAGES.find(function(p){return p.id===pid;});
    portal[pid]={pushed:now,pushedBy:'Sebastian',url:pg?pg.url:'',label:pg?pg.label:pid};
    pushedPages.push(pg?pg.label:pid);
  });
  _savePortal(slug,portal);
  var nm=(d&&((d.firstName||'')+(d.lastName?' '+d.lastName:'')).trim())||'Client';
  _addToDir(slug,nm);
  // Update portal dir page count
  var cnt=Object.keys(portal).length;
  closePushPopup();
  toast('✅ Pushed '+pushedPages.length+' page'+(pushedPages.length!==1?'s':'')+' to portal','#16a34a');
  if(emailEnabled) toast('📧 Pages will be emailed to client','#0891b2');
  buildPortalBanner();
};

// ── CLIENT FUNCTIONS ─────────────────────────────────────────────────
window.toast=function(msg,color){
  var t=document.getElementById("_t");
  if(!t){t=document.createElement("div");t.id="_t";t.style.cssText="display:none;position:fixed;bottom:24px;left:220px;color:#fff;padding:10px 18px;font-size:13px;font-weight:600;border-radius:8px;z-index:700;transition:opacity .3s";document.body.appendChild(t);}
  t.style.background=color||"#16A34A";t.textContent=msg;t.style.display="block";t.style.opacity="1";
  clearTimeout(t._timer);t._timer=setTimeout(function(){t.style.opacity="0";setTimeout(function(){t.style.display="none";},300);},2500);
};

window.swC=function(s){
  if(!s)return;
  if(window._dirty){
    showUnsaved(function(){doSwitch(s);});return;
  }
  doSwitch(s);
};
function doSwitch(s){
  localStorage.setItem(_AK,s);setDirty(false);setTimeout(function(){location.reload();},300);
}

window.atcGetLang=function(){return localStorage.getItem("atc_lang")||"en";};
window.atcSetLang=function(l){localStorage.setItem("atc_lang",l);window.atcApplyLang&&window.atcApplyLang();buildRightNav();};

// ── SESSION MANAGEMENT ────────────────────────────────────────────────
window.saveSession=function(){
  try{if(typeof autoSave==='function')autoSave();if(typeof autoSaveAck==='function')autoSaveAck();if(typeof savePageData==='function')savePageData();}catch(e){}
  setDirty(false);toast('Session saved ✓','#16a34a');
};
window.saveAndClear=function(){
  window.saveSession();
  setTimeout(function(){
    localStorage.removeItem(_AK);
    window.location.href='/owner/';
  },400);
};
window.newSession=function(){
  if(window._dirty){
    showSessionDialog();
  } else {
    showSessionDialog();
  }
};
function showSessionDialog(){
  document.getElementById('session-overlay').classList.add('open');
}
window.sessionSaveAndContinue=function(){
  window.saveSession();
  closeSessionDialog();
  setTimeout(function(){localStorage.removeItem(_AK);window.location.href='/owner/';},500);
};
window.sessionDontSave=function(){
  closeSessionDialog();
  setDirty(false);
  localStorage.removeItem(_AK);
  window.location.href='/owner/';
};
window.closeSessionDialog=function(){document.getElementById('session-overlay').classList.remove('open');};

// ── UNSAVED DIALOG ────────────────────────────────────────────────────
var _unsavedCallback=null;
function showUnsaved(cb){
  _unsavedCallback=cb;
  document.getElementById('unsaved-overlay').classList.add('open');
}
window.unsavedSave=function(){
  window.saveSession();
  document.getElementById('unsaved-overlay').classList.remove('open');
  if(_unsavedCallback){var cb=_unsavedCallback;_unsavedCallback=null;cb();}
};
window.unsavedDontSave=function(){
  setDirty(false);
  document.getElementById('unsaved-overlay').classList.remove('open');
  if(_unsavedCallback){var cb=_unsavedCallback;_unsavedCallback=null;cb();}
};
window.unsavedCancel=function(){
  _unsavedCallback=null;
  document.getElementById('unsaved-overlay').classList.remove('open');
};

// ── OWNER ↔ VITALS REAL-TIME SYNC ────────────────────────────────────
window.addEventListener('storage',function(e){
  if(e.key===_SK){
    var slug=_aC();if(!slug)return;
    // Update banner if client data changed
    buildPortalBanner();
    if(typeof initBanner==='function')initBanner();
    if(typeof loadVitals==='function')loadVitals();
  }
});

  {n:"0",ic:"\u{1F310}",lb:"Client Presentation",url:"/owner/"},

// ── BUILD LEFT NAV ─────────────────────────────────────────────────────
function buildSB(){
  var el=document.querySelector(".sidenav");
  if(!el){el=document.createElement("div");el.className="sidenav";document.body.insertBefore(el,document.body.firstChild);}
  var d=_aD(),slug=_aC(),all=_gA();
  var cur="/"+window.location.pathname.split("/").filter(Boolean)[0]+"/";
  var mo=d?(parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12):0;
  var nm=d?(d.firstName||d.lastName?(d.firstName||"")+" "+(d.lastName||""):"Unnamed").trim():null;

  var ct=d
    ?"<div style='padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.1)'>"
      +"<div style='font-size:14px;font-weight:700;color:#fff;margin-bottom:2px'>"+(nm||"Unnamed")+"</div>"
      +"<div style='font-size:12px;color:#C8960C;font-weight:600;margin-bottom:4px'>"+(d.resort||"No resort")+"</div>"

}

function _doNewC(){

  var ln=prompt("Last name:");
  var slug=(fn.charAt(0)+(ln||"")).toLowerCase().replace(/[^a-z0-9]/g,"")+"_"+Date.now().toString().slice(-4);
  var all=_gA();all[slug]={_created:Date.now(),firstName:fn,lastName:ln||"",alphaFee:"",_updated:Date.now()};
  _sA(all);localStorage.setItem(_AK,slug);setDirty(false);
  setTimeout(function(){location.reload();},300);
}

<style>
.ph{background:var(--navy,#1B2A4A);color:#fff;border-radius:8px;padding:18px 22px;margin-bottom:20px}

.pc-name{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;color:#1B2A4A;margin-bottom:2px}

.pc-count{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:#C8960C}

</style>

<script>
(function(){
  var SK='atc_clients_v2';
  function ga(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
  function getPortal(slug){try{return JSON.parse(localStorage.getItem('portal_'+slug)||'{}');}catch(e){return{};}}

  var dir=[];try{dir=JSON.parse(localStorage.getItem('portal_dir')||'[]');}catch(e){}

  // Also scan all clients for any that have portal data
  var all=ga();
  Object.keys(all).forEach(function(slug){
    var p=getPortal(slug);
    if(Object.keys(p).length>0&&!dir.find(function(x){return x.slug===slug;})){
      var c=all[slug];
      var nm=((c.firstName||'')+(c.lastName?' '+c.lastName:'')).trim()||slug;
      dir.push({slug:slug,name:nm,created:c._created||Date.now()});
    }
  });
  localStorage.setItem('portal_dir',JSON.stringify(dir));

  var body=document.getElementById('portal-dir-body');
  if(!dir.length){
    body.innerHTML='<div class="empty-state"><div class="empty-icon">🌐</div><div style="font-size:14px;font-weight:700;color:#374151;margin-bottom:6px">No portals yet</div><div style="font-size:12px">Push pages to a client to create their portal automatically.</div></div>';
    return;
  }

  // Sort by most recently active
  dir.sort(function(a,b){return(b.created||0)-(a.created||0);});
  
  body.innerHTML=dir.map(function(entry){
    var portal=getPortal(entry.slug);
    var count=Object.keys(portal).length;
    var client=all[entry.slug]||{};
    var nm=entry.name||'Unknown';
    var initials=(nm.split(' ').map(function(w){return w[0]||'';}).join('')).substring(0,2).toUpperCase();
    var resort=client.resort||'';
    var lastPush=count?Object.values(portal).reduce(function(a,b){return(b.pushed||0)>(a.pushed||0)?b:a;},{pushed:0}):null;
    var lastDate=lastPush&&lastPush.pushed?new Date(lastPush.pushed).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    return '<a href="/portals/'+entry.slug+'/" class="portal-card">'
      +'<div class="pc-avatar">'+initials+'</div>'
      +'<div style="flex:1"><div class="pc-name">'+nm+'</div><div class="pc-meta">'+resort+(resort?' · ':'')+'Last push: '+lastDate+'</div></div>'
      +'<div class="pc-pages"><div class="pc-count">'+count+'</div><div class="pc-clabel">pages live</div></div>'
      +'</a>';
  }).join('');
})();
</script>
