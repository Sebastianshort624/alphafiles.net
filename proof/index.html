};

window.doPush=function(){
  var slug=_aC();if(!slug)return;

  var d=_gA()[slug]||null;

  if(!cbs.length){toast('Select at least one page','#dc2626');return;}
  var portal=_getPortal(slug);
  var now=Date.now();var pushedPages=[];var pushedQuote=false;var pushedOther=false;
  cbs.forEach(function(cb){
    var pid=cb.value;var pg=PORTAL_PAGES.find(function(p){return p.id===pid;});
    portal[pid]={pushed:now,pushedBy:'Sebastian',url:pg?pg.url:'',label:pg?pg.label:pid};
    pushedPages.push(pg?pg.label:pid);
    if(pid==='quote')pushedQuote=true;else pushedOther=true;
  });
  // Capture full client data snapshot at push time
  var snap={

    location:d.location||'',phone:d.phone||'',email:d.email||'',
    maitFees:d.maitFees||0,monthlyMortgage:d.monthlyMortgage||0,
    balanceAmount:d.balanceAmount||0,
    alphaFee:parseFloat(d.alphaFee)||0, // pull saved fee; quote page input stays blank independently
    mtgTerm:d.mtgTerm||10,yearPurchased:d.yearPurchased||'',
    purchasePrice:d.purchasePrice||0,_pushedAt:Date.now()
  };
  localStorage.setItem('portal_snap_'+slug, JSON.stringify(snap));
  _savePortal(slug,portal);
  // Auto-update status
  var currentStatus=_getStatus();
  if(pushedQuote&&currentStatus!=='absent'){_setStatus('quoted');}

  var nm=(d&&((d.firstName||'')+(d.lastName?' '+d.lastName:'')).trim())||'Client';
  _addToDir(slug,nm);
  // Generate shareable hash URL with all data embedded (works on any device)
  var payload={snap:snap,portal:portal,slug:slug,agent:{name:'Sebastian Short',title:'Account Specialist',ext:'134',company:'Alpha Timeshare Consultants',biz:'18778483948',bizDisplay:'1 (877) 848-3948',office:'16892333259',officeDisplay:'1 (689) 233-3259',email:'Sebastian@AlphaTimeshareConsultants.com'}};
  var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  var shareUrl='https://alphafiles.net/portals/#'+encoded;
  localStorage.setItem('portal_share_'+slug, shareUrl);
  closePushPopup();

  var toast2=document.createElement('div');
  toast2.style.cssText='position:fixed;bottom:80px;left:220px;right:210px;background:#1B2A4A;border:2px solid #C8960C;color:#fff;padding:14px 16px;border-radius:10px;z-index:800;font-size:12px';

    +'<div style="font-family:monospace;font-size:11px;word-break:break-all;color:rgba(255,255,255,.7);margin-bottom:8px">'+shareUrl.substring(0,80)+'...</div>'
    +'<button id="_cpyBtn" style="background:#C8960C;color:#fff;border:none;border-radius:5px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer">📋 Copy Link</button>'
    +'<button onclick="this.parentNode.remove()" style="background:transparent;color:rgba(255,255,255,.4);border:none;cursor:pointer;float:right;font-size:16px">✕</button>';
  document.body.appendChild(toast2);
  var cpyBtn=document.getElementById('_cpyBtn');
  if(cpyBtn)cpyBtn.onclick=function(){navigator.clipboard.writeText(shareUrl).then(function(){cpyBtn.textContent='✓ Copied!';setTimeout(function(){cpyBtn.textContent='📋 Copy Link';},2000);});};
