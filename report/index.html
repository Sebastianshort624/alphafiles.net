*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',sans-serif;font-size:14px;background:#f0f2f5;color:#1a1a1a}
.app{display:flex;min-height:100vh}

.sidebar::-webkit-scrollbar{width:4px}

.sidebar::-webkit-scrollbar-thumb{background:rgba(200,150,12,.4);border-radius:2px}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(200,150,12,.7)}
.main{margin-left:240px;flex:1;padding:24px;min-height:100vh}
.sb-logo{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sb-logo img{max-width:130px}
.sb-client{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);padding:12px}
.sb-no-client{padding:12px;font-size:13px;color:rgba(255,120,120,.9);font-weight:600;background:rgba(220,50,50,.1);border-bottom:1px solid rgba(220,50,50,.3)}

.sb-resort{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:6px}
.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:4px}
.sb-stat{background:rgba(255,255,255,.07);border-radius:3px;padding:4px 6px}
.sb-stat .sl{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.3px}
.sb-stat .sv{font-size:12px;font-weight:600;color:#C8960C}
.sb-quote{background:rgba(200,150,12,.15);border:1px solid rgba(200,150,12,.3);border-radius:3px;padding:5px 7px;margin-top:5px;font-size:11px;color:#C8960C;font-weight:600}
.sb-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:5px}
.sb-sel{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-select{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 7px;font-size:11px;border-radius:3px;font-family:'Inter',sans-serif}
.sb-select option{background:#1B2A4A}
.sb-brow{display:flex;gap:5px;margin-top:5px}
.sb-b{flex:1;background:#C8960C;color:#fff;border:none;padding:5px;font-size:10px;font-weight:700;border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif}
.sb-b.out{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75)}
.sb-b:hover{opacity:.85}
.sb-nav{flex:1;padding:6px 0}
.sb-link{display:flex;align-items:center;gap:7px;padding:7px 12px;text-decoration:none;color:rgba(255,255,255,.6);font-size:11px;font-weight:500;border-left:3px solid transparent;transition:background .15s}
.sb-link:hover{background:rgba(255,255,255,.07);color:#fff;border-left-color:rgba(200,150,12,.5)}
.sb-link.active{background:rgba(200,150,12,.12);color:#C8960C;border-left-color:#C8960C}
.sb-num{font-size:9px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);padding:1px 4px;border-radius:6px;min-width:18px;text-align:center;flex-shrink:0}
.sb-link.active .sb-num{background:rgba(200,150,12,.25);color:#C8960C}
.sb-div{height:1px;background:rgba(255,255,255,.07);margin:3px 10px}
.sb-cal{padding:8px 12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-cal-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sb-cal-in{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.13);color:#fff;padding:5px 7px;font-size:11px;border-radius:3px;font-family:'Inter',sans-serif;margin-bottom:3px}
.sb-rpts{padding:6px 12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-rpt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.65);padding:5px 8px;font-size:10px;border-radius:3px;cursor:pointer;margin-bottom:3px;font-family:'Inter',sans-serif}
.sb-rpt:hover{background:rgba(255,255,255,.1);color:#fff}

.main{margin-left:240px;flex:1;padding:24px;min-height:100vh}
.page{max-width:800px;margin:0 auto}
.sb-logo{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sb-logo img{max-width:130px}
.sb-client{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);padding:12px}
.sb-no-client{padding:12px;font-size:13px;color:rgba(255,120,120,.9);font-weight:600;background:rgba(220,50,50,.1);border-bottom:1px solid rgba(220,50,50,.3)}
.sb-stage{display:inline-block;background:#C8960C;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px;text-transform:uppercase}
.sb-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.sb-resort{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:6px}
.sb-nav{flex:1;padding:6px 0;overflow-y:visible}
.sb-link{display:flex;align-items:center;gap:7px;padding:7px 12px;text-decoration:none;color:rgba(255,255,255,.6);font-size:11px;font-weight:500;border-left:3px solid transparent}
.sb-link:hover{background:rgba(255,255,255,.07);color:#fff;border-left-color:rgba(200,150,12,.5)}
.sb-link.active{background:rgba(200,150,12,.12);color:#C8960C;border-left-color:#C8960C}
.sb-num{font-size:9px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);padding:1px 4px;border-radius:6px;min-width:18px;text-align:center;flex-shrink:0}
.sb-sel{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-select{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 7px;font-size:11px;border-radius:3px;font-family:'Inter',sans-serif}
.sb-select option{background:#1B2A4A}
.sb-brow{display:flex;gap:5px;margin-top:5px}
.sb-b{flex:1;background:#C8960C;color:#fff;border:none;padding:5px;font-size:10px;font-weight:700;border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif}
/* PAGE */
.page-hdr{background:#1B2A4A;color:#fff;border-radius:8px 8px 0 0;padding:20px 24px}
.pg-num{font-size:11px;font-weight:600;color:#C8960C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pg-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}
.pg-sub{font-size:14px;color:rgba(255,255,255,.65)}
.page-body{background:#fff;border-radius:0 0 8px 8px;border:1px solid #e5e7eb;border-top:none;padding:24px}
/* SUMMARY */
.summary-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sum-pill{flex:1;min-width:110px;background:#1B2A4A;color:#fff;border-radius:6px;padding:14px;text-align:center}
.sum-val{font-size:24px;font-weight:700;color:#C8960C;line-height:1}
.sum-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
/* MOTIVATION METER */
.mot-block{margin-bottom:20px}
.mot-title{font-size:14px;font-weight:700;color:#1B2A4A;margin-bottom:10px;text-align:center;text-transform:uppercase;letter-spacing:.4px}
.mot-opts{display:flex;flex-direction:column;gap:6px}
.mot-opt{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;border:1.5px solid #e5e7eb}
.mot-opt.active{border-width:2px}
.mot-opt.greyed{opacity:.3}
.mot-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.mot-text{font-size:15px;font-weight:700;flex:1}
.mot-sub{font-size:12px;color:#6b7280}
/* VERDICT */
.verdict-box{border-radius:6px;padding:16px;margin-bottom:20px}
.verdict-box.strong{background:#e8f5ee;border-left:4px solid #1a7a3c}
.verdict-box.moderate{background:#fff8e8;border-left:4px solid #C8960C}
.verdict-title{font-size:16px;font-weight:700;margin-bottom:6px}
.verdict-title.strong{color:#1a7a3c}
.verdict-title.moderate{color:#8a6200}
.verdict-text{font-size:14px;color:#374151;line-height:1.7}
/* CATEGORY SECTIONS */
.cat-block{margin-bottom:16px;border:1.5px solid #e5e7eb;border-radius:8px;overflow:hidden}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:15px;font-weight:700;color:#fff}
.cat-hdr.federal{background:#1B2A4A}
.cat-hdr.tila{background:#1a5276}
.cat-hdr.respa{background:#1a3a5c}
.cat-hdr.ada{background:#1a6b4a}
.cat-hdr.elder{background:#7d3c00}
.cat-hdr.state{background:#4a235a}
.cat-hdr-right{font-size:14px;font-weight:700;color:#C8960C}
.cat-body{padding:0}
.vt-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:1px solid #f3f4f6;gap:12px}
.vt-row:last-child{border-bottom:none}
.vt-left{flex:1}
.vt-text{font-size:14px;color:#1a1a1a;font-weight:500;margin-bottom:3px}
.vt-statute{font-size:12px;color:#6b7280}
.vt-right{text-align:right;flex-shrink:0}
.vt-fine{font-size:16px;font-weight:700;color:#c0392b}
.vt-shared{font-size:11px;color:#C8960C;margin-top:2px}
.cat-total{display:flex;justify-content:space-between;padding:10px 16px;background:#f9fafb;border-top:2px solid #e5e7eb;font-size:14px;font-weight:700;color:#1B2A4A}
/* AGENCIES */
.agency-section{margin-bottom:20px}
.agency-section h3{font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #C8960C}
.agency-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.agency-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:12px}
.agency-card .ac-cat{font-size:11px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.agency-card .ac-name{font-size:13px;color:#374151;line-height:1.6}
.escalation-box{background:#1B2A4A;border-radius:8px;padding:20px;margin-top:16px;color:#fff}
.escalation-box h4{font-size:16px;font-weight:700;color:#C8960C;margin-bottom:10px}
.escalation-box p{font-size:14px;color:rgba(255,255,255,.85);line-height:1.7}
/* KNEW/STOP SUMMARY */
.ks-block{margin-bottom:20px}
.ks-block h3{font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #C8960C}
.ks-row{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.ks-row:last-child{border-bottom:none}
.ks-text{flex:1;color:#1a1a1a}
.ks-knew{width:70px;text-align:center;font-weight:700}
.ks-stop{width:80px;text-align:center;font-weight:700}
.ks-knew.yes{color:#c0392b}
.ks-knew.no{color:#1a7a3c}
.ks-stop.yes{color:#c0392b}
.ks-stop.no{color:#6b7280}
/* BUTTONS */
.btn{padding:12px 24px;font-size:14px;font-weight:600;border-radius:6px;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.btn.primary{background:#C8960C;color:#fff}
.btn.secondary{background:#1B2A4A;color:#fff}
.btn.email{background:#EAF0F8;color:#1B2A4A;border:1.5px solid #1B2A4A}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.btn-row .btn{flex:1}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb}
.nav-btn{padding:10px 24px;font-size:13px;font-weight:600;border-radius:6px;text-decoration:none;border:none;font-family:'Inter',sans-serif;cursor:pointer}
.nav-btn.prev{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
.nav-btn.next{background:#C8960C;color:#fff}
.nav-step{font-size:12px;color:#9ca3af;text-align:center;flex:1}
.toast{display:none;position:fixed;bottom:24px;left:260px;background:#1a7a3c;color:#fff;padding:10px 18px;font-size:13px;font-weight:600;border-radius:8px;z-index:600}
@media print{.sidebar,.btn-row,.nav-bar{display:none!important}.main{margin-left:0!important}}

function buildReport(){
  var d=activeData();
  var body=document.getElementById('report-body');
  if(!d||!d.violations||!d.violations.length){
    body.innerHTML='<div style="text-align:center;padding:40px;color:#9ca3af"><div style="font-size:48px;margin-bottom:12px">⚖</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">No violations documented yet</div><div style="font-size:14px">Complete the Consumer Rights Assessment first.</div><div style="margin-top:16px"><a href="/rights/" style="background:#C8960C;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:600;font-size:14px">Go to Consumer Rights →</a></div></div>';
    return;
  }

  var checked=d.violations;
  var knew=d.violationKnew||{};
  var stop=d.violationStop||{};
  var checkedViolations=ALL_VIOLATIONS.filter(function(v){return checked.indexOf(v.id)>-1;});
  var totalFine=checkedViolations.reduce(function(s,v){return s+v.fine;},0);
  var count=checkedViolations.length;

  // Determine motivation level
  var motLevel=count>=12?0:count>=7?1:count>=3?2:3;
  var motLevels=[
    {text:'HIGHLY Motivated to Settle',sub:'Overwhelming case — multiple rights, $1M+ exposure',dot:'#1a7a3c',textColor:'#1a7a3c'},
    {text:'SIGNIFICANTLY Motivated',sub:'Strong grounds — clear pattern of violations',dot:'#C8960C',textColor:'#8a6200'},
    {text:'POTENTIALLY Motivated',sub:'Qualifying case — actionable violations',dot:'#1B2A4A',textColor:'#1B2A4A'},
    {text:'INSUFFICIENTLY Documented',sub:'Continue assessment — more violations likely present',dot:'#9ca3af',textColor:'#9ca3af'}
  ];

  // Group by category
  var byCat={};
  Object.keys(CAT_CONFIG).forEach(function(k){byCat[k]=[];});
  checkedViolations.forEach(function(v){if(byCat[v.cat])byCat[v.cat].push(v);});

  var html='';

  // SUMMARY BAR
  html+='<div class="summary-bar">'
    +'<div class="sum-pill"><div class="sum-val">'+count+'</div><div class="sum-lbl">Violations</div></div>'
    +'<div class="sum-pill"><div class="sum-val" id="rpt-rights">—</div><div class="sum-lbl">Rights Violated</div></div>'
    +'<div class="sum-pill"><div class="sum-val">'+fmtC(totalFine)+'</div><div class="sum-lbl">Est. Exposure</div></div>'
    +'<div class="sum-pill"><div class="sum-val" style="font-size:14px">Shared</div><div class="sum-lbl">Group Filing</div></div>'
  +'</div>';

  // MOTIVATION METER
  html+='<div class="mot-block"><div class="mot-title">Based on documented violations — the resort is:</div><div class="mot-opts">';
  motLevels.forEach(function(m,i){
    var isActive=i===motLevel;
    html+='<div class="mot-opt'+(isActive?' active':' greyed')+'" '+(isActive?'style="border-color:'+m.dot+'"':'')+'>'
      +'<div class="mot-dot" style="background:'+m.dot+'"></div>'
      +'<div class="mot-text" style="color:'+m.textColor+'">'+m.text+'</div>'
      +'<div class="mot-sub">'+m.sub+'</div>'
    +'</div>';
  });
  html+='</div></div>';

  // VERDICT
  var verdicts=[
    {cls:'strong',title:'Strong Case — HIGHLY Motivated to Settle',text:'With '+count+' documented violations across multiple consumer rights and an estimated fine exposure of '+fmtC(totalFine)+', the resort faces consolidated legal and financial pressure they cannot ignore. Resorts in this position are highly motivated to negotiate a fast, full exit — and reimbursement is a realistic outcome.'},
    {cls:'strong',title:'Solid Case — SIGNIFICANTLY Motivated',text:count+' violations confirmed with an estimated exposure of '+fmtC(totalFine)+'. Clear and actionable grounds. The resort will be motivated to resolve quickly through a group filing negotiation.'},
    {cls:'moderate',title:'Qualifying Case — POTENTIALLY Motivated',text:count+' violations confirmed with an estimated exposure of '+fmtC(totalFine)+'. This client qualifies for our exit program. Additional violations may exist — our team conducts a full file review prior to contract.'},
    {cls:'moderate',title:'Continue Assessment — Insufficient Documentation',text:'Only '+count+' violation documented. Continue through all sections — additional violations are likely present. We recommend completing the full assessment before drawing conclusions.'}
  ];
  var v=verdicts[motLevel];
  html+='<div class="verdict-box '+v.cls+'"><div class="verdict-title '+v.cls+'">'+v.title+'</div><div class="verdict-text">'+v.text+'</div></div>';

  // VIOLATIONS BY CATEGORY
  html+='<div style="font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #C8960C">Violations by Statute Classification</div>';
  Object.keys(CAT_CONFIG).forEach(function(cat){
    var viols=byCat[cat];
    if(!viols||!viols.length)return;
    var cfg=CAT_CONFIG[cat];
    var catTotal=viols.reduce(function(s,v){return s+v.fine;},0);
    html+='<div class="cat-block"><div class="cat-hdr '+cfg.cls+'"><span>'+cfg.label+'</span><span class="cat-hdr-right">'+fmtC(catTotal)+'</span></div><div class="cat-body">';
    var running=0;
    viols.forEach(function(v){
      running+=v.fine;
      var kn=knew[v.id]||'—';var st=stop[v.id]||'—';
      html+='<div class="vt-row">'
        +'<div class="vt-left">'
          +'<div class="vt-text">'+v.text+'</div>'
          +'<div class="vt-statute">'+v.statute+' &nbsp;·&nbsp; <em>'+v.right+'</em></div>'
          +(kn!=='—'||st!=='—'?'<div style="margin-top:4px;font-size:11px;color:#6b7280">'+(kn!=='—'?'Knew before signing: <strong>'+kn+'</strong>':'')+' &nbsp;'+(st!=='—'?'Would have stopped them: <strong style="color:'+(st==='Yes'?'#c0392b':'#1a7a3c')+'">'+st+'</strong>':'')+'</div>':'')
        +'</div>'
        +'<div class="vt-right">'
          +'<div class="vt-fine">'+fmtC(v.fine)+'</div>'
          +'<div class="vt-shared">'+v.shared+' shared</div>'
          +'<div style="font-size:10px;color:#9ca3af;margin-top:2px">Running: '+fmtC(running)+'</div>'
        +'</div>'
      +'</div>';
    });
    html+='</div><div class="cat-total"><span>'+cfg.label+' Subtotal</span><span>'+fmtC(catTotal)+'</span></div></div>';
  });

  // KNEW / STOP SUMMARY TABLE
  var ksViolations=checkedViolations.filter(function(v){return knew[v.id]||stop[v.id];});
  if(ksViolations.length){
    html+='<div class="ks-block" style="margin-top:20px"><h3>Informed Consent Analysis</h3>';
    html+='<div style="display:grid;grid-template-columns:1fr 80px 90px;gap:0;background:#EAF0F8;border-radius:6px 6px 0 0;padding:8px 12px"><div style="font-size:11px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.3px">Violation</div><div style="font-size:11px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.3px;text-align:center">Knew Before</div><div style="font-size:11px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.3px;text-align:center">Would Stop</div></div>';
    ksViolations.forEach(function(v){
      var kn=knew[v.id]||'—';var st=stop[v.id]||'—';
      html+='<div style="display:grid;grid-template-columns:1fr 80px 90px;gap:0;padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:13px"><div>'+v.text+'</div><div style="text-align:center;font-weight:700;color:'+(kn==='No'?'#1a7a3c':kn==='Yes'?'#c0392b':'#9ca3af')+'">'+kn+'</div><div style="text-align:center;font-weight:700;color:'+(st==='Yes'?'#c0392b':st==='No'?'#6b7280':'#9ca3af')+'">'+st+'</div></div>';
    });
    var noCount=checkedViolations.filter(function(v){return knew[v.id]==='No';}).length;
    var yesStopCount=checkedViolations.filter(function(v){return stop[v.id]==='Yes';}).length;
    html+='<div style="background:#f9fafb;padding:10px 12px;border-top:2px solid #e5e7eb;font-size:13px;display:flex;gap:16px"><span style="color:#1a7a3c;font-weight:700">'+noCount+' violations unknown before signing</span><span style="color:#c0392b;font-weight:700">'+yesStopCount+' would have prevented signing</span></div></div>';
  }

  // ENFORCEMENT AGENCIES
  html+='<div class="agency-section" style="margin-top:24px"><h3>Enforcement Agencies That Would Act on These Violations</h3>';
  html+='<div style="font-size:14px;color:#374151;line-height:1.7;margin-bottom:14px">The following agencies have jurisdiction to investigate and levy fines for the violations documented above. Alpha maintains working relationships with several of these agencies. A documented group filing complaint — submitted collectively — carries far more weight than individual reports.</div>';
  html+='<div class="agency-grid">';
  Object.keys(CAT_CONFIG).forEach(function(cat){
    var viols=byCat[cat];
    if(!viols||!viols.length)return;
    var cfg=CAT_CONFIG[cat];
    html+='<div class="agency-card"><div class="ac-cat">'+cfg.label+'</div><div class="ac-name">'+cfg.agencies.join('<br>')+'</div></div>';
  });
  html+='</div>';
  html+='<div class="escalation-box"><h4>Our Escalation Capability</h4><p>When we submit a group filing complaint to these agencies collectively — with all participants' documented violations — we are not sending one complaint. We are sending a pattern-documented, multi-participant report that agencies are required to investigate. Resorts are acutely aware of what a coordinated FTC or CFPB complaint filing looks like. This is leverage they cannot ignore.</p></div></div>';

  // ACTION BUTTONS
  html+='<div class="btn-row"><button class="btn primary" onclick="window.print()">🖨 Print Report</button><button class="btn email" onclick="copyReport()">📋 Copy for Email</button><button class="btn secondary" onclick="window.location.href='/cost/'">Continue to True Cost →</button></div>';

  body.innerHTML=html;

  // Count rights violated
  var rv=new Set();checkedViolations.forEach(function(v){rv.add(v.right);});
  var rvEl=document.getElementById('rpt-rights');if(rvEl)rvEl.textContent=rv.size+' of 4';
}

function copyReport(){
  var d=activeData()||{};
  var text='ALPHA TIMESHARE CONSULTANTS
Violation & Fine Report
'+new Date().toLocaleDateString()+'

Client: '+((d.firstName||'')+' '+(d.lastName||'')).trim()+'
Resort: '+(d.resort||'—')+'
Total Violations: '+(d.violations?d.violations.length:0)+'
Estimated Fine Exposure: '+fmtC(d.violationTotal||0);
  try{navigator.clipboard.writeText(text).then(function(){toast('✓ Copied');});}
  catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✓ Copied');}
}

function toast(msg,color){var t=document.getElementById('tst');t.style.background=color||'#1a7a3c';t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}
