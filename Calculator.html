<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM Dashboard</title>
<style>
    body{
        font-family: Arial, sans-serif;
        margin:0;
        background:#eef1f5;
        color:#111;
    }

    .topbar{
        padding:16px;
        background:#111827;
        color:white;
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap:wrap;
    }

    .topbar h1{
        font-size:16px;
        margin:0;
        margin-right:10px;
        font-weight:600;
    }

    input[type="file"], input[type="text"], button{
        padding:8px;
        border-radius:6px;
        border:1px solid #ccc;
    }

    button{
        background:#2563eb;
        color:white;
        border:none;
        cursor:pointer;
    }

    button:hover{
        background:#1d4ed8;
    }

    .container{
        padding:12px;
    }

    .table-wrap{
        max-height:80vh;
        overflow:auto;
        background:white;
        border-radius:10px;
        box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    table{
        width:100%;
        border-collapse:separate;
        border-spacing:0;
        table-layout:fixed;
        font-size:13px;
    }

    th, td{
        padding:10px;
        border-bottom:1px solid #eee;
        white-space:normal;
        word-break:break-word;
        vertical-align:top;
    }

    th{
        background:#1f2937;
        color:white;
        position:sticky;
        top:0;
        z-index:2;
        user-select:none;
        cursor:pointer;
    }

    tr:hover td{
        background:#f9fafb;
    }

    .sort{
        font-size:11px;
        margin-left:6px;
        opacity:0.8;
    }

    .resizer{
        position:absolute;
        right:0;
        top:0;
        width:6px;
        height:100%;
        cursor:col-resize;
    }

    th{
        position:sticky;
    }

    th:first-child, td:first-child{
        position:sticky;
        left:0;
        background:#111827;
        color:white;
        z-index:3;
    }

    td:first-child{
        background:white;
        color:black;
        z-index:1;
    }

    .panel{
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap:wrap;
    }

    .columns-panel{
        display:none;
        position:absolute;
        background:white;
        border:1px solid #ddd;
        padding:10px;
        border-radius:8px;
        max-height:300px;
        overflow:auto;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        z-index:10;
    }

    .col-item{
        display:flex;
        align-items:center;
        gap:6px;
        font-size:12px;
        margin-bottom:4px;
    }
</style>
</head>
<body>

<div class="topbar">
    <h1>CRM Dashboard</h1>
    <input type="file" id="csvFile" accept=".csv" />
    <input type="text" id="search" placeholder="Search CRM..." />
    <button onclick="toggleColumns()">Columns</button>
</div>

<div class="container">
    <div class="table-wrap">
        <table id="table">
            <colgroup id="colgroup"></colgroup>
        </table>
    </div>

    <div id="columnsPanel" class="columns-panel"></div>
</div>

<script>
let dataGlobal = [];
let headersGlobal = [];
let sortState = {col:null,asc:true};

function parseCSV(text){
    return text.trim().split(/\r?\n/).map(r=>{
        let out=[],cur='',q=false;
        for(let c of r){
            if(c==='"') q=!q;
            else if(c===','&&!q){out.push(cur);cur='';}
            else cur+=c;
        }
        out.push(cur);
        return out;
    });
}

function render(data){
    const table=document.getElementById('table');
    const colgroup=document.getElementById('colgroup');
    table.innerHTML='';colgroup.innerHTML='';

    headersGlobal=data[0];
    dataGlobal=data.slice(1);

    headersGlobal.forEach((h,i)=>{
        const col=document.createElement('col');
        col.style.width=Math.max(140,h.length*10)+'px';
        colgroup.appendChild(col);
    });

    const thead=document.createElement('thead');
    const tr=document.createElement('tr');

    headersGlobal.forEach((h,i)=>{
        const th=document.createElement('th');
        th.innerHTML=h+` <span class='sort'></span>`;
        th.onclick=()=>sort(i);
        tr.appendChild(th);
    });

    thead.appendChild(tr);
    table.appendChild(thead);

    const tbody=document.createElement('tbody');

    dataGlobal.forEach(r=>{
        const tr=document.createElement('tr');
        r.forEach(c=>{
            const td=document.createElement('td');
            td.textContent=c||'';
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });

    table.appendChild(tbody);

    buildColumnPanel();
}

function sort(i){
    sortState.asc = sortState.col===i ? !sortState.asc : true;
    sortState.col=i;

    dataGlobal.sort((a,b)=>{
        let x=a[i]||'',y=b[i]||'';
        let nx=parseFloat(x),ny=parseFloat(y);

        if(!isNaN(nx)&&!isNaN(ny)) return sortState.asc?nx-ny:ny-nx;
        return sortState.asc?x.localeCompare(y):y.localeCompare(x);
    });

    render([headersGlobal,...dataGlobal]);
}

function buildColumnPanel(){
    const panel=document.getElementById('columnsPanel');
    panel.innerHTML='';

    headersGlobal.forEach((h,i)=>{
        const div=document.createElement('div');
        div.className='col-item';

        const cb=document.createElement('input');
        cb.type='checkbox';
        cb.checked=true;
        cb.onchange=()=>toggleCol(i,cb.checked);

        const label=document.createElement('span');
        label.textContent=h;

        div.appendChild(cb);
        div.appendChild(label);
        panel.appendChild(div);
    });
}

function toggleColumns(){
    const p=document.getElementById('columnsPanel');
    p.style.display=p.style.display==='block'?'none':'block';
}

function toggleCol(i,show){
    const table=document.getElementById('table');
    table.querySelectorAll('tr').forEach(r=>{
        if(r.children[i]) r.children[i].style.display=show?'':'none';
    });
}

document.getElementById('search').addEventListener('input',e=>{
    const v=e.target.value.toLowerCase();

    const filtered=dataGlobal.filter(r=>
        r.some(c=>(c||'').toLowerCase().includes(v))
    );

    render([headersGlobal,...filtered]);
});

document.getElementById('csvFile').addEventListener('change',e=>{
    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=ev=>render(parseCSV(ev.target.result));
    reader.readAsText(file);
});
</script>

</body>
</html>
