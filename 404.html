<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting…</title>
<script>
// GitHub Pages 404 trick — redirect /portals/{slug} to /portals/?s={slug}
var path = window.location.pathname;
var parts = path.split('/').filter(Boolean);

if(parts[0] === 'portals' && parts[1]) {
  // /portals/b.canizaro  ->  /portals/?s=b.canizaro
  window.location.replace('/portals/?s=' + parts[1]);
} else {
  // Any other 404 — go home
  window.location.replace('/');
}
</script>
</head>
<body></body>
</html>
