<!-- 
  ATC FIREBASE SIDEBAR
  Replace the existing <style id="atc-sb-css"> and <script id="atc-sb"> blocks
  on EVERY page with this block.
  
  It is a drop-in replacement. All existing page JS (autoSave, loadData, etc.)
  continues to work — it calls window.ATC.saveClient() instead of localStorage.
-->

<style id="atc-sb-css">
body{display:flex!important;min-height:100vh!important}
.sidenav{width:220px!important;min-width:220px!important;background:#1B2A4A!important;position:fixed!important;top:0!important;left:0!important;height:100vh!important;z-index:200!important;display:flex!important;flex-direction:column!important;overflow-y:auto!important}
.sidenav::-webkit-scrollbar{width:4px}
.sidenav::-webkit-scrollbar-thumb{background:rgba(200,150,12,.4);border-radius:2px}
.main,.main-content,.app,.page-content{margin-left:220px!important;flex:1!important}
@media print{.sidenav{display:none!important}.main,.main-content,.app{margin-left:0!important}}
</style>

<script type="module" id="atc-sb">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBINr3Y-kUVc6wcOff5Tsqk6S3PCocYQLs",
  authDomain: "alphafiles-net.firebaseapp.com",
  projectId: "alphafiles-net",
  storageBucket: "alphafiles-net.firebasestorage.app",
  messagingSenderId: "656837736859",
  appId: "1:656837736859:web:d8ab92c07d91ddcdd4493e"
};

const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Globals exposed to page scripts ──────────────────────────
let _allClients = {};
let _activeSlug = sessionStorage.getItem('atc_active') || null;
let _activeData = null;

// Legacy compatibility shims — page scripts call these
const SK = 'atc_clients_v2';
const AK = 'atc_active';

// ga() — get all clients
window.ga = function(){ return _allClients; };

// ac() — get active slug
window.ac = function(){ return _activeSlug; };

// ad() — get active client data
window.ad = function(){ return _activeData; };

// sa() — save all (legacy: now saves only active client to Firestore)
window.sa = async function(all){
  _allClients = all;
  if (_activeSlug && all[_activeSlug]) {
    await setDoc(doc(db, 'clients', _activeSlug), {
      ...all[_activeSlug],
      _updated: serverTimestamp()
    }, { merge: true });
  }
};

// swC() — switch active client
window.swC = function(slug){
  if (!slug) return;
  _activeSlug = slug;
  sessionStorage.setItem('atc_active', slug);
  _activeData = _allClients[slug] || null;
  setTimeout(() => location.reload(), 400);
};

// sf() — set single field on active client
window.sf = async function(k, v){
  if (!_activeSlug) return;
  if (!_allClients[_activeSlug]) _allClients[_activeSlug] = {};
  _allClients[_activeSlug][k] = v;
  _allClients[_activeSlug]._updated = Date.now();
  await setDoc(doc(db, 'clients', _activeSlug), { [k]: v, _updated: serverTimestamp() }, { merge: true });
};

// newC() / createC() — create new client modal (unchanged UI)
window.newC = function(){
  let m = document.getElementById('_ncm');
  if (!m) {
    m = document.createElement('div'); m.id='_ncm';
    m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:600;display:none;align-items:center;justify-content:center';
    const box = document.createElement('div');
    box.style.cssText='background:#fff;border-radius:12px;padding:24px;max-width:380px;width:100%;margin:20px';
    function mkF(id,lbl,ph){
      const d=document.createElement('div');d.style.marginBottom='10px';
      const l=document.createElement('label');l.style.cssText='display:block;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px';l.textContent=lbl;
      d.appendChild(l);
      const i=document.createElement('input');i.id=id;i.style.cssText='width:100%;border:1.5px solid #E0E4ED;border-radius:6px;padding:9px 11px;font-size:14px';i.placeholder=ph;
      d.appendChild(i);return d;
    }
    const tt=document.createElement('div');tt.style.cssText='font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:14px';tt.textContent='New Client Session';box.appendChild(tt);
    box.appendChild(mkF('_ncf','First Name','First (optional)'));
    box.appendChild(mkF('_ncl','Last Name','Last (optional)'));
    box.appendChild(mkF('_ncr','Resort','Resort name (optional)'));
    const btns=document.createElement('div');btns.style.cssText='display:flex;gap:8px;margin-top:4px';
    const bc=document.createElement('button');bc.style.cssText='flex:1;padding:10px;font-size:14px;font-weight:600;border-radius:6px;border:1.5px solid #1B2A4A;background:#fff;cursor:pointer';bc.textContent='Cancel';bc.onclick=()=>m.style.display='none';
    const bs=document.createElement('button');bs.style.cssText='flex:1;padding:10px;font-size:14px;font-weight:600;border-radius:6px;border:none;background:#C8960C;color:#fff;cursor:pointer';bs.textContent='Start';bs.onclick=()=>createC();
    btns.appendChild(bc);btns.appendChild(bs);box.appendChild(btns);
    m.appendChild(box);
    m.addEventListener('click',e=>{if(e.target===m)m.style.display='none';});
    document.body.appendChild(m);
  }
  m.style.display='flex';
  setTimeout(()=>{const f=document.getElementById('_ncf');if(f)f.focus();},100);
};

window.createC = async function(){
  const f=(document.getElementById('_ncf')||{}).value||'';
  const l=(document.getElementById('_ncl')||{}).value||'';
  const r=(document.getElementById('_ncr')||{}).value||'';
  const ft=f.trim(),lt=l.trim(),rt=r.trim();

  let slug;
  if (!ft && !lt) {
    const ct = Object.keys(_allClients).filter(k=>k.startsWith('unnamed')).length+1;
    slug = 'unnamed-'+ct;
  } else {
    slug = ((ft||'x')[0]+'.'+( lt||'client')).toLowerCase().replace(/[^a-z0-9.]/g,'');
  }

  const data = { firstName:ft, lastName:lt, resort:rt, _created:serverTimestamp(), _updated:serverTimestamp() };
  await setDoc(doc(db,'clients',slug), data, {merge:true});
  _allClients[slug] = { firstName:ft, lastName:lt, resort:rt, _created:Date.now(), _updated:Date.now() };
  _activeSlug = slug;
  _activeData = _allClients[slug];
  sessionStorage.setItem('atc_active', slug);

  const m=document.getElementById('_ncm');if(m)m.style.display='none';
  window.toast('Session started');
  setTimeout(()=>location.href='/vitals/',700);
};

// saveClear()
window.saveClear = async function(){
  if (_activeSlug && _allClients[_activeSlug]) {
    await setDoc(doc(db,'clients',_activeSlug), { ..._allClients[_activeSlug], _updated:serverTimestamp() }, {merge:true});
  }
  _activeSlug = null;
  _activeData = null;
  sessionStorage.removeItem('atc_active');
  window.toast('Saved and cleared');
  setTimeout(()=>location.href='/home/',700);
};

// addCal()
window.addCal = function(){
  const d=_activeData;
  const fu=d&&d._fuAppt;if(!fu){alert('Set a follow-up date first.');return;}
  const dt=new Date(fu);
  const fmt=x=>x.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent((d.firstName||'Client')+' - ATC Follow-Up')+'&dates='+fmt(dt)+'/'+fmt(new Date(dt.getTime()+3600000)),'_blank');
};

// toast()
window.toast = function(msg,color){
  let t=document.getElementById('_t');
  if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='display:none;position:fixed;bottom:24px;left:240px;background:#16A34A;color:#fff;padding:10px 18px;font-size:14px;font-weight:600;border-radius:8px;z-index:700';document.body.appendChild(t);}
  t.style.background=color||'#16A34A';t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
};

// rpt()
window.rpt = function(type){
  const d=_activeData;if(!d){toast('No active client','#DC2626');return;}
  const fc=n=>'$'+Math.round(n||0).toLocaleString();
  const nm=((d.firstName||d.lastName?(d.firstName||'')+' '+(d.lastName||''):'Unnamed')).trim();
  const mo=fc((parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12));
  const nl='\n';let txt='';
  const stages=['Intro','Assessment','True Cost','Quote','Acknowledgment','Contract','Funding','Completed'];
  if(type==='crm')txt='=== CALL NOTES '+new Date().toLocaleDateString()+' ==='+nl+'Client: '+nm+nl+'Resort: '+(d.resort||'--')+nl+'Phone: '+(d.phone||'--')+nl+'Monthly: '+mo+nl+'MTF: '+fc(d.maitFees)+'/yr'+nl+'Mortgage: '+(parseFloat(d.monthlyMortgage)>0?fc(d.monthlyMortgage)+'/mo':'Paid off')+nl+'Stage: '+stages[d.vitalsStage||1]+nl+'Quote: '+(d.alphaFee?fc(d.alphaFee):'--')+nl+'Classify: '+(d.clientClass||'--')+nl+'Notes: '+(d.notes||'--');
  else if(type==='sms')txt='Hi '+(d.firstName||'there')+', this is Sebastian at Alpha Timeshare Consultants. Good time to connect? (877) 848-3948 Ext. 134';
  else txt='ALPHA TIMESHARE CONSULTANTS'+nl+new Date().toLocaleDateString()+nl+'Client: '+nm+nl+'Resort: '+(d.resort||'--')+nl+'Phone: '+(d.phone||'--')+nl+'Monthly: '+mo+nl+'Quote: '+(d.alphaFee?fc(d.alphaFee):'--')+nl+'Notes: '+(d.notes||'--');
  try{navigator.clipboard.writeText(txt).then(()=>toast('Copied'));}
  catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied');}
};

// ── Pages list ────────────────────────────────────────────────
const _PG=[
  {n:0,ic:'🏠',lb:'Dashboard',url:'/home/'},
  {n:'V1',ic:'⚾',lb:'Client Vitals',url:'/vitals/'},
  {n:2,ic:'❓',lb:'Why Do You Want Out',url:'/whyout/'},
  {n:3,ic:'⚠️',lb:'If You Do Nothing',url:'/wait/'},
  {n:4,ic:'🔍',lb:'Finding Your Group',url:'/group/'},
  {n:'4a',ic:'✅',lb:'Your Spot in Group Filing',url:'/approval/'},
  {n:'4b',ic:'👨‍👩‍👧',lb:'Heirs & Estate Liability',url:'/heirs/'},
  {n:'4c',ic:'💵',lb:'Resort Compensation',url:'/compensation/'},
  {n:'4d',ic:'💳',lb:'To Pay or Not to Pay',url:'/credit/'},
  {n:'4e',ic:'✉️',lb:'Mutual Release Letter',url:'/letter/'},
  {n:'4f',ic:'🚪',lb:'4 Ways to Exit',url:'/exit-methods/'},
  {n:5,ic:'🛡',lb:'Certificate of Guarantee',url:'/guarantee/'},
  {n:6,ic:'⭐',lb:'Our Track Record',url:'/history/'},
  {n:7,ic:'⚖️',lb:'Consumer Rights',url:'/rights/'},
  {n:8,ic:'💰',lb:'True Cost',url:'/cost/'},
  {n:9,ic:'📄',lb:'Your Quote',url:'/quote/'},
  {n:10,ic:'⏰',lb:'Follow-Up Scheduler',url:'/followup/'},
  {n:11,ic:'🏆',lb:"What Makes Alpha Better",url:'/better/'},
  {n:12,ic:'📦',lb:"What's Included",url:'/included/'},
  {n:13,ic:'📋',lb:'Recap',url:'/recap/'},
  {n:14,ic:'✅',lb:'Client Acknowledgment',url:'/checklist/'},
  {n:15,ic:'📝',lb:'Alpha Contract',url:'/contract/'},
  {n:16,ic:'🎉',lb:"Let's Be Timeshare Free",url:'/free/'}
];

function _fC(n){return '$'+Math.round(n||0).toLocaleString();}
function _fD(ts){if(!ts)return'--';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

// ── Build sidebar ─────────────────────────────────────────────
window.buildSB = function(){
  let el=document.querySelector('.sidenav');
  if(!el){el=document.createElement('div');el.className='sidenav';document.body.insertBefore(el,document.body.firstChild);}

  const d=_activeData, slug=_activeSlug, all=_allClients;
  const cur='/'+window.location.pathname.split('/').filter(Boolean)[0]+'/';
  const mo=d?(parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12):0;
  const nm=d?(d.firstName||d.lastName?(d.firstName||'')+' '+(d.lastName||''):'Unnamed').trim():null;

  const ct=d
    ?`<div style='padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.1)'>
        <div style='font-size:14px;font-weight:700;color:#fff;margin-bottom:2px'>${nm||'Unnamed'}</div>
        <div style='font-size:12px;color:#C8960C;font-weight:600;margin-bottom:4px'>${d.resort||'No resort'}</div>
        <div style='display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.65);margin-bottom:2px'><span>Monthly</span><strong style='color:#fff'>${_fC(mo)}</strong></div>
        <div style='display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.65)'><span>MTF/yr</span><strong style='color:#fff'>${_fC(parseFloat(d.maitFees)||0)}</strong></div>
        ${d.alphaFee?`<div style='background:rgba(200,150,12,.15);border:1px solid rgba(200,150,12,.3);border-radius:3px;padding:4px 7px;margin-top:5px;font-size:12px;color:#C8960C;font-weight:600'>${_fC(d.alphaFee)}</div>`:''}
        <div style='font-size:12px;color:rgba(255,255,255,.3);margin-top:4px'>${_fD(d._updated)}</div>
      </div>`
    :`<div style='padding:10px 12px;font-size:12px;color:rgba(255,100,100,.9);font-weight:600;border-bottom:1px solid rgba(255,255,255,.1)'>No client selected</div>`;

  const opts=Object.keys(all).map(k=>{
    const c=all[k];
    const n=((c.firstName||c.lastName?(c.firstName||'')+' '+(c.lastName||''):'Unnamed')).trim();
    return`<option value='${k}'${k===slug?' selected':''}>${n}${c.resort?' - '+c.resort:''}</option>`;
  }).join('');

  const nav=_PG.map(p=>{
    const act=cur===p.url;
    return`<a href='${p.url}' style='display:flex;align-items:center;gap:7px;padding:7px 10px;text-decoration:none;color:${act?'#C8960C':'rgba(255,255,255,.65)'};font-size:12px;font-weight:500;border-left:3px solid ${act?'#C8960C':'transparent'};background:${act?'rgba(200,150,12,.12)':'transparent'}'><span style='font-size:12px;font-weight:700;background:rgba(255,255,255,.12);border-radius:4px;padding:1px 4px;min-width:20px;text-align:center;color:${act?'#C8960C':'rgba(255,255,255,.45)'}'>${p.n}</span><span style='flex:1'>${p.ic} ${p.lb}</span></a>`;
  }).join('');

  const today=d&&d._todayAppt?d._todayAppt:'';
  const fuAppt=d&&d._fuAppt?d._fuAppt:'';

  el.innerHTML=
    `<div style='padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center'><img src='https://alphatimeshareconsultants.com/wp-content/uploads/2026/04/Alpha-TimeShare-Consultants-logo.png' alt='ATC' style='max-width:130px'></div>`
    +ct
    +`<div style='padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1)'>
        <select style='width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 7px;font-size:12px;border-radius:3px' onchange='swC(this.value)'><option value=''>- Select client -</option>${opts}</select>
        <div style='display:flex;gap:5px;margin-top:5px'>
          <button onclick='newC()' style='flex:1;background:#C8960C;color:#fff;border:none;padding:5px;font-size:12px;font-weight:700;border-radius:3px;cursor:pointer'>+ New</button>
          <button onclick='saveClear()' style='flex:1;background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);padding:5px;font-size:12px;font-weight:700;border-radius:3px;cursor:pointer'>Save &amp; Clear</button>
        </div>
      </div>`
    +`<div style='font-size:12px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px 3px'>Pages</div>`
    +`<nav style='flex:1;padding:4px 0'>${nav}</nav>`
    +`<div style='padding:8px 12px;border-top:1px solid rgba(255,255,255,.08)'>
        <div style='font-size:12px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px'>Today</div>
        <input type='datetime-local' style='width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;padding:5px 7px;font-size:12px;border-radius:3px;margin-bottom:3px' value='${today}' onchange='sf("_todayAppt",this.value)'>
        <div style='font-size:12px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:.4px;margin:4px 0'>Follow-Up</div>
        <input type='datetime-local' style='width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;padding:5px 7px;font-size:12px;border-radius:3px;margin-bottom:4px' value='${fuAppt}' onchange='sf("_fuAppt",this.value)'>
        <button onclick='addCal()' style='width:100%;background:#C8960C;color:#fff;border:none;padding:5px;font-size:12px;font-weight:700;border-radius:3px;cursor:pointer'>+ Google Calendar</button>
      </div>`
    +`<div style='padding:6px 12px;border-top:1px solid rgba(255,255,255,.08)'>
        <div style='font-size:12px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px'>Reports</div>
        <button data-rpt='crm' style='display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.65);padding:5px 8px;font-size:12px;border-radius:3px;cursor:pointer;margin-bottom:3px'>CRM Note</button>
        <button data-rpt='sms' style='display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.65);padding:5px 8px;font-size:12px;border-radius:3px;cursor:pointer;margin-bottom:3px'>SMS</button>
        <button data-rpt='full' style='display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.65);padding:5px 8px;font-size:12px;border-radius:3px;cursor:pointer'>Full Summary</button>
      </div>`
    +`<div style='padding:8px 12px;border-top:1px solid rgba(255,255,255,.08)'>
        <button onclick='window.ATC_signOut()' style='width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);padding:5px;font-size:11px;border-radius:3px;cursor:pointer'>Sign Out</button>
      </div>`;

  el.querySelectorAll('[data-rpt]').forEach(btn=>{
    btn.addEventListener('click',function(){rpt(this.getAttribute('data-rpt'));});
  });
};

// ── Sign out ──────────────────────────────────────────────────
window.ATC_signOut = async function(){
  await signOut(auth);
  sessionStorage.removeItem('atc_active');
  window.location.href = '/login/';
};

// ── Auth check + data load ────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = '/login/';
    return;
  }

  // Check role
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  const role = userDoc.exists() ? userDoc.data().role : 'client';
  if (role === 'client') {
    window.location.href = '/client-view/';
    return;
  }

  // Load all clients from Firestore
  const snap = await getDocs(collection(db, 'clients'));
  snap.forEach(d => { _allClients[d.id] = d.data(); });

  // Load active client
  if (_activeSlug && _allClients[_activeSlug]) {
    _activeData = _allClients[_activeSlug];
  }

  // Build sidebar
  buildSB();

  // If page has loadData(), call it now that Firestore data is ready
  if (typeof window.loadData === 'function') window.loadData();
  if (typeof window.initBanner === 'function') window.initBanner();
});
</script>
