<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CRM</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f7f7f7;
}

h2{
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td{
  border:1px solid #ddd;
  padding:10px;
  font-size:13px;
  text-align:left;
}

th{
  background:#185FA5;
  color:white;
  position:sticky;
  top:0;
}

tr:nth-child(even){
  background:#f2f6ff;
}

.badge{
  padding:3px 8px;
  border-radius:10px;
  font-size:11px;
  display:inline-block;
}
.hot{ background:#FCEBEB; color:#791F1F; }
.warm{ background:#EAF3DE; color:#27500A; }
.cold{ background:#E6F1FB; color:#0C447C; }
</style>

</head>

<body>

<h2>Lead CRM</h2>

<table>
  <thead>
    <tr>
      <th>Lead Name</th>
      <th>Phone</th>
      <th>TZ</th>
      <th>Tag</th>
      <th>Lang</th>
      <th>Appt</th>
      <th>Resort</th>
      <th>Lead Status</th>
      <th>Call Status</th>
    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<script>
const data = [
  ["John Smith","555-1234","ET","HOT","EN","Mar 10","Hilton VB","New","No Answer"],
  ["Maria Lopez","555-8888","CT","WARM","ES","Mar 12","Marriott","Contacted","Follow-up"],
  ["David Lee","555-2222","PT","COLD","EN","Mar 15","Westgate","Nurture","Pending"]
];

function tagClass(tag){
  tag = (tag||"").toUpperCase();
  if(tag.includes("HOT")) return "hot";
  if(tag.includes("WARM")) return "warm";
  return "cold";
}

function render(){
  const tbody = document.getElementById("tbody");
  let html = "";

  for(let i=0;i<data.length;i++){
    const r = data[i];

    html += "<tr>";

    html += "<td>"+r[0]+"</td>";
    html += "<td>"+r[1]+"</td>";
    html += "<td>"+r[2]+"</td>";

    html += "<td><span class='badge "+tagClass(r[3])+"'>"+r[3]+"</span></td>";

    html += "<td>"+r[4]+"</td>";
    html += "<td>"+r[5]+"</td>";
    html += "<td>"+r[6]+"</td>";
    html += "<td>"+r[7]+"</td>";
    html += "<td>"+r[8]+"</td>";

    html += "</tr>";
  }

  tbody.innerHTML = html;
}

render();
</script>

</body>
</html>
