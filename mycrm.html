<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM CSV Viewer</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
    }

    h1 {
        margin-bottom: 10px;
    }

    .upload-box {
        margin-bottom: 20px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input[type="file"] {
        padding: 10px;
    }

    .table-container {
        max-height: 75vh;
        overflow: auto;
        border-radius: 8px;
        background: white;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    th {
        background: #222;
        color: white;
        position: sticky;
        top: 0;
        user-select: none;
        cursor: pointer;
        position: relative;
    }

    tr:hover {
        background: #f0f0f0;
    }

    .sort-indicator {
        margin-left: 6px;
        font-size: 12px;
    }

    .resizer {
        position: absolute;
        right: 0;
        top: 0;
        width: 6px;
        height: 100%;
        cursor: col-resize;
    }
</style>
</head>
<body>

<h1>CRM CSV Upload Viewer</h1>

<div class="upload-box">
    <input type="file" id="csvFile" accept=".csv" />
</div>

<div class="table-container">
    <table id="dataTable">
        <colgroup id="colgroup"></colgroup>
    </table>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {

let sortState = { col: null, asc: true };
let startX, startWidth, currentCol;

function parseCSV(text) {
    const rows = text.trim().split(/\r?\n/);
    return rows.map(row => {
        let values = [];
        let current = '';
        let inQuotes = false;

        for (let char of row) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) {
                values.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        values.push(current);
        return values;
    });
}

function buildTable(data) {
    const table = document.getElementById('dataTable');
    const colgroup = document.getElementById('colgroup');

    table.innerHTML = '';
    colgroup.innerHTML = '';

    const headers = data[0];
    const body = data.slice(1);

    headers.forEach(() => {
        const col = document.createElement('col');
        col.style.width = '160px';
        colgroup.appendChild(col);
    });

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');

    headers.forEach((h, i) => {
        const th = document.createElement('th');
        th.textContent = h;

        const indicator = document.createElement('span');
        indicator.className = 'sort-indicator';
        th.appendChild(indicator);

        th.onclick = () => sortTable(i);

        const resizer = document.createElement('div');
        resizer.className = 'resizer';
        resizer.onmousedown = initResize;
        th.appendChild(resizer);

        headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    body.forEach(row => {
        const tr = document.createElement('tr');
        headers.forEach((_, i) => {
            const td = document.createElement('td');
            td.textContent = row[i] || '';
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });

    table.appendChild(tbody);
}

function sortTable(colIndex) {
    const table = document.getElementById('dataTable');
    const tbody = table.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));

    sortState.asc = sortState.col === colIndex ? !sortState.asc : true;
    sortState.col = colIndex;

    const headers = table.querySelectorAll('th');
    headers.forEach((th, i) => {
        const icon = th.querySelector('.sort-indicator');
        icon.textContent = i === colIndex ? (sortState.asc ? '▲' : '▼') : '';
    });

    rows.sort((a, b) => {
        const aText = a.children[colIndex].textContent.trim();
        const bText = b.children[colIndex].textContent.trim();

        const aNum = parseFloat(aText);
        const bNum = parseFloat(bText);

        if (!isNaN(aNum) && !isNaN(bNum)) {
            return sortState.asc ? aNum - bNum : bNum - aNum;
        }

        return sortState.asc
            ? aText.localeCompare(bText)
            : bText.localeCompare(aText);
    });

    rows.forEach(r => tbody.appendChild(r));
}

function initResize(e) {
    currentCol = e.target.parentElement;
    startX = e.pageX;
    startWidth = currentCol.offsetWidth;

    document.addEventListener('mousemove', resize);
    document.addEventListener('mouseup', stopResize);
}

function resize(e) {
    const newWidth = startWidth + (e.pageX - startX);
    const index = Array.from(currentCol.parentElement.children).indexOf(currentCol);
    const col = document.getElementById('colgroup').children[index];
    col.style.width = newWidth + 'px';
}

function stopResize() {
    document.removeEventListener('mousemove', resize);
    document.removeEventListener('mouseup', stopResize);
}

document.getElementById('csvFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const data = parseCSV(event.target.result);
        buildTable(data);
    };
    reader.readAsText(file);
});

});
</script>

</body>
</html>
