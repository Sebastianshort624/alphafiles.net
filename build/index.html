<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ATC Build Console</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#0d1117;color:#e6edf3;font-size:14px;line-height:1.6}
.topbar{background:#1B2A4A;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #C8960C}
.topbar h1{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:.5px}
.topbar span{font-size:11px;color:#C8960C;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.wrap{max-width:960px;margin:0 auto;padding:24px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;margin-bottom:20px;overflow:hidden}
.card-hdr{background:#1B2A4A;padding:10px 18px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:18px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:5px}
select,input{width:100%;padding:9px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:Inter,sans-serif;font-size:13px;margin-bottom:14px}
select:focus,input:focus{outline:none;border-color:#C8960C}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.btn{padding:10px 20px;border:none;border-radius:7px;font-family:Inter,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.btn-gold{background:#C8960C;color:#fff}.btn-gold:hover{background:#b8860b}
.btn-navy{background:#1B2A4A;color:#fff}.btn-navy:hover{background:#243a5e}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.log{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:14px;font-family:monospace;font-size:12px;min-height:80px;max-height:220px;overflow-y:auto;color:#7ee787}
.log .err{color:#f85149}
.log .info{color:#58a6ff}
.log .warn{color:#e3b341}
.preview-frame{width:100%;height:500px;border:1px solid #30363d;border-radius:6px;background:#fff}
.stat-pill{display:inline-flex;align-items:center;gap:6px;background:#0d1117;border:1px solid #30363d;border-radius:100px;padding:4px 12px;font-size:12px;font-weight:600;color:#8b949e}
.stat-pill.ok{border-color:#16a34a;color:#7ee787}
.stat-pill.warn{border-color:#e3b341;color:#e3b341}
.field-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #21262d}
.field-row:last-child{border-bottom:none}
.field-label{font-size:11px;font-weight:700;color:#8b949e;width:140px;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px}
.field-val{font-size:13px;color:#e6edf3;font-weight:600}
.field-val.empty{color:#484f58;font-style:italic}
.section-sep{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#C8960C;text-transform:uppercase;letter-spacing:1px;padding:10px 0 4px;border-bottom:1px solid #21262d;margin-bottom:4px}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚙️ ATC Build Console</h1>
  <span>Advanced Functions — Isolated from Vitals</span>
</div>

<div class="wrap">

  <!-- CLIENT SELECTOR -->
  <div class="card">
    <div class="card-hdr">
      <span>1. Select Client</span>
      <button class="btn btn-sm btn-navy" onclick="loadClients()">↻ Refresh</button>
    </div>
    <div class="card-body">
      <label>Active Client</label>
      <select id="client-select" onchange="onClientChange()">
        <option value="">— Select a client —</option>
      </select>
      <div id="client-pills" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
      <div id="client-fields"></div>
    </div>
  </div>

  <!-- TOKEN -->
  <div class="card">
    <div class="card-hdr"><span>2. GitHub Token</span></div>
    <div class="card-body">
      <label>GitHub PAT (saved in browser)</label>
      <div style="display:flex;gap:10px">
        <input type="password" id="gh-token" placeholder="ghp_..." style="margin-bottom:0;flex:1">
        <button class="btn btn-navy" onclick="saveToken()">Save</button>
        <button class="btn btn-sm btn-red" onclick="clearToken()">Clear</button>
      </div>
      <div id="token-status" style="margin-top:8px;font-size:12px;color:#8b949e"></div>
    </div>
  </div>

  <!-- BUILD & PUSH -->
  <div class="card">
    <div class="card-hdr"><span>3. Build &amp; Push</span></div>
    <div class="card-body">
      <div class="grid2" style="margin-bottom:14px">
        <div>
          <label>Target Slug (URL path)</label>
          <input id="build-slug" placeholder="e.g. r.weinaug">
        </div>
        <div>
          <label>Fee Override (optional)</label>
          <input id="fee-override" placeholder="Leave blank to use client fee">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-navy" onclick="previewQuote()">👁 Preview Page</button>
        <button class="btn btn-gold" onclick="pushQuote()">🚀 Build &amp; Push to GitHub</button>
        <button class="btn btn-green" onclick="addToHub()">📋 Add Card to /clients/ Hub</button>
      </div>
      <div style="margin-top:14px">
        <label>Build Log</label>
        <div class="log" id="build-log"><span class="info">Ready. Select a client and click Build & Push.</span></div>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card" id="preview-card" style="display:none">
    <div class="card-hdr">
      <span>Page Preview</span>
      <button class="btn btn-sm btn-red" onclick="document.getElementById('preview-card').style.display='none'">✕ Close</button>
    </div>
    <div class="card-body" style="padding:0">
      <iframe class="preview-frame" id="preview-frame"></iframe>
    </div>
  </div>

</div>

<script>
var SK='atc_clients_v2', TK='atc_gh_token';

function log(msg,type){
  var el=document.getElementById('build-log');
  var cls=type||'';
  el.innerHTML+='<div class="'+cls+'">'+new Date().toLocaleTimeString()+' — '+msg+'</div>';
  el.scrollTop=el.scrollHeight;
}

function loadClients(){
  var all;
  try{all=JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){all={}}
  var sel=document.getElementById('client-select');
  var cur=sel.value;
  sel.innerHTML='<option value="">— Select a client —</option>';
  var slugs=Object.keys(all).sort(function(a,b){
    return (all[b]._updated||0)-(all[a]._updated||0);
  });
  slugs.forEach(function(s){
    var d=all[s];
    var name=((d.firstName||'')+(d.lastName?' '+d.lastName:'')).trim()||s;
    var opt=document.createElement('option');
    opt.value=s; opt.textContent=name+' ('+s+')';
    if(s===cur)opt.selected=true;
    sel.appendChild(opt);
  });
  log('Loaded '+slugs.length+' clients from localStorage','info');

  // Load token
  var t=localStorage.getItem(TK)||'';
  if(t){
    document.getElementById('gh-token').value=t;
    document.getElementById('token-status').textContent='✅ Token loaded from storage';
  }
}

function onClientChange(){
  var slug=document.getElementById('client-select').value;
  if(!slug){document.getElementById('client-fields').innerHTML='';return;}
  document.getElementById('build-slug').value=slug;
  var all;try{all=JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){all={}}
  var d=all[slug]||{};
  renderFields(d,slug);
}

function renderFields(d,slug){
  var f=function(v){return v?('<span class="field-val">'+v+'</span>'):('<span class="field-val empty">—</span>');};
  var tMo=Math.round((parseFloat(d.monthlyMortgage)||0)+(parseFloat(d.maitFees)||0)/12);
  var tYr=Math.round((parseFloat(d.maitFees)||0)+(parseFloat(d.monthlyMortgage)||0)*12);
  var fee=parseFloat(d.alphaFee)||0;
  var html='<div class="section-sep">Client</div>';
  html+='<div class="field-row"><div class="field-label">Name</div>'+f((d.firstName||'')+(d.lastName?' '+d.lastName:''))+'</div>';
  html+='<div class="field-row"><div class="field-label">Phone</div>'+f(d.phone)+'</div>';
  html+='<div class="field-row"><div class="field-label">Email</div>'+f(d.email)+'</div>';
  html+='<div class="section-sep">Resort</div>';
  html+='<div class="field-row"><div class="field-label">Resort</div>'+f(d.resort)+'</div>';
  html+='<div class="field-row"><div class="field-label">Location</div>'+f((d.rescity||'')+(d.resSt?' '+d.resSt:''))+'</div>';
  html+='<div class="field-row"><div class="field-label">Year Purchased</div>'+f(d.year)+'</div>';
  html+='<div class="section-sep">Financials</div>';
  html+='<div class="field-row"><div class="field-label">Monthly MTF</div>'+f(d.maitFees?'$'+Math.round(parseFloat(d.maitFees)/12)+'/mo ('+d.maitFees+'/yr)':'')+'</div>';
  html+='<div class="field-row"><div class="field-label">Mortgage</div>'+f(d.monthlyMortgage&&d.monthlyMortgage!='0'?'$'+d.monthlyMortgage+'/mo':'Paid Off')+'</div>';
  html+='<div class="field-row"><div class="field-label">Combined Monthly</div>'+f(tMo?'$'+tMo+'/mo':null)+'</div>';
  html+='<div class="field-row"><div class="field-label">Alpha Fee</div>'+f(fee?'$'+fee.toLocaleString():null)+'</div>';
  html+='<div class="field-row"><div class="field-label">Why Out</div>'+f(d.whyOut||d.why)+'</div>';
  document.getElementById('client-fields').innerHTML=html;
}

function saveToken(){
  var t=document.getElementById('gh-token').value.trim();
  if(!t){alert('Enter a token first');return;}
  localStorage.setItem(TK,t);
  document.getElementById('token-status').textContent='✅ Token saved';
  log('GitHub token saved','info');
}

function clearToken(){
  localStorage.removeItem(TK);
  document.getElementById('gh-token').value='';
  document.getElementById('token-status').textContent='Token cleared';
}

function getClientData(){
  var slug=document.getElementById('build-slug').value.trim().toLowerCase().replace(/[^a-z0-9.]/g,'');
  if(!slug){alert('Select a client first');return null;}
  var all;try{all=JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){all={}}
  var d=all[slug]||{};
  var feeOverride=document.getElementById('fee-override').value.replace(/[^0-9.]/g,'');
  if(feeOverride)d.alphaFee=parseFloat(feeOverride);
  return {slug:slug,d:d};
}

function buildHTML(slug,d){
  var fc=function(x){return '$'+Math.round(x||0).toLocaleString();}
  var nm=((d.firstName||'')+(d.lastName?' '+d.lastName:'')).trim()||slug;
  var rs=d.resort||'Resort';
  var tMo=Math.round((parseFloat(d.monthlyMortgage)||0)+(parseFloat(d.maitFees)||0)/12);
  var tYr=Math.round((parseFloat(d.maitFees)||0)+(parseFloat(d.monthlyMortgage)||0)*12);
  var net=Math.max(0,parseFloat(d.alphaFee)||0);
  var r60=0.20/12,n60=60;
  var mo60=net>0?Math.round(net*(r60*Math.pow(1+r60,n60))/(Math.pow(1+r60,n60)-1)):0;

  var H=function(s){return '<div style="background:#1B2A4A;padding:20px 28px;text-align:center"><h1 style="font-family:Arial,sans-serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:1.5px;margin:0 0 5px">ALPHA TIMESHARE CONSULTANTS</h1><p style="color:#C8960C;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin:0">'+s+'</p></div>';};
  var B=function(h){return '<div style="padding:18px 24px;font-family:Arial,sans-serif;font-size:14px;color:#374151;line-height:1.7">'+h+'</div>';};
  var SIG='<div style="background:#f5f7fa;padding:12px 20px;font-size:11px;color:#9ca3af;border-top:1px solid #E0E4ED"><strong style="color:#1B2A4A">Sebastian Short</strong> &middot; Account Specialist &middot; ALPHA TIMESHARE CONSULTANTS<br>1 (877) 848-3948 Ext. 134 &middot; Sebastian@AlphaTimeshareConsultants.com</div>';
  var PQ='<div style="font-family:Georgia,serif;font-size:16px;font-style:italic;color:#1B2A4A;border-top:2px solid #C8960C;border-bottom:2px solid #C8960C;padding:10px 0;margin:14px 0;text-align:center">&ldquo;Would you rather put payments toward the problem &mdash; or the solution?&rdquo;</div>';

  function mk(n,t,body){
    return '<div style="background:#fff;border-radius:10px;border:1px solid #E0E4ED;margin-bottom:22px;overflow:hidden">'
      +'<div style="background:#1B2A4A;padding:10px 18px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:10px;font-weight:700;color:#C8960C;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px">Email '+n+' of 5</div>'
      +'<div style="font-size:14px;font-weight:700;color:#fff">'+t+'</div></div>'
      +'<button style="padding:5px 14px;background:#C8960C;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer" onclick="cpE(\'r'+n+'\')">&#128203; Copy</button>'
      +'</div><div id="r'+n+'">'+body+'</div></div>';
  }

  var rows='';
  [1,3,5,10,20,30].forEach(function(n){
    var cost=tYr*n;
    rows+='<tr><td style="padding:8px 12px;color:#1B2A4A;border-bottom:1px solid #f3f4f6">'+n+' Year'+(n>1?'s':'')+'</td>'
      +'<td style="padding:8px 12px;text-align:right;color:#DC2626;font-weight:700;border-bottom:1px solid #f3f4f6">'+fc(cost)+'</td>'
      +'<td style="padding:8px 12px;text-align:right;color:#6b7280;border-bottom:1px solid #f3f4f6">'+fc(net)+'</td>'
      +'<td style="padding:8px 12px;text-align:right;font-weight:700;border-bottom:1px solid #f3f4f6;color:'+(cost>net?'#16A34A':'#9ca3af')+'">'+(cost>net?fc(cost-net):'&mdash;')+'</td></tr>';
  });

  var e1=H('Group Filing &mdash; How It Works')+B('<p style="font-size:15px;font-weight:700;color:#1B2A4A;margin:0 0 8px">Hi '+d.firstName+',</p><p>Alpha consolidates owners from <strong>'+rs+'</strong> into coordinated group filings &mdash; the most important legal distinction in the industry. Individual owners get exits. Group participants are the only owners eligible for resort reimbursement.</p><div style="background:#EAF0F8;border-radius:8px;padding:14px;margin:12px 0;font-size:13px;line-height:1.8"><strong>1. We document your violations.</strong> Every disclosure failure becomes evidence.<br><strong>2. Our software maps statutes.</strong> RESPA, TILA, FTC §5, Reg Z, State UDAP.<br><strong>3. Group filing multiplies exposure.</strong> Your case joins others at the same resort.<br><strong>4. Resort settles.</strong> $235,000+ per owner in exposure drives them to Option B.</div>'+PQ)+SIG;
  var e2=H('Resort Compensation')+B('<p style="font-size:15px;font-weight:700;color:#1B2A4A;margin:0 0 8px">Hi '+d.firstName+',</p><p>Each documented violation carries a statutory fine. The resort faces up to $235,000 per owner in exposure.</p><div style="display:flex;gap:12px;margin:14px 0"><div style="flex:1;background:#fef2f2;border-radius:8px;padding:14px;text-align:center"><div style="font-family:Georgia,serif;font-size:24px;font-weight:700;color:#DC2626">$50K</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Per TILA/FTC</div></div><div style="flex:1;background:#fef2f2;border-radius:8px;padding:14px;text-align:center"><div style="font-family:Georgia,serif;font-size:24px;font-weight:700;color:#DC2626">$75K</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Per Reg Z</div></div><div style="flex:1;background:#1B2A4A;border-radius:8px;padding:14px;text-align:center"><div style="font-family:Georgia,serif;font-size:24px;font-weight:700;color:#C8960C">$235K+</div><div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:4px">Total Per Owner</div></div></div><p><strong>Group filing participants are the only owners eligible for reimbursement above the exit itself.</strong></p>'+PQ)+SIG;
  var e3=H('Credit Protection')+B('<p style="font-size:15px;font-weight:700;color:#1B2A4A;margin:0 0 8px">Hi '+d.firstName+',</p><p>Alpha does not advise you to stop payments. Any decision is yours &mdash; in writing.</p><div style="background:#EAF0F8;border-radius:8px;padding:14px;margin:12px 0;font-size:13px;line-height:2"><strong>1. Monitoring from day one.</strong> In-house team watches your profile immediately.<br><strong>2. Disputes at no cost.</strong> All three bureaus — TransUnion, Equifax, Experian.<br><strong>3. Bureau submission on Mutual Release.</strong> You exit with a clean record.</div>'+PQ)+SIG;
  var e4=H('True Cost of Ownership &mdash; '+rs)+B('<p style="font-size:15px;font-weight:700;color:#1B2A4A;margin:0 0 8px">Hi '+d.firstName+',</p><p>Here\'s what <strong>'+rs+'</strong> never showed you at signing.</p><div style="display:flex;justify-content:space-around;background:#EAF0F8;border-radius:8px;padding:14px;margin:12px 0;text-align:center"><div><div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#DC2626">'+fc(tMo)+'</div><div style="font-size:10px;color:#6b7280;text-transform:uppercase;margin-top:3px">Monthly</div></div><div><div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#DC2626">'+fc(tYr)+'</div><div style="font-size:10px;color:#6b7280;text-transform:uppercase;margin-top:3px">Yearly</div></div><div><div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#DC2626">'+fc(tYr*5)+'</div><div style="font-size:10px;color:#6b7280;text-transform:uppercase;margin-top:3px">5 Years</div></div></div><table style="width:100%;border-collapse:collapse"><thead style="background:#1B2A4A"><tr><th style="padding:8px 12px;text-align:left;color:rgba(255,255,255,.6);font-size:10px;text-transform:uppercase">Time</th><th style="padding:8px 12px;text-align:right;color:rgba(255,255,255,.6);font-size:10px;text-transform:uppercase">Resort Cost</th><th style="padding:8px 12px;text-align:right;color:rgba(255,255,255,.6);font-size:10px;text-transform:uppercase">With Alpha</th><th style="padding:8px 12px;text-align:right;color:#C8960C;font-size:10px;text-transform:uppercase">Savings</th></tr></thead><tbody>'+rows+'</tbody></table>'+PQ)+SIG;
  var e5=H('Your Service Quote')+B('<p style="font-size:15px;font-weight:700;color:#1B2A4A;margin:0 0 8px">Hi '+nm+',</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0"><div style="border-radius:8px;padding:16px;text-align:center;border:2px solid #fca5a5;background:#fef2f2"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9ca3af;margin-bottom:6px">5-Year Cost Without Alpha</div><div style="font-family:Georgia,serif;font-size:26px;font-weight:700;color:#DC2626">'+fc(tYr*5)+'</div></div><div style="border-radius:8px;padding:16px;text-align:center;border:2px solid #86efac;background:#f0fdf4"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9ca3af;margin-bottom:6px">Alpha Exit Fee</div><div style="font-family:Georgia,serif;font-size:26px;font-weight:700;color:#16A34A">'+fc(net)+'</div></div></div><div style="background:#1B2A4A;border-radius:8px;padding:14px;text-align:center;margin-bottom:14px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,.55)">60-Month Plan</div><div style="font-family:Georgia,serif;font-size:28px;font-weight:700;color:#C8960C">'+fc(mo60)+'/mo</div></div><ul style="padding-left:18px;margin:8px 0;font-size:13px;line-height:2.1"><li>Written Money-Back Guarantee</li><li>Permanent Legal Termination</li><li>Credit Protection &amp; Repair</li><li>Group Filing &mdash; Compensation Eligible</li><li>41 Years &middot; BBB A+ &middot; In-House</li></ul>'+PQ)+SIG;

  var cp="function cpE(id){var el=document.getElementById(id);var r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');window.getSelection().removeAllRanges();}";
  var BAR='<div style="background:#1B2A4A;padding:12px 20px;position:sticky;top:0;z-index:100"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-family:Arial,sans-serif;font-size:20px;font-weight:700;color:#fff">'+nm+'</div><div style="font-size:12px;color:rgba(255,255,255,.5)">'+rs+' &middot; '+(d.resSt||'')+'</div></div><div style="display:flex;gap:16px;text-align:center"><div><div style="font-size:11px;color:rgba(255,255,255,.5)">Monthly</div><div style="font-weight:700;color:#C8960C">'+fc(tMo)+'</div></div><div><div style="font-size:11px;color:rgba(255,255,255,.5)">Quote</div><div style="font-weight:700;color:#C8960C">'+fc(net)+'</div></div><div><div style="font-size:11px;color:rgba(255,255,255,.5)">60-Mo</div><div style="font-weight:700;color:#C8960C">'+fc(mo60)+'/mo</div></div></div></div></div>';
  var css='<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,Arial,sans-serif;background:#F4F6FA;font-size:14px}p{margin-bottom:10px}.content{padding:20px}</style>';

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>'+nm+' &mdash; Full Quote</title>'+css+'</head><body>'+BAR+'<div class="content">'+mk(1,'Group Filing &mdash; How It Works',e1)+mk(2,'Resort Compensation',e2)+mk(3,'Credit Protection',e3)+mk(4,'True Cost of Ownership',e4)+mk(5,'Your Service Quote',e5)+'</div><script>'+cp+'<\/script><\/body><\/html>';
}

function previewQuote(){
  var cd=getClientData(); if(!cd)return;
  var html=buildHTML(cd.slug,cd.d);
  var frame=document.getElementById('preview-frame');
  document.getElementById('preview-card').style.display='block';
  frame.srcdoc=html;
  log('Preview generated for /'+cd.slug+'/','info');
}

function pushQuote(){
  var cd=getClientData(); if(!cd)return;
  var token=localStorage.getItem(TK);
  if(!token){alert('Enter your GitHub token first');return;}
  var html=buildHTML(cd.slug,cd.d);
  var slug=cd.slug;
  log('Building page for /'+slug+'/...','info');
  var apiBase='https://api.github.com/repos/Sebastianshort624/alphafiles.net/contents/'+slug+'/index.html';
  fetch(apiBase,{headers:{'Authorization':'token '+token}})
  .then(function(r){return r.json();})
  .then(function(ex){
    var b64=btoa(unescape(encodeURIComponent(html)));
    var payload={message:'BUILD: '+cd.d.firstName+' '+(cd.d.lastName||'')+' /'+slug+'/',content:b64,branch:'main'};
    if(ex&&ex.sha)payload.sha=ex.sha;
    log('Pushing to GitHub...','info');
    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)});
  })
  .then(function(r){
    if(r.status===401){localStorage.removeItem(TK);throw new Error('Token rejected — re-enter token');}
    return r.json();
  })
  .then(function(d){
    if(d.content||d.commit){
      log('✅ Live at alphafiles.net/'+slug+'/ (ready in ~60s)');
      log('Now click "Add Card to /clients/ Hub" to complete','info');
    } else {throw new Error(d.message||'Unknown error');}
  })
  .catch(function(e){log('❌ '+e.message,'err');});
}

function addToHub(){
  var cd=getClientData(); if(!cd)return;
  var token=localStorage.getItem(TK);
  if(!token){alert('Enter your GitHub token first');return;}
  var slug=cd.slug; var d=cd.d;
  var fc=function(x){return '$'+Math.round(x||0).toLocaleString();}
  var nm=((d.firstName||'')+(d.lastName?' '+d.lastName:'')).trim()||slug;
  var rs=d.resort||'Resort';
  var tMo=Math.round((parseFloat(d.monthlyMortgage)||0)+(parseFloat(d.maitFees)||0)/12);
  var net=parseFloat(d.alphaFee)||0;
  var r60=0.20/12,n60=60;
  var mo60=net>0?Math.round(net*(r60*Math.pow(1+r60,n60))/(Math.pow(1+r60,n60)-1)):0;
  var card="<a href='/vitals/' onclick=\"localStorage.setItem('atc_active','"+slug+"')\" style='text-decoration:none'>"
    +"<div style='background:#fff;border:1.5px solid #E0E4ED;border-radius:10px;padding:16px;margin-bottom:14px;cursor:pointer'>"
    +"<div style='font-family:Barlow Condensed,Arial,sans-serif;font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:3px'>"+nm+"</div>"
    +"<div style='font-size:12px;color:#6b7280;margin-bottom:8px'>"+rs+(d.resSt?' &middot; '+d.resSt:'')+"</div>"
    +"<div style='display:flex;gap:8px;font-size:12px'>"
    +"<span style='background:#EAF0F8;color:#1B2A4A;padding:2px 8px;border-radius:10px;font-weight:600'>"+fc(net)+"</span>"
    +"<span style='background:#f0fdf4;color:#16A34A;padding:2px 8px;border-radius:10px;font-weight:600'>"+fc(mo60)+"/mo</span>"
    +"<span style='background:#fef2f2;color:#DC2626;padding:2px 8px;border-radius:10px;font-weight:600'>"+fc(tMo)+" current</span>"
    +"</div></div></a>\n";

  log('Adding card to /clients/ hub...','info');
  var apiBase='https://api.github.com/repos/Sebastianshort624/alphafiles.net/contents/clients/index.html';
  fetch(apiBase,{headers:{'Authorization':'token '+token}})
  .then(function(r){return r.json();})
  .then(function(data){
    var html=atob(data.content.replace(/\n/g,''));
    if(html.indexOf("'"+slug+"'")>-1){log('ℹ️ '+nm+' already in hub','warn');return;}
    var ins=html.indexOf("<a href='/vitals/'");
    var newHtml=ins>-1?html.slice(0,ins)+card+html.slice(ins):html.replace('
<!-- FLOATING MENU BUTTON -->
<div id="float-menu" style="position:fixed;top:16px;left:16px;z-index:9999">
  <div style="display:flex;flex-direction:column;gap:6px">
    <a href="/vitals/" style="display:flex;align-items:center;gap:8px;background:#1B2A4A;color:#fff;text-decoration:none;border-radius:8px;padding:8px 14px;font-family:Inter,sans-serif;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:.15s" onmouseover="this.style.background='#243a6e'" onmouseout="this.style.background='#1B2A4A'">
      ⚡ Vitals
    </a>
    <a href="/clients/" style="display:flex;align-items:center;gap:8px;background:#1B2A4A;color:#fff;text-decoration:none;border-radius:8px;padding:8px 14px;font-family:Inter,sans-serif;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:.15s" onmouseover="this.style.background='#243a6e'" onmouseout="this.style.background='#1B2A4A'">
      👥 Clients
    </a>
    <a href="/overview/" style="display:flex;align-items:center;gap:8px;background:#C8960C;color:#fff;text-decoration:none;border-radius:8px;padding:8px 14px;font-family:Inter,sans-serif;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(200,150,12,.3);transition:.15s" onmouseover="this.style.background='#b8860b'" onmouseout="this.style.background='#C8960C'">
      🗺 Overview
    </a>
  </div>
</div>
</body>',card+'</body>');
    return fetch(apiBase,{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify({message:'Add '+nm+' to clients hub',content:btoa(unescape(encodeURIComponent(newHtml))),sha:data.sha,branch:'main'})});
  })
  .then(function(){log('✅ Card added to /clients/ hub');})
  .catch(function(e){log('❌ '+e.message,'err');});
}
