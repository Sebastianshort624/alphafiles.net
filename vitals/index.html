<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Client Vitals — Alpha Timeshare Consultants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style id="page-css">
:root{--navy:#1B2A4A;--gold:#C8960C;--bg:#F4F6FA;--border:#E0E4ED;--green:#16A34A;--red:#DC2626;--orange:#ea580c;--blue:#2563EB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;font-size:14px;background:var(--bg);color:#1a1a1a}
.wrap{max-width:1000px;margin:0 auto}
.ph{background:var(--navy);color:#fff;border-radius:8px 8px 0 0;padding:18px 24px;margin-bottom:0}
.ph-num{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ph-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.ph-sub{font-size:14px;color:rgba(255,255,255,.65)}
.vb{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:#fff;border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:0 0 8px 8px;margin-bottom:18px}
.vbc{padding:9px 13px;border-right:1px solid var(--border)}
.vbc:last-child{border-right:none}
.vbl{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.vbv{font-size:14px;font-weight:700;color:var(--navy);line-height:1.2}
.vbs{font-size:12px;color:#6b7280;margin-top:2px}
.pb{background:#fff;border-radius:8px;border:1px solid var(--border);padding:22px;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:10px}
.card.navy{background:var(--navy);color:#fff;border-color:var(--navy)}
.card.gold-top{border-top:3px solid var(--gold)}
.card-hdr{font-size:12px;font-weight:700;color:#1B2A4A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f2f5}
.card-body{padding:14px}
.hdr-badge{background:var(--gold);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px;align-items:start}
.sec{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:"";flex:1;height:1px;background:var(--border)}
.ff{margin-bottom:8px}
.ff label{display:block;font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.ff input,.ff select,.ff textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-size:14px;font-family:"Inter",sans-serif;color:var(--navy);background:#fff}
.ff input:focus,.ff select:focus{outline:none;border-color:var(--gold)}
.ff input.hi{border-color:var(--border);font-weight:600;font-size:14px}
.ff textarea{resize:vertical;min-height:60px}
.ff.ro input{background:#f8fafc;color:#9ca3af;border-color:#e8edf3;cursor:default}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pt{display:flex;align-items:center;gap:7px;padding:7px 0;cursor:pointer;color:var(--gold);font-size:12px;font-weight:600;border-top:1px dashed var(--border);margin-top:8px;user-select:none}
.pt-ic{width:18px;height:18px;background:var(--gold);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.ps{display:none;margin-top:8px}
.ps.open{display:block}
.mt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.mt-b{padding:10px 8px;border:1.5px solid #e8edf3;border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:"Inter",sans-serif;color:#6b7280;width:100%;transition:all .15s;text-align:center}
.mt-b.a.pf{border-color:var(--green);background:#f0fdf4;color:var(--green)}
.mt-b.a.ow{border-color:var(--orange);background:#fff8f0;color:var(--orange)}
.mt-b.a.bh{border-color:var(--red);background:#fef2f2;color:var(--red)}
.stage-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.sp{padding:5px 10px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:#fff;color:#6b7280;font-family:"Inter",sans-serif}
.sp.on{background:var(--navy);border-color:var(--navy);color:#fff}
.sp.on.sq{background:var(--gold);border-color:var(--gold)}
.sp.on.sd{background:var(--green);border-color:var(--green)}
.prog-bar-wrap{background:#f3f4f6;border-radius:4px;height:8px;margin-bottom:12px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .4s}
.tt{width:100%;border-collapse:collapse;font-size:12px}
.tt th{background:#f9fafb;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;border-bottom:2px solid var(--border);color:#374151}
.tt th:not(:first-child){text-align:center;width:44px}
.tt td{padding:5px 8px;border-bottom:1px solid #f3f4f6;font-size:12px;color:#374151;vertical-align:middle}
.tt td:not(:first-child){text-align:center}
.tcb{width:14px;height:14px;cursor:pointer;accent-color:var(--navy)}
.tbar{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.tp{flex:1;min-width:72px;background:var(--navy);color:#fff;border-radius:6px;padding:9px;text-align:center}
.tp .tv{font-size:16px;font-weight:700;color:var(--gold);line-height:1}
.tp .tl{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;text-transform:uppercase;letter-spacing:.2px}
.alert-box{border-radius:6px;padding:12px 14px;margin:10px 0;font-size:13px;line-height:1.5}
.alert-box.danger{background:#fef2f2;border:1.5px solid var(--red);color:#7f1d1d}
.alert-box.warn{background:#fff8f0;border:1.5px solid var(--orange);color:#7c2d12}
.alert-box.info{background:#EAF0F8;border:1.5px solid var(--blue);color:#1e3a5f}
.alert-box.success{background:#f0fdf4;border:1.5px solid var(--green);color:#14532d}
.crm-box{background:#f9fafb;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:10px 12px;font-size:12px;line-height:1.6;color:#374151;margin-top:8px}
.sav-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.sticky-hdr{position:sticky;top:0;z-index:90;background:var(--navy);border-radius:8px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.sh-name{font-size:18px;font-weight:700;color:#fff}
.sh-resort{font-size:13px;color:var(--gold);font-weight:600}
.sh-chip{background:rgba(255,255,255,.1);border-radius:4px;padding:4px 10px;font-size:12px;color:rgba(255,255,255,.85)}
.sh-chip.gold{color:var(--gold);background:rgba(200,150,12,.15);font-weight:700}
.sh-chip.stage{background:var(--gold);color:#fff;font-weight:700}
.sh-btn{padding:6px 12px;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer}
.sh-btn.save{background:var(--gold);color:#fff}
.sh-btn.print{background:rgba(255,255,255,.15);color:#fff}
.btn{padding:11px 22px;font-size:14px;font-weight:600;border-radius:6px;border:none;cursor:pointer;font-family:"Inter",sans-serif}
.btn.p{background:var(--gold);color:#fff}
.btn.n{background:var(--navy);color:#fff}
.btn.o{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn-row .btn{flex:1}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.np{padding:10px 18px;font-size:14px;font-weight:600;border-radius:6px;text-decoration:none;background:#f3f4f6;color:#374151;border:1px solid var(--border)}
.nn{padding:10px 18px;font-size:14px;font-weight:600;border-radius:6px;text-decoration:none;background:var(--gold);color:#fff}
.ns{font-size:12px;color:#9ca3af;text-align:center;flex:1}
.wo-items label{display:flex;align-items:flex-start;gap:8px;padding:6px 0;cursor:pointer;font-size:14px;color:#374151;border-bottom:1px solid #f3f4f6;line-height:1.4}
.wo-items input[type=checkbox]{margin-top:2px;accent-color:var(--navy);flex-shrink:0}
@media print{.sidenav,.btn-row,.nav-bar{display:none!important}.main{margin-left:0!important}}


.mt-b.active{border-color:var(--navy);background:var(--navy);color:#fff}</style>

body{display:flex!important;min-height:100vh!important}
.sidenav{width:220px!important;min-width:220px!important;background:#1B2A4A!important;position:fixed!important;top:0!important;left:0!important;height:100vh!important;z-index:200!important;display:flex!important;flex-direction:column!important;overflow-y:auto!important}

<script id="atc-sb">
var _SK="atc_clients_v2",_AK="atc_active";
function _gA(){try{return JSON.parse(localStorage.getItem(_SK))||{};}catch(e){return{};}}
function _sA(o){localStorage.setItem(_SK,JSON.stringify(o));}
function _aC(){return localStorage.getItem(_AK)||null;}
function _aD(){var s=_aC();return s?_gA()[s]||null:null;}
function _fC(n){return "$"+Math.round(n||0).toLocaleString();}
function _fD(ts){if(!ts)return"--";return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

window.sf=function(k,v){
  var s=_aC();if(!s)return;
  var a=_gA();if(!a[s])return;
  a[s][k]=v;a[s]._updated=Date.now();_sA(a);
};

window.swC=function(s){
  if(!s)return;
  localStorage.setItem(_AK,s);
  setTimeout(function(){location.reload();},400);
};

window.toast=function(msg,color){
  var t=document.getElementById("_t");
  if(!t){
    t=document.createElement("div");
    t.id="_t";
    t.style.cssText="display:none;position:fixed;bottom:24px;left:240px;background:#16A34A;color:#fff;padding:10px 18px;font-size:14px;font-weight:600;border-radius:8px;z-index:700";
    document.body.appendChild(t);
  }
  t.style.background=color||"#16A34A";
  t.textContent=msg;
  t.style.display="block";
  setTimeout(function(){t.style.display="none";},2500);
};

window.newC=function(){
  var m=document.getElementById("_ncm");
  if(!m){
    m=document.createElement("div");
    m.id="_ncm";
    m.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:600;display:none;align-items:center;justify-content:center";
    var box=document.createElement("div");
    box.style.cssText="background:#fff;border-radius:12px;padding:24px;max-width:380px;width:100%;margin:20px";
    function mkF(id,lbl,ph){
      var d=document.createElement("div");
      d.style.marginBottom="10px";
      var l=document.createElement("label");
      l.style.cssText="display:block;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px";
      l.textContent=lbl;
      d.appendChild(l);
      var i=document.createElement("input");
      i.id=id;
      i.style.cssText="width:100%;border:1.5px solid #E0E4ED;border-radius:6px;padding:9px 11px;font-size:14px";
      i.placeholder=ph;
      d.appendChild(i);
      return d;
    }
    var tt=document.createElement("div");
    tt.style.cssText="font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:14px";
    tt.textContent="New Client Session";
    box.appendChild(tt);
    box.appendChild(mkF("_ncf","First Name","First (optional)"));
    box.appendChild(mkF("_ncl","Last Name","Last (optional)"));
    box.appendChild(mkF("_ncr","Resort","Resort name (optional)"));
    var btns=document.createElement("div");
    btns.style.cssText="display:flex;gap:8px;margin-top:4px";
    var bc=document.createElement("button");
    bc.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:600;border-radius:6px;border:1.5px solid #1B2A4A;background:#fff;cursor:pointer";
    bc.textContent="Cancel";
    bc.onclick=function(){m.style.display="none";};
    var bs=document.createElement("button");
    bs.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:600;border-radius:6px;border:none;background:#C8960C;color:#fff;cursor:pointer";
    bs.textContent="Start";
    bs.onclick=function(){window.createC();};
    btns.appendChild(bc);
    btns.appendChild(bs);
    box.appendChild(btns);
    m.appendChild(box);
    m.addEventListener("click",function(e){if(e.target===m)m.style.display="none";});
    document.body.appendChild(m);
  }
  m.style.display="flex";
  setTimeout(function(){var f=document.getElementById("_ncf");if(f)f.focus();},100);
};

window.createC=function(){
  var f=(document.getElementById("_ncf")||{}).value||"";
  var l=(document.getElementById("_ncl")||{}).value||"";
  var r=(document.getElementById("_ncr")||{}).value||"";
  f=f.trim();l=l.trim();r=r.trim();
  var all=_gA();
  var slug;
  if(!f&&!l){
    var ct=Object.keys(all).filter(function(k){return k.indexOf("unnamed")===0;}).length+1;
    slug="unnamed-"+ct;
  }else{
    slug=((f||"x")[0]+"."+(l||"client")).toLowerCase().replace(/[^a-z0-9.]/g,"");
  }
  all[slug]=Object.assign(all[slug]||{_created:Date.now()},{firstName:f,lastName:l,resort:r,_updated:Date.now()});
  _sA(all);
  localStorage.setItem(_AK,slug);
  var m=document.getElementById("_ncm");
  if(m)m.style.display="none";
  window.toast("Session started");
  setTimeout(function(){location.href="/vitals/";},700);
};

window.saveClear=function(){
  var s=_aC();
  if(s){
    var all=_gA();
    if(all[s]){all[s]._updated=Date.now();_sA(all);}
  }
  localStorage.removeItem(_AK);
  window.toast("Saved and cleared");
  setTimeout(function(){location.href="/home/";},700);
};

window.addCal=function(){
  var d=_aD();
  var fu=d&&d._fuAppt;
  if(!fu){alert("Set a follow-up date first.");return;}
  var dt=new Date(fu);
  var fmt=function(x){return x.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";};
  window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent((d.firstName||"Client")+" - ATC Follow-Up")+"&dates="+fmt(dt)+"/"+fmt(new Date(dt.getTime()+3600000)),"_blank");
};

window.rpt=function(type){
  var d=_aD();
  if(!d){window.toast("No active client","#DC2626");return;}
  var nm=(d.firstName||d.lastName?(d.firstName||"")+" "+(d.lastName||""):"Unnamed").trim();
  var mo=_fC((parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12));
  var nl=String.fromCharCode(10);
  var txt="";
  var stages=["Intro","Assessment","True Cost","Quote","Acknowledgment","Contract","Funding","Completed"];
  if(type==="crm"){
    txt="=== CALL NOTES "+new Date().toLocaleDateString()+" ==="+nl+"Client: "+nm+nl+"Resort: "+(d.resort||"--")+nl+"Phone: "+(d.phone||"--")+nl+"Monthly: "+mo+nl+"MTF: "+_fC(d.maitFees)+"/yr"+nl+"Mortgage: "+(parseFloat(d.monthlyMortgage)>0?_fC(d.monthlyMortgage)+"/mo":"Paid off")+nl+"Stage: "+stages[d.vitalsStage||1]+nl+"Quote: "+(d.alphaFee?_fC(d.alphaFee):"--")+nl+"Classify: "+(d.clientClass||"--")+nl+"Notes: "+(d.notes||"--");
  }else if(type==="sms"){
    txt="Hi "+(d.firstName||"there")+", this is Sebastian at Alpha Timeshare Consultants. Good time to connect? (877) 848-3948 Ext. 134";
  }else{
    txt="ALPHA TIMESHARE CONSULTANTS"+nl+new Date().toLocaleDateString()+nl+"Client: "+nm+nl+"Resort: "+(d.resort||"--")+nl+"Phone: "+(d.phone||"--")+nl+"Monthly: "+mo+nl+"Quote: "+(d.alphaFee?_fC(d.alphaFee):"--")+nl+"Notes: "+(d.notes||"--");
  }
  try{
    navigator.clipboard.writeText(txt).then(function(){window.toast("Copied");});
  }catch(e){
    var ta=document.createElement("textarea");
    ta.value=txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    window.toast("Copied");
  }
};

function buildSB(){
  var el=document.querySelector(".sidenav");
  if(!el){el=document.createElement("div");el.className="sidenav";document.body.insertBefore(el,document.body.firstChild);}
  var d=_aD(),slug=_aC(),all=_gA();
  var cur="/"+window.location.pathname.split("/").filter(Boolean)[0]+"/";
  var mo=d?(parseFloat(d.monthlyMortgage)||0)+((parseFloat(d.maitFees)||0)/12):0;
  var nm=d?(d.firstName||d.lastName?(d.firstName||"")+" "+(d.lastName||""):"Unnamed").trim():null;

  var ct;
  if(d){
    ct="<div style='padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.1)'>"
      +"<div style='font-size:14px;font-weight:700;color:#fff;margin-bottom:2px'>"+(nm||"Unnamed")+"</div>"

function createClientFilePage(){

  if(!token){
    var t=prompt('Enter GitHub token (ghp_...):\nThis is saved locally and only needed once.');
    if(!t){return;}
    localStorage.setItem(TK,t.trim());
    token=t.trim();
  }

  var all;try{all=JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){all={}}
  var d=all[slug]||{};
  var fn=(d.firstName||'');
  var ln=(d.lastName||'');
  var name=fn+(ln?' '+ln:'');
  var resort=d.resort||'Your Resort';

  // Build URL slug: first initial dot last name
  var urlSlug=slug; // already in f.lastname format
  var githubPath=urlSlug+'/index.html';

  var btn=document.getElementById('create-file-btn');
  var status=document.getElementById('create-file-status');
  btn.textContent='⏳ Building...';
  btn.disabled=true;
  status.style.display='block';
  status.textContent='Generating full quote HTML...';

  // Build the FULL QUOTE HTML (same as generateFullQuote but as a string)
  var pageHtml=buildFullQuoteHTML(d, slug);

  status.textContent='Pushing to alphafiles.net/'+urlSlug+'/...';

  // Check if file exists first to get SHA
  fetch('https://api.github.com/repos/Sebastianshort624/alphafiles.net/contents/'+githubPath,
    {headers:{'Authorization':'token '+token}})
  .then(function(r){return r.json();})
  .then(function(existing){
    var payload={
      message:'CREATE: '+name+' client file at /'+urlSlug+'/ — Full Quote page (5 emails)',
      content:btoa(unescape(encodeURIComponent(pageHtml))),
      branch:'main'
    };
    if(existing.sha) payload.sha=existing.sha;
    return fetch('https://api.github.com/repos/Sebastianshort624/alphafiles.net/contents/'+githubPath,
      {method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
       body:JSON.stringify(payload)});
  })
  .then(function(r){return r.json();})

    if(data.content){
      btn.textContent='✅ Live!';

// ── CURRENT vs ALPHA — symmetric 60-year comparison ─────────────
function calcComparison(){
  var resortEl=document.getElementById('cmp-resort');
  var termEl=document.getElementById('cmp-term');
  var curEl=document.getElementById('cmp-current-total');
  var alphaEl=document.getElementById('cmp-alpha-total');
  var saveEl=document.getElementById('cmp-savings');
  var curSubEl=document.getElementById('cmp-current-sub');
  var alphaSubEl=document.getElementById('cmp-alpha-sub');
  var saveLblEl=document.getElementById('cmp-savings-label');
  if(!curEl||!alphaEl) return;

  var resort=(document.getElementById('v-resort')||{}).value||'';
  if(resortEl) resortEl.textContent = resort.trim() ? resort.trim() : 'Your Resort';
  var totalsHdrEl=document.getElementById('totals-hdr-resort');
  if(totalsHdrEl) totalsHdrEl.textContent = resort.trim() ? resort.trim().toUpperCase()+' ' : '';

  var mtfYr=parseFloat((document.getElementById('v-mtf')||{}).value)||0;
  var mtgMo=_mtgType==='pf'?0:(parseFloat((document.getElementById('v-mtg')||{}).value)||0);
  var fee=parseFloat((document.getElementById('v-fee')||{}).value)||0;
  var term=parseInt((document.getElementById('v-term')||{}).value)||0;

  // The comparison horizon always matches the selected financing term, in
  // months — a 60-month plan compares 60 months on BOTH sides, not a fixed
  // long-range projection. Pay-in-Full has no inherent month count, so it
  // defaults to a 12-month window for a same-footing comparison.
  var horizonMonths = term>0 ? term : 12;

  // Mortgage years remaining — same default-to-1-yr-ago logic used elsewhere
  var yearRaw=(document.getElementById('v-year')||{}).value;
  var year=parseInt(yearRaw)||0;
  var now=new Date().getFullYear();
  var yearWasEntered = year>1990 && year<=now;
  var yrsIn = yearWasEntered ? (now-year) : 1;
  var monthsLeftOnMtg = Math.max(0,10-yrsIn)*12;

  // MTF compounds annually at 8%; extend the formula to fractional years so
  // short horizons (e.g. 12mo = 1yr) still resolve sensibly.
  function mtfTotal(nMonths){ var nYears=nMonths/12; return mtfYr>0 ? mtfYr*(Math.pow(1.08,nYears)-1)/0.08 : 0; }
  function mtgTotal(nMonths){ return mtgMo>0 ? mtgMo*Math.min(nMonths,monthsLeftOnMtg) : 0; }
  var currentTotal = Math.round(mtfTotal(horizonMonths)+mtgTotal(horizonMonths));
  curEl.textContent = fc(currentTotal);
  if(curSubEl) curSubEl.innerHTML = '<span style="font-size:16px;font-weight:800;color:#1B2A4A">'+horizonMonths+'</span>-Month Forecast';

  // Total actually paid to Alpha over the chosen term (financed total, not just the fee)
  var alphaTotal=0;
  if(fee>0){
    if(!term || term===12){ alphaTotal=fee; }
    else { var r=0.20/12; var pmt=fee*(r*Math.pow(1+r,term))/(Math.pow(1+r,term)-1); alphaTotal=pmt*term; }
  }
  alphaEl.textContent = fee>0 ? fc(Math.round(alphaTotal)) : '—';
  if(termEl) termEl.innerHTML = fee>0 ? (term ? '<span style="font-size:13px;font-weight:800">'+term+'</span> Mo' : 'Pay in Full') : '—';
  if(alphaSubEl) alphaSubEl.innerHTML = fee>0 ? 'Over <span style="font-size:16px;font-weight:800;color:#1B2A4A">'+horizonMonths+'</span> Months' : 'One-Time Exit Plan';

  if(saveEl){
    if(fee>0 && currentTotal>0){
      var savings=currentTotal-alphaTotal;
      saveEl.textContent = savings>0 ? fc(Math.round(savings)) : '—';
    } else {
      saveEl.textContent='—';
    }
  }
  if(saveLblEl) saveLblEl.textContent = 'Total Saved Over '+horizonMonths+' Months';

  // Auto-suggest Alpha fee = 80% of resort forecast — fill fee field if blank
  if(currentTotal>0){
    var suggested=Math.round(currentTotal*0.80);
    var sugEl=document.getElementById('suggested-fee-tile');
    if(sugEl) sugEl.textContent=fc(suggested)+' (80%)';
    var feeEl=document.getElementById('v-fee');
    if(feeEl&&(!feeEl.value||parseFloat(feeEl.value)===0)){
      feeEl.value=suggested;
      if(typeof calcSavings==='function') calcSavings();
    }
  }

  if(typeof calcTcExtra==='function') calcTcExtra();
}
window.calcComparison=calcComparison;

function calcMtgRemaining(){
  var yearRaw=(document.getElementById('v-year')||{}).value;
  var year=parseInt(yearRaw)||0;
  var mtg=parseFloat((document.getElementById('v-mtg')||{}).value)||0;
  var fico=(document.getElementById('v-fico')||{}).value||'';
  var now=new Date().getFullYear();
  var balDisplay=document.getElementById('v-balance-display');
  var balHidden=document.getElementById('v-balance');
  var priceDisplay=document.getElementById('v-price-display');
  var priceRate=document.getElementById('v-price-rate');
  var priceHidden=document.getElementById('v-mtg-future');
  var remBox=document.getElementById('mtg-rem-box2');

  // No year entered? Default to "bought last year" — 9 yrs left on the 10-yr term —
  // instead of showing nothing. Still flagged as a default, not a hard fact.
  var yearWasEntered = year>1990 && year<=now;
  var yrsIn = yearWasEntered ? (now-year) : 1;
  var yrsLeft = Math.max(0,10-yrsIn);

  if(mtg>0){
    // Balance = monthly × 12 × years remaining
    var balance=Math.round(mtg*12*yrsLeft);
    if(balDisplay)balDisplay.value=balance>0?fc(balance):'$0';
    if(balHidden)balHidden.value=balance;
    // Price = balance × rate × 120
    var rate=fico==='good'?0.165:fico==='fair'?0.175:fico==='poor'?0.185:0;
    var rateLabel=fico==='good'?'Good credit — 16.5%':fico==='fair'?'Fair credit — 17.5%':fico==='poor'?'Poor credit — 18.5%':'Select credit rating';
    var price=rate>0?Math.round(balance*rate*120):0;
    if(priceDisplay)priceDisplay.value=price>0?fc(price):'—';
    if(priceRate)priceRate.textContent=rateLabel;
    if(priceHidden)priceHidden.value=price;
    if(remBox){
      remBox.style.display='block';
      remBox.innerHTML=(yearWasEntered?'Purchased <strong>'+yrsIn+' yrs ago</strong>':'No purchase year entered — <strong>defaulting to 1 yr ago</strong>')+' — <strong>'+yrsLeft+' yrs left</strong> on 10-yr term';
    }
  } else {
    if(balDisplay)balDisplay.value='—';
    if(priceDisplay)priceDisplay.value='—';
    if(priceRate&&fico==='')priceRate.textContent='Select year &amp; credit rating';
    if(remBox)remBox.style.display='none';
    if(balHidden)balHidden.value='';
    if(priceHidden)priceHidden.value='';
  }
}

function calcPurchaseFinance(){
  var box=document.getElementById('purch-finance-box');
  if(!box) return;

  var yearRaw=(document.getElementById('v-year')||{}).value;
  var year=parseInt(yearRaw)||0;
  var now=new Date().getFullYear();
  var yearWasEntered = year>1990 && year<=now;
  var yrsIn = yearWasEntered ? (now-year) : 1; // default: assume bought 1 yr ago
  var yrsLeft = Math.max(0,10-yrsIn);
  var monthsLeftOnMtg = yrsLeft*12;

  var mtgMo = parseFloat((document.getElementById('v-mtg')||{}).value)||0;
  var mtfYr = parseFloat((document.getElementById('v-mtf')||{}).value)||0;
  var mtfMo = mtfYr/12;
  var pprice = parseFloat((document.getElementById('v-pprice')||{}).value)||0;
  var hasMtg = mtgMo>0 && _mtgType!=='pf';

  // If there's no active mortgage, MTF doesn't have a "term" to anchor to —
  // default to the standard 10-yr / 120-mo window per Sebastian's spec.
  var monthsWindow = hasMtg ? monthsLeftOnMtg : 120;

  var mtgRemaining = hasMtg ? Math.round(mtgMo*monthsLeftOnMtg) : 0;
  var mtfRemaining = Math.round(mtfMo*monthsWindow);

  function tile(label,val,sub){
    return '<div style="text-align:center;padding:10px 6px;border:1px solid #d7e3f2;border-radius:7px;background:#fff">'
      +'<div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">'+label+'</div>'
      +'<div style="font-size:18px;font-weight:700;color:#1B2A4A;letter-spacing:-.3px">'+val+'</div>'
      +(sub?'<div style="font-size:10px;color:#9ca3af;margin-top:2px">'+sub+'</div>':'')
    +'</div>';
  }

  // 5-year projections
  var mtg5yr = hasMtg ? Math.round(mtgMo*Math.min(60, monthsLeftOnMtg)) : 0;
  var mtf5yr = Math.round(mtfMo*60);
  var total5yr = mtg5yr + mtf5yr;
  var suggested = Math.round(total5yr * 0.80);

  var tiles=[];
  tiles.push(tile('Term Left', yrsLeft+' yrs', yearWasEntered?null:'(estimated)'));
  tiles.push(tile('Mortgage Left', hasMtg?fc(mtgRemaining):'Paid off'));
  tiles.push(tile('MTF Left', fc(mtfRemaining)));
  if(mtgMo>0){
    tiles.push(tile('Rate', '17.5%', 'default'));
  }

  // 5-year breakdown tiles
  if(hasMtg){
    tiles.push(tile('Mortgage — 5 Yrs', fc(mtg5yr), '5yr payments'));
  }
  tiles.push(tile('MTF — 5 Yrs', fc(mtf5yr), '5yr fees'));
  tiles.push(tile('Total — 5 Yrs', fc(total5yr), 'mtg + MTF'));

  // Suggested fee tile — value populated by calcComparison (80% of forecast)
  tiles.push(tile('Suggested Fee', '<span id="suggested-fee-tile">—</span>', '80% of forecast'));

  box.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px">'+tiles.join('')+'</div>';
}
window.calcPurchaseFinance=calcPurchaseFinance;

// the rest of each pack's topics sit in between, with redundant greetings/
// owner-blocks/signatures stripped via coreBody() so it reads as ONE email.

var SECTION_TITLES = {
  whyout: 'WHY YOU WANT OUT',
  wait: 'IF YOU DO NOTHING',
  group: 'FINDING YOUR GROUP',
  approval: 'YOUR SPOT IN THE GROUP FILING',
  heirs: 'HEIRS & ESTATE LIABILITY',

  followup: 'FOLLOW-UP',
  better: 'WHAT MAKES ALPHA DIFFERENT',
  included: "WHAT'S INCLUDED",
  recap: 'RECAP'
};

var PACK_TEMPLATES = {
  pack1: { label:'🆘 Your Situation', seq:['whyout','wait','credit','heirs','quote'],
    intro:'Here is everything we covered today about where things stand and what your options look like.' },
  pack2: { label:'🛡 Protection', seq:['whyout','guarantee','credit','letter','quote'],
    intro:'Here is a summary of how Alpha protects you — in writing, every step of the way.' },
  pack3: { label:'🔍 Group Filing Path', seq:['whyout','group','approval','exit-methods','quote'],

    intro:'Here is a complete recap of everything we have covered, in writing.' }
};

// Strips the per-template greeting, owner block, and signature so multiple
// templates can be stitched into one email without repeating boilerplate.
function coreBody(full, c){
  var t = full;
  var greet = 'Hi '+c.name+',\n\n';
  if(t.indexOf(greet)===0) t = t.slice(greet.length);
  var ownerMarker = '\n\nOwner: '+c.name+'\nResort: '+c.resort+'\nPhone: '+c.phone+(c.email?'\nEmail: '+c.email:'')+'\n\n';
  var idx = t.indexOf(ownerMarker);
  if(idx>=0) t = t.slice(idx+ownerMarker.length);
  var sig = '\n\nBest,\nSebastian Short\nAlpha Timeshare Consultants\nExt. 134 | 877-848-3948';
  if(t.slice(t.length-sig.length)===sig) t = t.slice(0, t.length-sig.length);
  return t.trim();
}

function generatePackEmail(packKey, c){
  var pack = PACK_TEMPLATES[packKey];
  if(!pack) return 'Pack not found.';
  var out = 'Hi '+c.name+',\n\n'+pack.intro+'\n\n';
  out += 'Owner: '+c.name+'\nResort: '+c.resort+'\nPhone: '+c.phone+(c.email?'\nEmail: '+c.email:'')+'\n\n';
  pack.seq.forEach(function(key){
    var fn = EMAIL_TEMPLATES[key];
    if(!fn) return;
    var body = coreBody(fn(c), c);
    var title = SECTION_TITLES[key] || key.toUpperCase();
    out += '— '+title+' —\n'+body+'\n\n';
  });
  out += 'Best,\nSebastian Short\nAlpha Timeshare Consultants\nExt. 134 | 877-848-3948';
  return out;
}

function renderEmailPack(){
  var sel = document.getElementById('email-pack-sel');
  var preview = document.getElementById('email-preview');
  var placeholder = document.getElementById('email-placeholder');
  var key = sel.value;
  document.getElementById('email-template-sel').value = '';
  if(!key){
    preview.style.display='none';
    placeholder.style.display='block';
    return;
  }
  var c = _clientHeader();
  preview.textContent = generatePackEmail(key, c);
  preview.style.display='block';
  placeholder.style.display='none';
  document.getElementById('email-copied-msg').style.display='none';
}
// ── END EMAIL PACKS ────────────────────────────────────────────────────────

function generateEmail(){
  var sel = document.getElementById('email-template-sel');
  var preview = document.getElementById('email-preview');
  var placeholder = document.getElementById('email-placeholder');
  var key = sel.value;
  if(!key){
    preview.style.display='none';
    placeholder.style.display='block';
    return;
  }
  var c = _clientHeader();
  var fn = EMAIL_TEMPLATES[key];
  if(!fn){preview.textContent='Template not found.';preview.style.display='block';placeholder.style.display='none';return;}
  var text = fn(c);
  preview.textContent = text;
  preview.style.display='block';
  placeholder.style.display='none';
  document.getElementById('email-copied-msg').style.display='none';
}

function copyEmail(){
  var preview = document.getElementById('email-preview');
  if(!preview||preview.style.display==='none'){alert('Select a template first.');return;}
  var text = preview.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      var msg = document.getElementById('email-copied-msg');
      if(msg){msg.style.display='block';setTimeout(function(){msg.style.display='none';},3000);}
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    var msg = document.getElementById('email-copied-msg');
    if(msg){msg.style.display='block';setTimeout(function(){msg.style.display='none';},3000);}
  }
}
// ── END EMAIL GENERATOR ───────────────────────────────────────────────────
